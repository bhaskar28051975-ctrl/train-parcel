<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FoodHub - Reports</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 0;
        }

        .container {
            width: 100%;
            max-width: 100%;
            padding: 0;
        }

        header {
            background: white;
            padding: 15px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            width: 100%;
        }

        header h1 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            overflow-x: auto;
        }

        .nav-links a {
            padding: 8px 12px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 12px;
            white-space: nowrap;
            transition: background 0.3s;
        }

        .nav-links a.active {
            background: #764ba2;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 15px;
        }

        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
            margin: 8px 0;
        }

        .stat-label {
            color: #666;
            font-size: 12px;
        }

        .content {
            padding: 15px;
            min-height: calc(100vh - 300px);
        }

        .chart-section {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .chart-section h2 {
            color: #667eea;
            font-size: 16px;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .chart-bar {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
        }

        .chart-label {
            min-width: 80px;
            font-weight: bold;
            color: #333;
            font-size: 12px;
        }

        .chart-fill {
            flex: 1;
            height: 26px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 8px;
            color: white;
            font-weight: bold;
            font-size: 12px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
        }

        .tab-btn {
            padding: 8px 12px;
            background: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            white-space: nowrap;
            color: #667eea;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #667eea;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .table-section {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        .table-section h2 {
            color: #667eea;
            font-size: 16px;
            margin-bottom: 12px;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        table th {
            background: #f8f9ff;
            padding: 10px;
            text-align: left;
            font-weight: bold;
            color: #667eea;
            border-bottom: 2px solid #ddd;
        }

        table td {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        table tr:hover {
            background: #f8f9ff;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
        }

        .status-pending {
            background: #ff6b6b;
            color: white;
        }

        .status-preparing {
            background: #ffc107;
            color: white;
        }

        .status-ready {
            background: #28a745;
            color: white;
        }

        .status-on-way {
            background: #17a2b8;
            color: white;
        }

        .status-delivered {
            background: #28a745;
            color: white;
        }

        .empty-message {
            text-align: center;
            padding: 30px 10px;
            color: #999;
            font-size: 12px;
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 20px;
            }

            .nav-links a {
                font-size: 11px;
                padding: 6px 10px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 11px;
            }

            table th, table td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Reports</h1>
            <div class="nav-links">
                <a href="index.html">🛒 Order</a>
                <a href="kitchen.html">👨‍🍳 Kitchen</a>
                <a href="delivery.html">🚚 Delivery</a>
                <a href="admin.html">⚙️ Admin</a>
                <a href="reports.html" class="active">📊 Reports</a>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Orders</div>
                <div class="stat-number" id="totalOrders">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Revenue</div>
                <div class="stat-number" id="totalRevenue">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Order</div>
                <div class="stat-number" id="avgOrder">₹0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Delivered</div>
                <div class="stat-number" id="deliveredOrders">0</div>
            </div>
        </div>

        <div class="content">
            <div class="chart-section">
                <h2>📈 Order Status</h2>
                <div id="statusChart"></div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('all')">All Orders</button>
                <button class="tab-btn" onclick="switchTab('today')">Today</button>
            </div>

            <div id="all" class="tab-content active">
                <div class="table-section">
                    <h2>All Orders</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer</th>
                                <th>Phone</th>
                                <th>Amount</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="allOrdersTable">
                            <tr><td colspan="5" class="empty-message">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="today" class="tab-content">
                <div class="table-section">
                    <h2>Today's Orders</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer</th>
                                <th>Phone</th>
                                <th>Amount</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="todayOrdersTable">
                            <tr><td colspan="5" class="empty-message">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDMz8C0GSPbsYKinLVpUT1PLejBscKw_pc",
            authDomain: "train-parcel.firebaseapp.com",
            databaseURL: "https://train-parcel-default-rtdb.firebaseio.com",
            projectId: "train-parcel",
            storageBucket: "train-parcel.firebasestorage.app",
            messagingSenderId: "357680905494",
            appId: "1:357680905494:web:072f547f8fc7c05a1ce437",
            measurementId: "G-SQX8M0MKHT"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let allOrders = [];

        function loadOrders() {
            database.ref('orders').on('value', (snapshot) => {
                allOrders = [];
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).forEach(key => {
                        allOrders.push({id: key, ...data[key]});
                    });
                }
                allOrders.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                updateStats();
                displayOrders();
                updateChart();
            });
        }

        function updateStats() {
            const total = allOrders.length;
            const revenue = allOrders.reduce((sum, o) => sum + (o.total || 0), 0);
            const delivered = allOrders.filter(o => o.status === 'delivered').length;
            const avg = total > 0 ? Math.round(revenue / total) : 0;

            document.getElementById('totalOrders').textContent = total;
            document.getElementById('totalRevenue').textContent = '₹' + revenue;
            document.getElementById('avgOrder').textContent = '₹' + avg;
            document.getElementById('deliveredOrders').textContent = delivered;
        }

        function updateChart() {
            const pending = allOrders.filter(o => o.status === 'pending').length;
            const preparing = allOrders.filter(o => o.status === 'preparing').length;
            const ready = allOrders.filter(o => o.status === 'ready').length;
            const onWay = allOrders.filter(o => o.status === 'on-way').length;
            const delivered = allOrders.filter(o => o.status === 'delivered').length;

            const max = Math.max(pending, preparing, ready, onWay, delivered, 1);

            const chart = document.getElementById('statusChart');
            chart.innerHTML = `
                <div class="chart-bar">
                    <div class="chart-label">Pending</div>
                    <div class="chart-fill" style="width: ${(pending/max)*100}%">${pending}</div>
                </div>
                <div class="chart-bar">
                    <div class="chart-label">Preparing</div>
                    <div class="chart-fill" style="width: ${(preparing/max)*100}%">${preparing}</div>
                </div>
                <div class="chart-bar">
                    <div class="chart-label">Ready</div>
                    <div class="chart-fill" style="width: ${(ready/max)*100}%">${ready}</div>
                </div>
                <div class="chart-bar">
                    <div class="chart-label">On Way</div>
                    <div class="chart-fill" style="width: ${(onWay/max)*100}%">${onWay}</div>
                </div>
                <div class="chart-bar">
                    <div class="chart-label">Delivered</div>
                    <div class="chart-fill" style="width: ${(delivered/max)*100}%">${delivered}</div>
                </div>
            `;
        }

        function displayOrders() {
            displayTable('allOrdersTable', allOrders);

            const today = new Date().toDateString();
            const todayOrders = allOrders.filter(o => {
                const orderDate = new Date(o.createdAt).toDateString();
                return orderDate === today;
            });
            displayTable('todayOrdersTable', todayOrders);
        }

        function displayTable(tableId, orders) {
            const tbody = document.getElementById(tableId);
            if (orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-message">No orders</td></tr>';
                return;
            }

            tbody.innerHTML = orders.map(order => `
                <tr>
                    <td>#${order.id.substring(0, 6)}</td>
                    <td>${order.customerName}</td>
                    <td>${order.customerPhone}</td>
                    <td>₹${order.total}</td>
                    <td><span class="status-badge status-${order.status}">${order.status.substring(0, 3).toUpperCase()}</span></td>
                </tr>
            `).join('');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');

            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
        }

        window.addEventListener('load', loadOrders);
    </script>
</body>
</html>
