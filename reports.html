<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - FoodHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
</head>
<body class="bg-purple-50 pb-40">

    <header class="bg-white shadow-md sticky top-0 z-40 border-b-4 border-purple-600">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black text-purple-600">📊 Reports</h1>
            <a href="control.html" class="bg-purple-600 text-white px-3 py-1 rounded-full text-xs font-bold"><i class="fa-solid fa-home mr-1"></i>Home</a>
        </div>
    </header>

    <div class="max-w-4xl mx-auto px-4 space-y-6 py-6">

        <!-- KEY METRICS -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white p-4 rounded-xl shadow-md text-center border-t-4 border-green-600">
                <p class="text-xs text-gray-500 font-bold uppercase">Total Orders</p>
                <p id="metric-orders" class="text-3xl font-black text-green-600 mt-2">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-md text-center border-t-4 border-blue-600">
                <p class="text-xs text-gray-500 font-bold uppercase">Revenue</p>
                <p id="metric-revenue" class="text-2xl font-black text-blue-600 mt-2">₹0</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-md text-center border-t-4 border-orange-600">
                <p class="text-xs text-gray-500 font-bold uppercase">Avg Order</p>
                <p id="metric-average" class="text-2xl font-black text-orange-600 mt-2">₹0</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-md text-center border-t-4 border-red-600">
                <p class="text-xs text-gray-500 font-bold uppercase">Delivered</p>
                <p id="metric-delivered" class="text-3xl font-black text-red-600 mt-2">0</p>
            </div>
        </div>

        <!-- CHARTS -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- ORDER STATUS DISTRIBUTION -->
            <div class="bg-white p-6 rounded-xl shadow-md border-l-4 border-purple-600">
                <h3 class="text-lg font-black text-gray-800 mb-4">📈 Order Status Distribution</h3>
                <canvas id="statusChart"></canvas>
            </div>

            <!-- DAILY REVENUE -->
            <div class="bg-white p-6 rounded-xl shadow-md border-l-4 border-green-600">
                <h3 class="text-lg font-black text-gray-800 mb-4">💰 Top Hotels by Revenue</h3>
                <div id="top-hotels" class="space-y-2"></div>
            </div>
        </div>

        <!-- TABS -->
        <div class="flex gap-2 bg-white p-2 rounded-lg shadow-md flex-wrap sticky top-20 z-30">
            <button onclick="switchTab('orders')" class="py-2 px-4 rounded-lg text-xs font-black uppercase transition-all bg-purple-600 text-white" id="tab-orders">📋 All Orders</button>
            <button onclick="switchTab('drivers')" class="py-2 px-4 rounded-lg text-xs font-black uppercase transition-all bg-gray-200 text-gray-700" id="tab-drivers">🚚 Driver Earnings</button>
            <button onclick="switchTab('hotels')" class="py-2 px-4 rounded-lg text-xs font-black uppercase transition-all bg-gray-200 text-gray-700" id="tab-hotels">🏢 Hotel Revenue</button>
        </div>

        <!-- ORDERS TABLE -->
        <div id="orders-tab" class="bg-white p-6 rounded-xl shadow-md">
            <h3 class="text-lg font-black text-gray-800 mb-4">📋 Order Details</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="border-b-2 border-purple-600">
                            <th class="text-left p-2 font-black text-gray-700">Order ID</th>
                            <th class="text-left p-2 font-black text-gray-700">Customer</th>
                            <th class="text-left p-2 font-black text-gray-700">Amount</th>
                            <th class="text-left p-2 font-black text-gray-700">Status</th>
                            <th class="text-left p-2 font-black text-gray-700">Time</th>
                        </tr>
                    </thead>
                    <tbody id="orders-table-body">
                        <tr><td colspan="5" class="text-center text-gray-500 py-4">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- DRIVERS EARNINGS -->
        <div id="drivers-tab" class="hidden bg-white p-6 rounded-xl shadow-md">
            <h3 class="text-lg font-black text-gray-800 mb-4">🚚 Driver Earnings Summary</h3>
            <div id="drivers-earnings" class="space-y-3"></div>
        </div>

        <!-- HOTEL REVENUE -->
        <div id="hotels-tab" class="hidden bg-white p-6 rounded-xl shadow-md">
            <h3 class="text-lg font-black text-gray-800 mb-4">🏢 Hotel Revenue Breakdown</h3>
            <div id="hotels-revenue" class="space-y-3"></div>
        </div>

        <!-- NAV -->
        <div class="flex gap-2 mt-8">
            <a href="index.html" class="flex-1 bg-yellow-600 text-white py-3 rounded-lg font-black uppercase text-center shadow-md active:scale-95">🛒 Customer</a>
            <a href="admin.html" class="flex-1 bg-red-600 text-white py-3 rounded-lg font-black uppercase text-center shadow-md active:scale-95">⚙️ Admin</a>
            <a href="kitchen.html" class="flex-1 bg-orange-600 text-white py-3 rounded-lg font-black uppercase text-center shadow-md active:scale-95">👨‍🍳 Kitchen</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDMz8C0GSPbsYKinLVpUT1PLejBscKw_pc",
            authDomain: "train-parcel.firebaseapp.com",
            databaseURL: "https://train-parcel-default-rtdb.firebaseio.com",
            projectId: "train-parcel",
            storageBucket: "train-parcel.firebasestorage.app",
            messagingSenderId: "357680905494",
            appId: "1:357680905494:web:072f547f8fc7c05a1ce437"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let statusChart = null;

        function switchTab(tab) {
            document.getElementById('orders-tab').classList.toggle('hidden', tab !== 'orders');
            document.getElementById('drivers-tab').classList.toggle('hidden', tab !== 'drivers');
            document.getElementById('hotels-tab').classList.toggle('hidden', tab !== 'hotels');

            const tabs = ['orders', 'drivers', 'hotels'];
            tabs.forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === tab) {
                    btn.classList.add('bg-purple-600', 'text-white');
                    btn.classList.remove('bg-gray-200', 'text-gray-700');
                } else {
                    btn.classList.remove('bg-purple-600', 'text-white');
                    btn.classList.add('bg-gray-200', 'text-gray-700');
                }
            });
        }

        function loadReports() {
            db.ref('orders').on('value', snap => {
                const orders = snap.val() || {};
                const ordersList = Object.entries(orders).map(([id, o]) => ({id, ...o}));

                // Calculate metrics
                const totalOrders = ordersList.length;
                const delivered = ordersList.filter(o => o.status === 'delivered').length;
                const totalRevenue = ordersList.reduce((sum, o) => sum + (o.total || 0), 0);
                const avgOrder = totalOrders > 0 ? Math.round(totalRevenue / totalOrders) : 0;

                document.getElementById('metric-orders').textContent = totalOrders;
                document.getElementById('metric-revenue').textContent = '₹' + totalRevenue;
                document.getElementById('metric-average').textContent = '₹' + avgOrder;
                document.getElementById('metric-delivered').textContent = delivered;

                // Status distribution chart
                const statusCounts = {
                    pending: ordersList.filter(o => o.status === 'pending').length,
                    preparing: ordersList.filter(o => o.status === 'preparing').length,
                    ready: ordersList.filter(o => o.status === 'ready').length,
                    'on-way': ordersList.filter(o => o.status === 'on-way').length,
                    delivered: delivered,
                    cancelled: ordersList.filter(o => o.status === 'cancelled').length
                };
                updateStatusChart(statusCounts);

                // Orders table
                displayOrdersTable(ordersList.reverse());

                // Driver earnings
                displayDriverEarnings(ordersList);

                // Hotel revenue
                displayHotelRevenue(ordersList);

                // Top hotels
                displayTopHotels(ordersList);
            });
        }

        function updateStatusChart(statusCounts) {
            const ctx = document.getElementById('statusChart').getContext('2d');
            
            if (statusChart) statusChart.destroy();

            statusChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Pending', 'Preparing', 'Ready', 'On Way', 'Delivered', 'Cancelled'],
                    datasets: [{
                        data: [statusCounts.pending, statusCounts.preparing, statusCounts.ready, statusCounts['on-way'], statusCounts.delivered, statusCounts.cancelled],
                        backgroundColor: ['#ef4444', '#f97316', '#fbbf24', '#3b82f6', '#22c55e', '#6b7280'],
                        borderColor: '#fff',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }

        function displayOrdersTable(orders) {
            const tbody = document.getElementById('orders-table-body');
            tbody.innerHTML = orders.slice(0, 10).map(order => `
                <tr class="border-b border-gray-200 hover:bg-gray-50">
                    <td class="p-2 font-bold text-gray-800">#${order.id.substring(0, 6)}</td>
                    <td class="p-2 text-gray-700">${order.customerName}</td>
                    <td class="p-2 font-bold text-gray-800">₹${order.total}</td>
                    <td class="p-2">
                        <span class="px-2 py-1 rounded-full text-xs font-bold ${
                            order.status === 'pending' ? 'bg-red-100 text-red-700' :
                            order.status === 'preparing' ? 'bg-orange-100 text-orange-700' :
                            order.status === 'ready' ? 'bg-yellow-100 text-yellow-700' :
                            order.status === 'on-way' ? 'bg-blue-100 text-blue-700' :
                            order.status === 'delivered' ? 'bg-green-100 text-green-700' :
                            'bg-gray-100 text-gray-700'
                        }">
                            ${order.status.toUpperCase()}
                        </span>
                    </td>
                    <td class="p-2 text-gray-600 text-xs">${new Date(order.createdAt).toLocaleDateString()}</td>
                </tr>
            `).join('');
        }

        function displayDriverEarnings(orders) {
            const drivers = {};
            const COMMISSION = 0.10;

            orders.filter(o => o.status === 'delivered').forEach(order => {
                const driver = order.deliveryName || 'Unknown';
                const earnings = order.total * COMMISSION;
                drivers[driver] = (drivers[driver] || 0) + earnings;
            });

            const container = document.getElementById('drivers-earnings');
            if (Object.keys(drivers).length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 py-4">No completed deliveries</p>';
                return;
            }

            container.innerHTML = Object.entries(drivers)
                .sort((a, b) => b[1] - a[1])
                .map(([driver, earnings]) => `
                    <div class="flex justify-between items-center p-3 bg-gradient-to-r from-green-50 to-green-100 rounded-lg border-l-4 border-green-600">
                        <span class="font-bold text-gray-800">🚚 ${driver}</span>
                        <span class="text-xl font-black text-green-600">₹${earnings.toFixed(0)}</span>
                    </div>
                `).join('');
        }

        function displayHotelRevenue(orders) {
            const hotels = {};

            orders.forEach(order => {
                const hotel = order.hotelName || 'Unknown';
                hotels[hotel] = (hotels[hotel] || 0) + (order.total || 0);
            });

            const container = document.getElementById('hotels-revenue');
            if (Object.keys(hotels).length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 py-4">No orders</p>';
                return;
            }

            container.innerHTML = Object.entries(hotels)
                .sort((a, b) => b[1] - a[1])
                .map(([hotel, revenue]) => `
                    <div class="flex justify-between items-center p-3 bg-gradient-to-r from-blue-50 to-blue-100 rounded-lg border-l-4 border-blue-600">
                        <span class="font-bold text-gray-800">🏢 ${hotel}</span>
                        <span class="text-xl font-black text-blue-600">₹${revenue.toFixed(0)}</span>
                    </div>
                `).join('');
        }

        function displayTopHotels(orders) {
            const hotels = {};

            orders.forEach(order => {
                const hotel = order.hotelName || 'Unknown';
                hotels[hotel] = (hotels[hotel] || 0) + (order.total || 0);
            });

            const container = document.getElementById('top-hotels');
            const sorted = Object.entries(hotels)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5);

            container.innerHTML = sorted.map(([hotel, revenue]) => `
                <div class="flex justify-between items-center p-2 bg-gray-50 rounded border-l-2 border-purple-600">
                    <span class="text-sm font-bold text-gray-800">${hotel}</span>
                    <span class="text-lg font-black text-purple-600">₹${revenue.toFixed(0)}</span>
                </div>
            `).join('');
        }

        window.addEventListener('load', loadReports);
    </script>
</body>
</html>
