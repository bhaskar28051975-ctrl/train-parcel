<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodHub Reports & Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 pb-10">

    <header class="bg-red-600 text-white p-5 shadow-lg sticky top-0 z-40">
        <h1 class="text-2xl font-black">📊 Reports & Analytics</h1>
    </header>

    <!-- TABS -->
    <div class="bg-white border-b flex gap-0">
        <button onclick="switchTab('summary')" id="tab-summary" class="flex-1 py-3 font-black text-red-600 border-b-4 border-red-600 text-sm">📈 Summary</button>
        <button onclick="switchTab('orders')" id="tab-orders" class="flex-1 py-3 font-black text-gray-600 text-sm">📦 Orders</button>
        <button onclick="switchTab('drivers')" id="tab-drivers" class="flex-1 py-3 font-black text-gray-600 text-sm">💰 Driver Earnings</button>
        <button onclick="switchTab('hotels')" id="tab-hotels" class="flex-1 py-3 font-black text-gray-600 text-sm">🏪 Hotel Revenue</button>
    </div>

    <div class="p-4">

        <!-- ========== SUMMARY TAB ========== -->
        <div id="section-summary">
            <h2 class="text-lg font-black mb-4">📈 Business Summary</h2>
            
            <!-- KPIs -->
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-white p-4 rounded-lg shadow-md">
                    <p class="text-xs text-gray-600 font-black">Total Orders</p>
                    <p id="kpi-total-orders" class="text-2xl font-black text-blue-600">0</p>
                </div>
                <div class="bg-white p-4 rounded-lg shadow-md">
                    <p class="text-xs text-gray-600 font-black">Total Revenue</p>
                    <p id="kpi-total-revenue" class="text-2xl font-black text-green-600">₹0</p>
                </div>
                <div class="bg-white p-4 rounded-lg shadow-md">
                    <p class="text-xs text-gray-600 font-black">Delivered Orders</p>
                    <p id="kpi-delivered" class="text-2xl font-black text-emerald-600">0</p>
                </div>
                <div class="bg-white p-4 rounded-lg shadow-md">
                    <p class="text-xs text-gray-600 font-black">Avg Order Value</p>
                    <p id="kpi-avg-order" class="text-2xl font-black text-purple-600">₹0</p>
                </div>
            </div>

            <!-- ORDER STATUS CHART -->
            <div class="bg-white p-4 rounded-lg shadow-md mb-6">
                <p class="font-black mb-3">Order Status Distribution</p>
                <canvas id="statusChart"></canvas>
            </div>

            <!-- SUCCESS METRICS -->
            <div class="bg-white p-4 rounded-lg shadow-md">
                <p class="font-black mb-3">Success Metrics</p>
                <div class="space-y-2 text-sm">
                    <div class="flex justify-between">
                        <span>✅ Delivery Success Rate:</span>
                        <span id="metric-success" class="font-black text-green-600">0%</span>
                    </div>
                    <div class="flex justify-between">
                        <span>⏳ Pending/Preparing:</span>
                        <span id="metric-pending" class="font-black text-orange-600">0</span>
                    </div>
                    <div class="flex justify-between">
                        <span>💰 Total Commission Paid:</span>
                        <span id="metric-commission" class="font-black text-blue-600">₹0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- ========== ALL ORDERS TAB ========== -->
        <div id="section-orders" class="hidden">
            <h2 class="text-lg font-black mb-4">📦 All Orders</h2>
            <div id="orders-table" class="space-y-3"></div>
        </div>

        <!-- ========== DRIVER EARNINGS TAB ========== -->
        <div id="section-drivers" class="hidden">
            <h2 class="text-lg font-black mb-4">💰 Driver Earnings</h2>
            <div id="drivers-table" class="space-y-3"></div>
        </div>

        <!-- ========== HOTEL REVENUE TAB ========== -->
        <div id="section-hotels" class="hidden">
            <h2 class="text-lg font-black mb-4">🏪 Hotel Revenue</h2>
            <div id="hotels-table" class="space-y-3"></div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDMz8C0GSPbsYKinLVpUT1PLejBscKw_pc",
            authDomain: "train-parcel.firebaseapp.com",
            databaseURL: "https://train-parcel-default-rtdb.firebaseio.com",
            projectId: "train-parcel",
            storageBucket: "train-parcel.firebasestorage.app",
            messagingSenderId: "357680905494",
            appId: "1:357680905494:web:072f547f8fc7c05a1ce437"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let ordersData = {};
        let driversData = {};
        let hotelsData = {};
        let commission = 10;
        let statusChart = null;

        window.switchTab = (tab) => {
            ['summary', 'orders', 'drivers', 'hotels'].forEach(t => {
                document.getElementById(`section-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('border-b-4', 'border-red-600', 'text-red-600');
                document.getElementById(`tab-${t}`).classList.add('text-gray-600');
            });
            document.getElementById(`section-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('border-b-4', 'border-red-600', 'text-red-600');
        };

        function generateReports() {
            // CALCULATE METRICS
            let totalOrders = Object.keys(ordersData).length;
            let totalRevenue = 0;
            let deliveredOrders = 0;
            let pendingOrders = 0;
            let preparingOrders = 0;
            let onWayOrders = 0;
            let totalCommission = 0;

            const statusCounts = { pending: 0, preparing: 0, ready: 0, 'on-way': 0, delivered: 0 };
            const driverEarnings = {};
            const hotelRevenue = {};

            Object.keys(ordersData).forEach(orderId => {
                const order = ordersData[orderId];
                totalRevenue += order.totalAmount || 0;

                // Count statuses
                statusCounts[order.status] = (statusCounts[order.status] || 0) + 1;
                if(order.status === "delivered") deliveredOrders++;
                if(order.status === "pending") pendingOrders++;
                if(order.status === "preparing") preparingOrders++;
                if(order.status === "on-way") onWayOrders++;

                // Driver earnings
                if(order.deliveryDriver) {
                    const driver = Object.values(driversData).find(d => d.name === order.deliveryName);
                    const driverComm = driver?.commission || commission;
                    if(!driverEarnings[order.deliveryName]) {
                        driverEarnings[order.deliveryName] = 0;
                    }
                    if(order.status === "delivered") {
                        const earnings = Math.round(order.totalAmount * driverComm / 100);
                        driverEarnings[order.deliveryName] += earnings;
                        totalCommission += earnings;
                    }
                }
            });

            // Update KPIs
            document.getElementById('kpi-total-orders').innerText = totalOrders;
            document.getElementById('kpi-total-revenue').innerText = "₹" + Math.round(totalRevenue);
            document.getElementById('kpi-delivered').innerText = deliveredOrders;
            document.getElementById('kpi-avg-order').innerText = totalOrders > 0 ? "₹" + Math.round(totalRevenue / totalOrders) : "₹0";

            // Success rate
            const successRate = totalOrders > 0 ? Math.round((deliveredOrders / totalOrders) * 100) : 0;
            document.getElementById('metric-success').innerText = successRate + "%";
            document.getElementById('metric-pending').innerText = (pendingOrders + preparingOrders);
            document.getElementById('metric-commission').innerText = "₹" + Math.round(totalCommission);

            // Update Chart
            updateStatusChart(statusCounts);

            // Render tables
            renderOrdersTable();
            renderDriversTable(driverEarnings);
            renderHotelsTable();
        }

        function updateStatusChart(statusCounts) {
            const ctx = document.getElementById('statusChart').getContext('2d');
            if(statusChart) statusChart.destroy();
            
            statusChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['⏳ Pending', '👨‍🍳 Preparing', '📦 Ready', '🚗 On Way', '✅ Delivered'],
                    datasets: [{
                        data: [
                            statusCounts.pending,
                            statusCounts.preparing,
                            statusCounts.ready,
                            statusCounts['on-way'],
                            statusCounts.delivered
                        ],
                        backgroundColor: ['#ef4444', '#f97316', '#fbbf24', '#3b82f6', '#10b981']
                    }]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });
        }

        function renderOrdersTable() {
            const container = document.getElementById('orders-table');
            container.innerHTML = "";
            
            const sortedOrders = Object.entries(ordersData).sort((a, b) => (b[1].timestamp || 0) - (a[1].timestamp || 0));
            
            sortedOrders.slice(0, 50).forEach(([orderId, order]) => {
                container.innerHTML += `
                <div class="bg-white p-3 rounded-lg shadow-md">
                    <div class="flex justify-between text-sm font-black">
                        <span>👤 ${order.customerName}</span>
                        <span class="text-xs px-2 py-1 bg-gray-200 rounded-full">${order.status}</span>
                    </div>
                    <p class="text-xs text-gray-600 mt-1">📍 ${order.travelInfo || 'N/A'}</p>
                    <p class="text-xs text-gray-600">📦 ${order.items}</p>
                    <p class="text-sm font-black text-red-600 mt-1">₹${order.totalAmount}</p>
                </div>`;
            });
        }

        function renderDriversTable(driverEarnings) {
            const container = document.getElementById('drivers-table');
            container.innerHTML = "";
            
            Object.entries(driverEarnings).forEach(([name, earnings]) => {
                container.innerHTML += `
                <div class="bg-white p-3 rounded-lg shadow-md">
                    <div class="flex justify-between items-center">
                        <span class="font-black">🚗 ${name}</span>
                        <span class="text-lg font-black text-green-600">₹${earnings}</span>
                    </div>
                </div>`;
            });
        }

        function renderHotelsTable() {
            const container = document.getElementById('hotels-table');
            container.innerHTML = "";
            
            const hotelRevenue = {};
            Object.values(ordersData).forEach(order => {
                // Note: Orders don't have hotel ID, so we can't calculate per-hotel revenue
                // This would need to be added to order data in future
            });

            Object.keys(hotelsData).forEach(hId => {
                const h = hotelsData[hId];
                container.innerHTML += `
                <div class="bg-white p-3 rounded-lg shadow-md">
                    <div class="flex justify-between items-center">
                        <span class="font-black">🏪 ${h.name}</span>
                        <span class="text-lg font-black text-blue-600">Items: ${h.menu ? Object.keys(h.menu).length : 0}</span>
                    </div>
                </div>`;
            });
        }

        // LOAD DATA
        onValue(ref(db, 'orders'), (snap) => {
            ordersData = snap.val() || {};
            generateReports();
        });

        onValue(ref(db, 'drivers'), (snap) => {
            driversData = snap.val() || {};
        });

        onValue(ref(db, 'hotels'), (snap) => {
            hotelsData = snap.val() || {};
        });

        onValue(ref(db, 'settings/commission'), (snap) => {
            commission = snap.val() || 10;
        });
    </script>
</body>
</html>
