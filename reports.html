<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - FoodHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
</head>
<body class="bg-purple-50 pb-24">
    <header class="bg-white p-5 shadow-md sticky top-0 z-50 border-b-4 border-purple-600">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-black text-purple-600">📊 Reports & Analytics</h1>
            <button onclick="location.reload()" class="text-[10px] font-bold bg-gray-100 px-3 py-1 rounded-full uppercase">Refresh</button>
        </div>
    </header>

    <div class="max-w-6xl mx-auto p-4 space-y-6">

        <!-- KEY METRICS -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white p-6 rounded-2xl shadow-md text-center border-t-4 border-green-600">
                <p class="text-xs text-gray-500 font-bold uppercase">Total Orders</p>
                <p id="metric-orders" class="text-3xl font-black text-green-600 mt-2">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-md text-center border-t-4 border-blue-600">
                <p class="text-xs text-gray-500 font-bold uppercase">Total Revenue</p>
                <p id="metric-revenue" class="text-2xl font-black text-blue-600 mt-2">₹0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-md text-center border-t-4 border-orange-600">
                <p class="text-xs text-gray-500 font-bold uppercase">Avg Order Value</p>
                <p id="metric-average" class="text-2xl font-black text-orange-600 mt-2">₹0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-md text-center border-t-4 border-red-600">
                <p class="text-xs text-gray-500 font-bold uppercase">Delivered</p>
                <p id="metric-delivered" class="text-3xl font-black text-red-600 mt-2">0</p>
            </div>
        </div>

        <!-- TABS -->
        <div class="flex gap-2 bg-white p-2 rounded-xl shadow-md flex-wrap sticky top-20 z-40">
            <button onclick="switchTab('summary')" id="tab-summary" class="py-2 px-4 rounded-lg text-xs font-black uppercase bg-purple-600 text-white">📈 Summary</button>
            <button onclick="switchTab('orders')" id="tab-orders" class="py-2 px-4 rounded-lg text-xs font-black uppercase bg-gray-200 text-gray-700">📋 All Orders</button>
            <button onclick="switchTab('drivers')" id="tab-drivers" class="py-2 px-4 rounded-lg text-xs font-black uppercase bg-gray-200 text-gray-700">🚚 Driver Earnings</button>
            <button onclick="switchTab('hotels')" id="tab-hotels" class="py-2 px-4 rounded-lg text-xs font-black uppercase bg-gray-200 text-gray-700">🏢 Hotel Revenue</button>
        </div>

        <!-- SUMMARY TAB -->
        <div id="section-summary" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- ORDER STATUS CHART -->
                <div class="bg-white p-6 rounded-2xl shadow-md">
                    <h3 class="text-lg font-black text-gray-800 mb-4">📊 Order Status Distribution</h3>
                    <canvas id="statusChart" class="max-h-64"></canvas>
                </div>

                <!-- TOP HOTELS -->
                <div class="bg-white p-6 rounded-2xl shadow-md">
                    <h3 class="text-lg font-black text-gray-800 mb-4">🏆 Top Hotels by Revenue</h3>
                    <div id="top-hotels" class="space-y-3"></div>
                </div>
            </div>
        </div>

        <!-- ORDERS TAB -->
        <div id="section-orders" class="hidden bg-white p-6 rounded-2xl shadow-md">
            <h3 class="text-lg font-black text-gray-800 mb-4">📋 All Orders</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="border-b-2 border-purple-600">
                            <th class="text-left p-2 font-black text-gray-700">Order ID</th>
                            <th class="text-left p-2 font-black text-gray-700">Customer</th>
                            <th class="text-left p-2 font-black text-gray-700">Amount</th>
                            <th class="text-left p-2 font-black text-gray-700">Status</th>
                            <th class="text-left p-2 font-black text-gray-700">Hotel</th>
                            <th class="text-left p-2 font-black text-gray-700">Time</th>
                        </tr>
                    </thead>
                    <tbody id="orders-table-body">
                        <tr><td colspan="6" class="text-center text-gray-500 py-4">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- DRIVERS TAB -->
        <div id="section-drivers" class="hidden bg-white p-6 rounded-2xl shadow-md">
            <h3 class="text-lg font-black text-gray-800 mb-4">🚚 Driver Earnings Summary</h3>
            <div id="drivers-earnings" class="space-y-3"></div>
        </div>

        <!-- HOTELS TAB -->
        <div id="section-hotels" class="hidden bg-white p-6 rounded-2xl shadow-md">
            <h3 class="text-lg font-black text-gray-800 mb-4">🏢 Hotel Revenue Breakdown</h3>
            <div id="hotels-revenue" class="space-y-3"></div>
        </div>

    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDMz8C0GSPbsYKinLVpUT1PLejBscKw_pc",
        authDomain: "train-parcel.firebaseapp.com",
        databaseURL: "https://train-parcel-default-rtdb.firebaseio.com",
        projectId: "train-parcel",
        storageBucket: "train-parcel.firebasestorage.app",
        messagingSenderId: "357680905494",
        appId: "1:357680905494:web:072f547f8fc7c05a1ce437"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let statusChart = null;
    const COMMISSION_RATE = 10;

    window.switchTab = (tab) => {
        document.getElementById('section-summary').classList.add('hidden');
        document.getElementById('section-orders').classList.add('hidden');
        document.getElementById('section-drivers').classList.add('hidden');
        document.getElementById('section-hotels').classList.add('hidden');
        document.getElementById(`section-${tab}`).classList.remove('hidden');

        ['summary', 'orders', 'drivers', 'hotels'].forEach(t => {
            document.getElementById(`tab-${t}`).classList.remove('bg-purple-600', 'text-white');
            document.getElementById(`tab-${t}`).classList.add('bg-gray-200', 'text-gray-700');
        });
        document.getElementById(`tab-${tab}`).classList.remove('bg-gray-200', 'text-gray-700');
        document.getElementById(`tab-${tab}`).classList.add('bg-purple-600', 'text-white');
    };

    function loadReports() {
        onValue(ref(db, 'orders'), (snap) => {
            const orders = snap.val() || {};
            const ordersList = Object.entries(orders).map(([id, o]) => ({id, ...o})).reverse();

            // Calculate metrics
            const totalOrders = ordersList.length;
            const delivered = ordersList.filter(o => o.status === 'delivered').length;
            const totalRevenue = ordersList.reduce((sum, o) => sum + (o.totalAmount || 0), 0);
            const avgOrder = totalOrders > 0 ? Math.round(totalRevenue / totalOrders) : 0;

            document.getElementById('metric-orders').textContent = totalOrders;
            document.getElementById('metric-revenue').textContent = '₹' + totalRevenue;
            document.getElementById('metric-average').textContent = '₹' + avgOrder;
            document.getElementById('metric-delivered').textContent = delivered;

            // Status distribution
            const statusCounts = {
                pending: ordersList.filter(o => o.status === 'pending').length,
                preparing: ordersList.filter(o => o.status === 'preparing').length,
                ready: ordersList.filter(o => o.status === 'ready').length,
                'on-way': ordersList.filter(o => o.status === 'on-way').length,
                delivered: delivered,
                cancelled: ordersList.filter(o => o.status === 'cancelled').length
            };
            updateStatusChart(statusCounts);

            // Orders table
            displayOrdersTable(ordersList);

            // Driver earnings
            displayDriverEarnings(ordersList);

            // Hotel revenue
            displayHotelRevenue(ordersList);

            // Top hotels
            displayTopHotels(ordersList);
        });
    }

    function updateStatusChart(statusCounts) {
        const ctx = document.getElementById('statusChart').getContext('2d');
        
        if(statusChart) statusChart.destroy();

        statusChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Pending', 'Preparing', 'Ready', 'On Way', 'Delivered', 'Cancelled'],
                datasets: [{
                    data: [statusCounts.pending, statusCounts.preparing, statusCounts.ready, statusCounts['on-way'], statusCounts.delivered, statusCounts.cancelled],
                    backgroundColor: ['#ef4444', '#f97316', '#fbbf24', '#3b82f6', '#22c55e', '#6b7280'],
                    borderColor: '#fff',
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom'
                    }
                }
            }
        });
    }

    function displayOrdersTable(orders) {
        const tbody = document.getElementById('orders-table-body');
        tbody.innerHTML = orders.slice(0, 20).map(order => `
            <tr class="border-b border-gray-200 hover:bg-gray-50">
                <td class="p-2 font-bold text-gray-800">#${order.id.substring(0, 6)}</td>
                <td class="p-2 text-gray-700">${order.customerName}</td>
                <td class="p-2 font-bold text-gray-800">₹${order.totalAmount}</td>
                <td class="p-2">
                    <span class="px-2 py-1 rounded-full text-xs font-bold ${
                        order.status === 'pending' ? 'bg-red-100 text-red-700' :
                        order.status === 'preparing' ? 'bg-orange-100 text-orange-700' :
                        order.status === 'ready' ? 'bg-yellow-100 text-yellow-700' :
                        order.status === 'on-way' ? 'bg-blue-100 text-blue-700' :
                        order.status === 'delivered' ? 'bg-green-100 text-green-700' :
                        'bg-gray-100 text-gray-700'
                    }">
                        ${order.status.toUpperCase()}
                    </span>
                </td>
                <td class="p-2 text-gray-600">${order.items || 'N/A'}</td>
                <td class="p-2 text-gray-600 text-xs">${new Date(order.timestamp || new Date()).toLocaleDateString()}</td>
            </tr>
        `).join('');
    }

    function displayDriverEarnings(orders) {
        const drivers = {};
        
        orders.filter(o => o.status === 'delivered' && o.deliveryName).forEach(order => {
            const driver = order.deliveryName;
            const commission = order.totalAmount * COMMISSION_RATE / 100;
            drivers[driver] = (drivers[driver] || 0) + commission;
        });

        const container = document.getElementById('drivers-earnings');
        if(Object.keys(drivers).length === 0) {
            container.innerHTML = '<p class="text-center text-gray-500 py-4">No completed deliveries</p>';
            return;
        }

        container.innerHTML = Object.entries(drivers)
            .sort((a, b) => b[1] - a[1])
            .map(([driver, earnings]) => `
                <div class="flex justify-between items-center p-4 bg-gradient-to-r from-green-50 to-green-100 rounded-lg border-l-4 border-green-600">
                    <div>
                        <p class="font-bold text-gray-800">🚚 ${driver}</p>
                        <p class="text-xs text-gray-500">Total Earnings</p>
                    </div>
                    <p class="text-2xl font-black text-green-600">₹${earnings.toFixed(0)}</p>
                </div>
            `).join('');
    }

    function displayHotelRevenue(orders) {
        const hotels = {};
        
        orders.forEach(order => {
            const hotel = order.customerName ? 'Order' : 'Unknown';
            const revenue = order.totalAmount || 0;
            hotels[hotel] = (hotels[hotel] || 0) + revenue;
        });

        const container = document.getElementById('hotels-revenue');
        const hotelEntries = Object.entries(hotels).sort((a, b) => b[1] - a[1]);
        
        if(hotelEntries.length === 0) {
            container.innerHTML = '<p class="text-center text-gray-500 py-4">No data</p>';
            return;
        }

        container.innerHTML = hotelEntries.map(([hotel, revenue]) => `
            <div class="flex justify-between items-center p-4 bg-gradient-to-r from-blue-50 to-blue-100 rounded-lg border-l-4 border-blue-600">
                <div>
                    <p class="font-bold text-gray-800">🏢 ${hotel}</p>
                    <p class="text-xs text-gray-500">Total Revenue</p>
                </div>
                <p class="text-2xl font-black text-blue-600">₹${revenue.toFixed(0)}</p>
            </div>
        `).join('');
    }

    function displayTopHotels(orders) {
        const hotels = {};
        
        orders.forEach(order => {
            // Count by items (since we don't have explicit hotel field in orders)
            hotels['All Orders'] = (hotels['All Orders'] || 0) + (order.totalAmount || 0);
        });

        const container = document.getElementById('top-hotels');
        const sorted = Object.entries(hotels)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 5);

        container.innerHTML = sorted.map(([hotel, revenue]) => `
            <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg border-l-2 border-purple-600">
                <span class="text-sm font-bold text-gray-800">🏢 ${hotel}</span>
                <span class="text-lg font-black text-purple-600">₹${revenue.toFixed(0)}</span>
            </div>
        `).join('');
    }

    loadReports();
</script>
</body>
</html>
