<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodHub Admin - Hotels & Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 text-gray-800">

    <header class="bg-red-600 text-white p-5 shadow-lg">
        <h1 class="text-2xl font-black">🍔 FoodHub Admin Panel</h1>
    </header>

    <!-- TABS -->
    <div class="bg-white border-b flex gap-0">
        <button onclick="switchTab('hotels')" id="tab-hotels" class="flex-1 py-4 font-black text-red-600 border-b-4 border-red-600">🏪 HOTELS</button>
        <button onclick="switchTab('menu')" id="tab-menu" class="flex-1 py-4 font-black text-gray-600">🍽️ MENU ITEMS</button>
        <button onclick="switchTab('drivers')" id="tab-drivers" class="flex-1 py-4 font-black text-gray-600">🚗 DRIVERS & COMMISSION</button>
    </div>

    <div class="container mx-auto p-6">

        <!-- ========== HOTELS TAB ========== -->
        <div id="section-hotels" class="space-y-6">
            <h2 class="text-2xl font-black">Hotels Management</h2>
            <div class="bg-white p-6 rounded-xl shadow-lg">
                <h3 class="text-lg font-black mb-4">Add New Hotel</h3>
                <div class="space-y-3">
                    <input id="hotelName" type="text" placeholder="Hotel Name" class="w-full p-3 border-2 rounded-lg text-sm">
                    <input id="hotelImage" type="text" placeholder="Hotel Image URL" class="w-full p-3 border-2 rounded-lg text-sm">
                    <input id="hotelAddress" type="text" placeholder="Hotel Address (Full Address)" class="w-full p-3 border-2 rounded-lg text-sm">
                    <button onclick="addHotel()" class="w-full bg-red-600 text-white py-3 rounded-lg font-black uppercase">Add Hotel</button>
                </div>
            </div>
            <div id="hotels-list" class="space-y-3"></div>
        </div>

        <!-- ========== MENU ITEMS TAB ========== -->
        <div id="section-menu" class="hidden space-y-6">
            <h2 class="text-2xl font-black">Menu Items Management</h2>
            <div class="bg-white p-6 rounded-xl shadow-lg">
                <h3 class="text-lg font-black mb-4">Add New Menu Item</h3>
                <div class="space-y-3">
                    <select id="menuHotel" class="w-full p-3 border-2 rounded-lg text-sm">
                        <option>Select Hotel</option>
                    </select>
                    <input id="dishName" type="text" placeholder="Dish Name" class="w-full p-3 border-2 rounded-lg text-sm">
                    <input id="dishPrice" type="number" placeholder="Price (₹)" class="w-full p-3 border-2 rounded-lg text-sm">
                    <input id="dishImage" type="text" placeholder="Dish Image URL" class="w-full p-3 border-2 rounded-lg text-sm">
                    <button onclick="addMenuItem()" class="w-full bg-red-600 text-white py-3 rounded-lg font-black uppercase">Add Menu Item</button>
                </div>
            </div>
            <div id="menu-list" class="space-y-3"></div>
        </div>

        <!-- ========== DRIVERS & COMMISSION TAB ========== -->
        <div id="section-drivers" class="hidden space-y-6">
            <h2 class="text-2xl font-black">Drivers & Commission Management</h2>
            
            <!-- COMMISSION SETTINGS -->
            <div class="bg-blue-50 border-2 border-blue-600 p-6 rounded-xl">
                <h3 class="text-lg font-black mb-4 text-blue-600">⚙️ Commission Settings</h3>
                <div class="space-y-3">
                    <div class="flex items-center gap-3">
                        <label class="font-black text-sm">Current Commission:</label>
                        <span id="currentCommission" class="text-2xl font-black text-blue-600">10%</span>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="decreaseCommission()" class="flex-1 bg-red-600 text-white py-3 rounded-lg font-black uppercase text-lg">− 1%</button>
                        <button onclick="increaseCommission()" class="flex-1 bg-green-600 text-white py-3 rounded-lg font-black uppercase text-lg">+ 1%</button>
                    </div>
                    <p class="text-xs text-gray-600">Drivers earn this % from every order total</p>
                </div>
            </div>

            <!-- REGISTER NEW DRIVER -->
            <div class="bg-white p-6 rounded-xl shadow-lg">
                <h3 class="text-lg font-black mb-4">Register New Driver</h3>
                <div class="space-y-3">
                    <input id="driverName" type="text" placeholder="Driver Name" class="w-full p-3 border-2 rounded-lg text-sm">
                    <input id="driverPhone" type="tel" placeholder="Phone Number" class="w-full p-3 border-2 rounded-lg text-sm">
                    <input id="driverEmail" type="email" placeholder="Email" class="w-full p-3 border-2 rounded-lg text-sm">
                    <input id="driverVehicle" type="text" placeholder="Vehicle (e.g. Bike, Car)" class="w-full p-3 border-2 rounded-lg text-sm">
                    <button onclick="registerDriver()" class="w-full bg-red-600 text-white py-3 rounded-lg font-black uppercase">Register Driver</button>
                </div>
            </div>

            <!-- DRIVERS LIST -->
            <div id="drivers-list" class="space-y-3"></div>
        </div>

    </div>

    <!-- STATS -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t-4 border-red-600 p-4 flex gap-4 justify-center">
        <div class="text-center">
            <p class="text-xs font-black text-gray-600">Hotels</p>
            <p id="stat-hotels" class="text-2xl font-black text-red-600">0</p>
        </div>
        <div class="text-center">
            <p class="text-xs font-black text-gray-600">Menu Items</p>
            <p id="stat-items" class="text-2xl font-black text-red-600">0</p>
        </div>
        <div class="text-center">
            <p class="text-xs font-black text-gray-600">Drivers</p>
            <p id="stat-drivers" class="text-2xl font-black text-red-600">0</p>
        </div>
        <div class="text-center">
            <p class="text-xs font-black text-gray-600">Commission</p>
            <p id="stat-commission" class="text-2xl font-black text-blue-600">10%</p>
        </div>
    </div>

    <div class="pb-20"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDMz8C0GSPbsYKinLVpUT1PLejBscKw_pc",
            authDomain: "train-parcel.firebaseapp.com",
            databaseURL: "https://train-parcel-default-rtdb.firebaseio.com",
            projectId: "train-parcel",
            storageBucket: "train-parcel.firebasestorage.app",
            messagingSenderId: "357680905494",
            appId: "1:357680905494:web:072f547f8fc7c05a1ce437"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let hotelData = {};
        let driversData = {};
        let commission = 10;

        window.switchTab = (tab) => {
            ['hotels', 'menu', 'drivers'].forEach(t => {
                document.getElementById(`section-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('border-b-4', 'border-red-600', 'text-red-600');
                document.getElementById(`tab-${t}`).classList.add('text-gray-600');
            });
            document.getElementById(`section-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('border-b-4', 'border-red-600', 'text-red-600');
        };

        window.addHotel = () => {
            const name = document.getElementById('hotelName').value;
            const image = document.getElementById('hotelImage').value;
            const address = document.getElementById('hotelAddress').value;
            if(!name || !image || !address) return alert("❌ Please fill all fields");
            
            push(ref(db, 'hotels'), {
                name: name,
                image: image,
                address: address,
                createdAt: Date.now()
            }).then(() => {
                document.getElementById('hotelName').value = "";
                document.getElementById('hotelImage').value = "";
                document.getElementById('hotelAddress').value = "";
                alert("✅ Hotel added!");
            });
        };

        window.addMenuItem = () => {
            const hotelId = document.getElementById('menuHotel').value;
            const dish = document.getElementById('dishName').value;
            const price = document.getElementById('dishPrice').value;
            const image = document.getElementById('dishImage').value;
            if(!hotelId || !dish || !price || !image) return alert("❌ Please fill all fields");
            
            push(ref(db, `hotels/${hotelId}/menu`), {
                dish: dish,
                price: parseInt(price),
                dishImg: image,
                createdAt: Date.now()
            }).then(() => {
                document.getElementById('dishName').value = "";
                document.getElementById('dishPrice').value = "";
                document.getElementById('dishImage').value = "";
                alert("✅ Menu item added!");
            });
        };

        window.registerDriver = () => {
            const name = document.getElementById('driverName').value;
            const phone = document.getElementById('driverPhone').value;
            const email = document.getElementById('driverEmail').value;
            const vehicle = document.getElementById('driverVehicle').value;
            if(!name || !phone || !email || !vehicle) return alert("❌ Please fill all fields");
            
            push(ref(db, 'drivers'), {
                name: name,
                phone: phone,
                email: email,
                vehicle: vehicle,
                status: "available",
                commission: commission,
                createdAt: Date.now()
            }).then(() => {
                document.getElementById('driverName').value = "";
                document.getElementById('driverPhone').value = "";
                document.getElementById('driverEmail').value = "";
                document.getElementById('driverVehicle').value = "";
                alert("✅ Driver registered!");
            });
        };

        window.increaseCommission = () => {
            commission = Math.min(50, commission + 1);
            update(ref(db, 'settings'), { commission: commission });
            updateCommissionDisplay();
        };

        window.decreaseCommission = () => {
            commission = Math.max(5, commission - 1);
            update(ref(db, 'settings'), { commission: commission });
            updateCommissionDisplay();
        };

        function updateCommissionDisplay() {
            document.getElementById('currentCommission').innerText = commission + "%";
            document.getElementById('stat-commission').innerText = commission + "%";
        }

        function renderHotels() {
            const container = document.getElementById('hotels-list');
            const select = document.getElementById('menuHotel');
            container.innerHTML = "";
            select.innerHTML = "<option>Select Hotel</option>";
            
            Object.keys(hotelData).forEach(hId => {
                const h = hotelData[hId];
                select.innerHTML += `<option value="${hId}">${h.name}</option>`;
                
                let itemCount = h.menu ? Object.keys(h.menu).length : 0;
                container.innerHTML += `
                <div class="bg-white p-4 rounded-lg shadow-md border-l-4 border-red-600">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-black text-lg">${h.name}</h3>
                            <p class="text-xs text-gray-600">📍 ${h.address || 'No address'}</p>
                            <p class="text-xs text-gray-600 mt-1">${itemCount} menu items</p>
                        </div>
                        <button onclick="deleteHotel('${hId}')" class="bg-red-600 text-white px-4 py-2 rounded-lg font-black text-xs">Delete</button>
                    </div>
                </div>`;
            });
            
            document.getElementById('stat-hotels').innerText = Object.keys(hotelData).length;
        }

        function renderMenuItems() {
            const container = document.getElementById('menu-list');
            container.innerHTML = "";
            let totalItems = 0;
            
            Object.keys(hotelData).forEach(hId => {
                const h = hotelData[hId];
                if(h.menu) {
                    Object.keys(h.menu).forEach(mId => {
                        const m = h.menu[mId];
                        totalItems++;
                        container.innerHTML += `
                        <div class="bg-white p-4 rounded-lg shadow-md">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="font-black">${m.dish}</h3>
                                    <p class="text-sm text-gray-600">${h.name}</p>
                                    <p class="font-black text-red-600">₹${m.price}</p>
                                </div>
                                <button onclick="deleteMenuItem('${hId}', '${mId}')" class="bg-red-600 text-white px-4 py-2 rounded-lg font-black text-xs">Delete</button>
                            </div>
                        </div>`;
                    });
                }
            });
            
            document.getElementById('stat-items').innerText = totalItems;
        }

        function renderDrivers() {
            const container = document.getElementById('drivers-list');
            container.innerHTML = "";
            
            Object.keys(driversData).forEach(dId => {
                const d = driversData[dId];
                container.innerHTML += `
                <div class="bg-white p-4 rounded-lg shadow-md border-l-4 border-blue-600">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-black">${d.name}</h3>
                            <p class="text-sm text-gray-600">📞 ${d.phone}</p>
                            <p class="text-sm text-gray-600">🚗 ${d.vehicle}</p>
                            <p class="text-xs font-black text-blue-600 mt-1">Commission: ${d.commission || commission}%</p>
                        </div>
                        <button onclick="deleteDriver('${dId}')" class="bg-red-600 text-white px-4 py-2 rounded-lg font-black text-xs">Delete</button>
                    </div>
                </div>`;
            });
            
            document.getElementById('stat-drivers').innerText = Object.keys(driversData).length;
        }

        window.deleteHotel = (id) => {
            if(confirm("Delete this hotel?")) remove(ref(db, `hotels/${id}`));
        };

        window.deleteMenuItem = (hId, mId) => {
            if(confirm("Delete this item?")) remove(ref(db, `hotels/${hId}/menu/${mId}`));
        };

        window.deleteDriver = (id) => {
            if(confirm("Delete this driver?")) remove(ref(db, `drivers/${id}`));
        };

        // LOAD DATA
        onValue(ref(db, 'hotels'), (snap) => {
            hotelData = snap.val() || {};
            renderHotels();
            renderMenuItems();
        });

        onValue(ref(db, 'drivers'), (snap) => {
            driversData = snap.val() || {};
            renderDrivers();
        });

        onValue(ref(db, 'settings/commission'), (snap) => {
            commission = snap.val() || 10;
            updateCommissionDisplay();
        });
    </script>
</body>
</html>
