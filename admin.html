<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - FoodHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-red-50 pb-40">

    <header class="bg-white shadow-md sticky top-0 z-40 border-b-4 border-red-600">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black text-red-600">⚙️ Admin Panel</h1>
            <a href="control.html" class="bg-red-600 text-white px-3 py-1 rounded-full text-xs font-bold"><i class="fa-solid fa-home mr-1"></i>Home</a>
        </div>
    </header>

    <div class="max-w-4xl mx-auto px-4 space-y-6 py-6">

        <!-- TABS -->
        <div class="flex gap-2 bg-white p-2 rounded-lg shadow-md flex-wrap sticky top-20 z-30">
            <button onclick="switchTab('hotels')" class="py-2 px-4 rounded-lg text-xs font-black uppercase transition-all bg-red-600 text-white" id="tab-hotels">🏢 Hotels</button>
            <button onclick="switchTab('menu')" class="py-2 px-4 rounded-lg text-xs font-black uppercase transition-all bg-gray-200 text-gray-700" id="tab-menu">📋 Menu Items</button>
            <button onclick="switchTab('drivers')" class="py-2 px-4 rounded-lg text-xs font-black uppercase transition-all bg-gray-200 text-gray-700" id="tab-drivers">🚚 Drivers</button>
        </div>

        <!-- HOTELS TAB -->
        <div id="hotels-tab" class="space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-md border-l-4 border-red-600">
                <h2 class="text-xl font-black text-gray-800 mb-4">➕ Add New Hotel</h2>
                <div class="space-y-3">
                    <input type="text" id="hotel-name" placeholder="Hotel Name *" class="w-full p-3 border rounded-lg bg-gray-50 text-sm font-bold" required>
                    <input type="text" id="hotel-cuisines" placeholder="Cuisines (e.g., Indian, Chinese)" class="w-full p-3 border rounded-lg bg-gray-50 text-sm">
                    <input type="text" id="hotel-image" placeholder="Hotel Image URL" class="w-full p-3 border rounded-lg bg-gray-50 text-sm" placeholder="https://example.com/image.jpg">
                    <button onclick="addHotel()" class="w-full bg-green-600 text-white py-3 rounded-lg font-black uppercase shadow-md active:scale-95">Add Hotel</button>
                </div>
            </div>

            <div>
                <h2 class="text-xl font-black text-gray-800 mb-4">🏢 All Hotels</h2>
                <div id="hotels-list" class="space-y-3"></div>
            </div>
        </div>

        <!-- MENU TAB -->
        <div id="menu-tab" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-md border-l-4 border-purple-600">
                <h2 class="text-xl font-black text-gray-800 mb-4">➕ Add Menu Item</h2>
                <div class="space-y-3">
                    <select id="menu-hotel" class="w-full p-3 border rounded-lg bg-gray-50 text-sm font-bold" required>
                        <option value="">Select Hotel *</option>
                    </select>
                    <input type="text" id="item-name" placeholder="Item Name *" class="w-full p-3 border rounded-lg bg-gray-50 text-sm font-bold" required>
                    <input type="text" id="item-description" placeholder="Description" class="w-full p-3 border rounded-lg bg-gray-50 text-sm">
                    <input type="number" id="item-price" placeholder="Price *" class="w-full p-3 border rounded-lg bg-gray-50 text-sm font-bold" step="10" required>
                    <input type="text" id="item-image" placeholder="Item Image URL" class="w-full p-3 border rounded-lg bg-gray-50 text-sm" placeholder="https://example.com/food.jpg">
                    <button onclick="addMenuItem()" class="w-full bg-green-600 text-white py-3 rounded-lg font-black uppercase shadow-md active:scale-95">Add Item</button>
                </div>
            </div>

            <div>
                <h2 class="text-xl font-black text-gray-800 mb-4">📋 Menu Items</h2>
                <div id="menu-list" class="space-y-3"></div>
            </div>
        </div>

        <!-- DRIVERS TAB -->
        <div id="drivers-tab" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-md border-l-4 border-blue-600">
                <h2 class="text-xl font-black text-gray-800 mb-4">➕ Register Delivery Boy</h2>
                <div class="space-y-3">
                    <input type="text" id="driver-name" placeholder="Full Name *" class="w-full p-3 border rounded-lg bg-gray-50 text-sm font-bold" required>
                    <input type="tel" id="driver-phone" placeholder="Phone Number *" class="w-full p-3 border rounded-lg bg-gray-50 text-sm font-bold" required>
                    <input type="email" id="driver-email" placeholder="Email (optional)" class="w-full p-3 border rounded-lg bg-gray-50 text-sm">
                    <input type="text" id="driver-vehicle" placeholder="Vehicle Type (Bike/Cycle) *" class="w-full p-3 border rounded-lg bg-gray-50 text-sm" required>
                    <button onclick="addDriver()" class="w-full bg-green-600 text-white py-3 rounded-lg font-black uppercase shadow-md active:scale-95">Register Driver</button>
                </div>
            </div>

            <div>
                <h2 class="text-xl font-black text-gray-800 mb-4">🚚 Registered Drivers</h2>
                <div id="drivers-list" class="space-y-3"></div>
            </div>
        </div>

        <!-- STATS -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white p-4 rounded-xl shadow-md text-center border-t-4 border-red-600">
                <p class="text-xs text-gray-500 font-bold uppercase">Hotels</p>
                <p id="stat-hotels" class="text-3xl font-black text-red-600 mt-2">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-md text-center border-t-4 border-purple-600">
                <p class="text-xs text-gray-500 font-bold uppercase">Items</p>
                <p id="stat-items" class="text-3xl font-black text-purple-600 mt-2">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-md text-center border-t-4 border-blue-600">
                <p class="text-xs text-gray-500 font-bold uppercase">Drivers</p>
                <p id="stat-drivers" class="text-3xl font-black text-blue-600 mt-2">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-md text-center border-t-4 border-green-600">
                <p class="text-xs text-gray-500 font-bold uppercase">Orders</p>
                <p id="stat-orders" class="text-3xl font-black text-green-600 mt-2">0</p>
            </div>
        </div>

        <!-- NAV -->
        <div class="flex gap-2 mt-8">
            <a href="index.html" class="flex-1 bg-yellow-600 text-white py-3 rounded-lg font-black uppercase text-center shadow-md active:scale-95">🛒 Customer</a>
            <a href="kitchen.html" class="flex-1 bg-orange-600 text-white py-3 rounded-lg font-black uppercase text-center shadow-md active:scale-95">👨‍🍳 Kitchen</a>
            <a href="delivery.html" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-black uppercase text-center shadow-md active:scale-95">🚚 Delivery</a>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div id="editModal" class="hidden fixed inset-0 bg-black/60 z-[200] flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-2xl">
            <h3 class="text-lg font-black text-gray-800 mb-4">✏️ Edit Item</h3>
            <div class="space-y-3">
                <input type="text" id="edit-name" placeholder="Name" class="w-full p-3 border rounded-lg bg-gray-50 text-sm font-bold">
                <input type="text" id="edit-desc" placeholder="Description" class="w-full p-3 border rounded-lg bg-gray-50 text-sm">
                <input type="number" id="edit-price" placeholder="Price" class="w-full p-3 border rounded-lg bg-gray-50 text-sm font-bold" step="10">
                <input type="text" id="edit-image" placeholder="Image URL" class="w-full p-3 border rounded-lg bg-gray-50 text-sm">
                <div class="flex gap-2">
                    <button onclick="saveEdit()" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-black uppercase">Save</button>
                    <button onclick="closeEditModal()" class="flex-1 bg-gray-300 text-gray-700 py-3 rounded-lg font-black uppercase">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDMz8C0GSPbsYKinLVpUT1PLejBscKw_pc",
            authDomain: "train-parcel.firebaseapp.com",
            databaseURL: "https://train-parcel-default-rtdb.firebaseio.com",
            projectId: "train-parcel",
            storageBucket: "train-parcel.firebasestorage.app",
            messagingSenderId: "357680905494",
            appId: "1:357680905494:web:072f547f8fc7c05a1ce437"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let hotels = {};
        let editingId = null, editingHotelId = null;

        // SWITCH TABS
        function switchTab(tab) {
            document.getElementById('hotels-tab').classList.toggle('hidden', tab !== 'hotels');
            document.getElementById('menu-tab').classList.toggle('hidden', tab !== 'menu');
            document.getElementById('drivers-tab').classList.toggle('hidden', tab !== 'drivers');

            ['hotels', 'menu', 'drivers'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.toggle('bg-red-600', tab === 'hotels' && t === 'hotels');
                document.getElementById(`tab-${t}`).classList.toggle('bg-purple-600', tab === 'menu' && t === 'menu');
                document.getElementById(`tab-${t}`).classList.toggle('bg-blue-600', tab === 'drivers' && t === 'drivers');
                document.getElementById(`tab-${t}`).classList.toggle('text-white', ['hotels', 'menu', 'drivers'].includes(tab));
            });

            if (tab === 'menu') loadHotelsDropdown();
        }

        // ===== HOTELS =====
        function addHotel() {
            const name = document.getElementById('hotel-name').value.trim();
            const cuisines = document.getElementById('hotel-cuisines').value.trim();
            const image = document.getElementById('hotel-image').value.trim();

            if (!name) return alert('❌ Please fill hotel name');

            db.ref('hotels').push({name, cuisines, image, createdAt: new Date().toISOString()}).then(() => {
                document.getElementById('hotel-name').value = '';
                document.getElementById('hotel-cuisines').value = '';
                document.getElementById('hotel-image').value = '';
                alert('✅ Hotel added!');
            });
        }

        function deleteHotel(id) {
            if (confirm('❌ Delete hotel and ALL items?')) {
                db.ref('hotels').child(id).remove();
                db.ref('menuItems').child(id).remove();
            }
        }

        function loadHotels() {
            db.ref('hotels').on('value', snap => {
                hotels = snap.val() || {};
                displayHotels();
                document.getElementById('stat-hotels').textContent = Object.keys(hotels).length;
            });
        }

        function displayHotels() {
            const container = document.getElementById('hotels-list');
            if (Object.keys(hotels).length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 py-8">No hotels</p>';
                return;
            }

            container.innerHTML = Object.entries(hotels).map(([id, h]) => `
                <div class="bg-white p-4 rounded-xl shadow-md border-l-4 border-red-600">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <h4 class="font-black text-lg text-gray-800">${h.name}</h4>
                            <p class="text-xs text-gray-500">${h.cuisines || 'Multi-cuisine'}</p>
                            ${h.image ? `<p class="text-xs text-gray-400 mt-1">🖼️ Image: ${h.image.substring(0, 40)}...</p>` : ''}
                        </div>
                    </div>
                    <button onclick="deleteHotel('${id}')" class="w-full bg-red-600 text-white py-2 rounded-lg text-xs font-bold uppercase mt-2">Delete</button>
                </div>
            `).join('');
        }

        // ===== MENU =====
        function loadHotelsDropdown() {
            const select = document.getElementById('menu-hotel');
            select.innerHTML = '<option value="">Select Hotel</option>';
            Object.entries(hotels).forEach(([id, h]) => {
                select.innerHTML += `<option value="${id}">${h.name}</option>`;
            });
        }

        function addMenuItem() {
            const hotelId = document.getElementById('menu-hotel').value;
            const name = document.getElementById('item-name').value.trim();
            const desc = document.getElementById('item-description').value.trim();
            const price = parseInt(document.getElementById('item-price').value);
            const image = document.getElementById('item-image').value.trim();

            if (!hotelId || !name || !price) return alert('❌ Fill required fields');

            db.ref(`menuItems/${hotelId}`).push({name, description: desc, price, image, createdAt: new Date().toISOString()}).then(() => {
                document.getElementById('item-name').value = '';
                document.getElementById('item-description').value = '';
                document.getElementById('item-price').value = '';
                document.getElementById('item-image').value = '';
                alert('✅ Item added!');
            });
        }

        function deleteMenuItem(hotelId, itemId) {
            if (confirm('❌ Delete item?')) {
                db.ref(`menuItems/${hotelId}/${itemId}`).remove();
            }
        }

        function openEditModal(hotelId, itemId, name, desc, price, image) {
            editingId = itemId;
            editingHotelId = hotelId;
            document.getElementById('edit-name').value = name;
            document.getElementById('edit-desc').value = desc;
            document.getElementById('edit-price').value = price;
            document.getElementById('edit-image').value = image;
            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
        }

        function saveEdit() {
            const name = document.getElementById('edit-name').value.trim();
            const desc = document.getElementById('edit-desc').value.trim();
            const price = parseInt(document.getElementById('edit-price').value);
            const image = document.getElementById('edit-image').value.trim();

            if (!name || !price) return alert('❌ Fill required fields');

            db.ref(`menuItems/${editingHotelId}/${editingId}`).update({name, description: desc, price, image}).then(() => {
                closeEditModal();
                alert('✅ Item updated!');
            });
        }

        function loadMenu() {
            db.ref('menuItems').on('value', snap => {
                const allItems = snap.val() || {};
                displayMenu(allItems);

                let totalItems = 0;
                Object.keys(allItems).forEach(hid => {
                    totalItems += Object.keys(allItems[hid] || {}).length;
                });
                document.getElementById('stat-items').textContent = totalItems;
            });
        }

        function displayMenu(allItems) {
            const container = document.getElementById('menu-list');
            let html = '';

            Object.entries(allItems).forEach(([hotelId, items]) => {
                const hotelName = hotels[hotelId]?.name || 'Unknown';
                html += `<div class="bg-gray-100 p-4 rounded-lg mb-4"><h3 class="font-black text-gray-800 mb-2">${hotelName}</h3>`;
                
                Object.entries(items || {}).forEach(([itemId, item]) => {
                    html += `
                    <div class="bg-white p-3 rounded-lg mb-2 border-l-4 border-purple-600">
                        <div class="flex justify-between items-start mb-2">
                            <div class="flex-1">
                                <p class="font-bold text-gray-800">${item.name}</p>
                                <p class="text-xs text-gray-500">${item.description || ''}</p>
                                <p class="text-lg font-black text-purple-600 mt-1">₹${item.price}</p>
                                ${item.image ? `<p class="text-xs text-gray-400 mt-1">🖼️ ${item.image.substring(0, 35)}...</p>` : ''}
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="openEditModal('${hotelId}', '${itemId}', '${item.name}', '${item.description || ''}', ${item.price}, '${item.image || ''}')" class="flex-1 bg-blue-600 text-white py-1 rounded text-xs font-bold uppercase">✏️ Edit</button>
                            <button onclick="deleteMenuItem('${hotelId}', '${itemId}')" class="flex-1 bg-red-600 text-white py-1 rounded text-xs font-bold uppercase">🗑️ Delete</button>
                        </div>
                    </div>`;
                });
                html += '</div>';
            });

            container.innerHTML = html || '<p class="text-center text-gray-500 py-8">No items</p>';
        }

        // ===== DRIVERS =====
        function addDriver() {
            const name = document.getElementById('driver-name').value.trim();
            const phone = document.getElementById('driver-phone').value.trim();
            const email = document.getElementById('driver-email').value.trim();
            const vehicle = document.getElementById('driver-vehicle').value.trim();

            if (!name || !phone || !vehicle) return alert('❌ Fill required fields');

            db.ref('drivers').push({name, phone, email, vehicle, status: 'active', createdAt: new Date().toISOString()}).then(() => {
                document.getElementById('driver-name').value = '';
                document.getElementById('driver-phone').value = '';
                document.getElementById('driver-email').value = '';
                document.getElementById('driver-vehicle').value = '';
                alert('✅ Driver registered!');
            });
        }

        function deleteDriver(id) {
            if (confirm('❌ Remove driver?')) {
                db.ref('drivers').child(id).remove();
            }
        }

        function loadDrivers() {
            db.ref('drivers').on('value', snap => {
                const drivers = snap.val() || {};
                displayDrivers(drivers);
                document.getElementById('stat-drivers').textContent = Object.keys(drivers).length;
            });
        }

        function displayDrivers(drivers) {
            const container = document.getElementById('drivers-list');
            if (Object.keys(drivers).length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 py-8">No drivers</p>';
                return;
            }

            container.innerHTML = Object.entries(drivers).map(([id, d]) => `
                <div class="bg-white p-4 rounded-xl shadow-md border-l-4 border-blue-600">
                    <p class="font-black text-lg text-gray-800">${d.name}</p>
                    <p class="text-xs text-gray-500">📱 ${d.phone}</p>
                    <p class="text-xs text-gray-500">🏍️ ${d.vehicle}</p>
                    ${d.email ? `<p class="text-xs text-gray-500">✉️ ${d.email}</p>` : ''}
                    <p class="text-xs text-green-600 font-bold mt-1">Status: ${d.status}</p>
                    <button onclick="deleteDriver('${id}')" class="w-full bg-red-600 text-white py-2 rounded-lg text-xs font-bold uppercase mt-2">Remove</button>
                </div>
            `).join('');
        }

        // LOAD ORDERS
        function loadOrders() {
            db.ref('orders').on('value', snap => {
                document.getElementById('stat-orders').textContent = snap.val() ? Object.keys(snap.val()).length : 0;
            });
        }

        // INITIALIZE
        window.addEventListener('load', () => {
            loadHotels();
            loadMenu();
            loadDrivers();
            loadOrders();
        });
    </script>
</body>
</html>
