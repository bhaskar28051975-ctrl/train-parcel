<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FoodHub - Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 0;
        }

        .container {
            width: 100%;
            max-width: 100%;
            padding: 0;
        }

        header {
            background: white;
            padding: 15px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            width: 100%;
        }

        header h1 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            overflow-x: auto;
        }

        .nav-links a {
            padding: 8px 12px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 12px;
            white-space: nowrap;
            transition: background 0.3s;
        }

        .nav-links a.active {
            background: #764ba2;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 15px;
        }

        .stat-card {
            background: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin: 8px 0;
        }

        .stat-label {
            color: #666;
            font-size: 11px;
        }

        .content {
            padding: 15px;
            min-height: calc(100vh - 300px);
        }

        .form-section {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .form-section h2 {
            color: #667eea;
            font-size: 16px;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
            font-size: 13px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 70px;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .menu-list-section {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .menu-list-section h2 {
            color: #667eea;
            font-size: 16px;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .menu-items {
            display: grid;
            gap: 12px;
        }

        .menu-item-card {
            background: #f8f9ff;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .menu-item-info {
            flex: 1;
        }

        .menu-item-info h3 {
            color: #333;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .menu-item-info p {
            color: #666;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .menu-item-price {
            color: #667eea;
            font-weight: bold;
            font-size: 14px;
        }

        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            transition: background 0.3s;
            white-space: nowrap;
        }

        .delete-btn:active {
            background: #ee5a52;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 30px 10px;
            font-size: 13px;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 12px;
            display: none;
            font-size: 13px;
            border-left: 4px solid #28a745;
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 20px;
            }

            .nav-links a {
                font-size: 11px;
                padding: 6px 10px;
            }

            .form-section,
            .menu-list-section {
                padding: 12px;
            }

            .menu-item-card {
                flex-direction: column;
            }

            .delete-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚙️ Admin</h1>
            <div class="nav-links">
                <a href="index.html">🛒 Order</a>
                <a href="kitchen.html">👨‍🍳 Kitchen</a>
                <a href="delivery.html">🚚 Delivery</a>
                <a href="admin.html" class="active">⚙️ Admin</a>
                <a href="reports.html">📊 Reports</a>
            </div>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Menu Items</div>
                <div class="stat-number" id="menuCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Orders</div>
                <div class="stat-number" id="orderCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Revenue</div>
                <div class="stat-number" id="totalRevenue">₹0</div>
            </div>
        </div>

        <div class="content">
            <div class="form-section">
                <h2>➕ Add Menu Item</h2>
                <div class="success-message" id="successMessage">
                    ✓ Item added successfully!
                </div>
                <form id="menuForm">
                    <div class="form-group">
                        <label>Item Name *</label>
                        <input type="text" id="itemName" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="itemDesc"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Price (₹) *</label>
                        <input type="number" id="itemPrice" min="0" step="10" required>
                    </div>
                    <button type="submit" class="submit-btn">Add Item</button>
                </form>
            </div>

            <div class="menu-list-section">
                <h2>📋 All Menu Items</h2>
                <div class="menu-items" id="menuList">
                    <div class="empty-message">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDMz8C0GSPbsYKinLVpUT1PLejBscKw_pc",
            authDomain: "train-parcel.firebaseapp.com",
            databaseURL: "https://train-parcel-default-rtdb.firebaseio.com",
            projectId: "train-parcel",
            storageBucket: "train-parcel.firebasestorage.app",
            messagingSenderId: "357680905494",
            appId: "1:357680905494:web:072f547f8fc7c05a1ce437",
            measurementId: "G-SQX8M0MKHT"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let menuItems = [];
        let allOrders = [];

        document.getElementById('menuForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const item = {
                name: document.getElementById('itemName').value,
                description: document.getElementById('itemDesc').value,
                price: parseInt(document.getElementById('itemPrice').value),
                createdAt: new Date().toISOString()
            };

            const newRef = database.ref('menuItems').push();
            newRef.set(item).then(() => {
                document.getElementById('successMessage').style.display = 'block';
                document.getElementById('menuForm').reset();

                setTimeout(() => {
                    document.getElementById('successMessage').style.display = 'none';
                }, 3000);
            }).catch(err => {
                alert('❌ Error: ' + err.message);
            });
        });

        function loadMenu() {
            database.ref('menuItems').on('value', (snapshot) => {
                menuItems = [];
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).forEach(key => {
                        menuItems.push({id: key, ...data[key]});
                    });
                }
                displayMenu();
                updateStats();
            });
        }

        function displayMenu() {
            const container = document.getElementById('menuList');
            document.getElementById('menuCount').textContent = menuItems.length;

            if (menuItems.length === 0) {
                container.innerHTML = '<div class="empty-message">No items yet</div>';
                return;
            }

            container.innerHTML = menuItems.map(item => `
                <div class="menu-item-card">
                    <div class="menu-item-info">
                        <h3>${item.name}</h3>
                        <p>${item.description || 'No description'}</p>
                        <div class="menu-item-price">₹${item.price}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteMenuItem('${item.id}')">Delete</button>
                </div>
            `).join('');
        }

        function deleteMenuItem(id) {
            if (confirm('Delete this item?')) {
                database.ref('menuItems').child(id).remove();
            }
        }

        function loadOrders() {
            database.ref('orders').on('value', (snapshot) => {
                allOrders = [];
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).forEach(key => {
                        allOrders.push({id: key, ...data[key]});
                    });
                }
                updateStats();
            });
        }

        function updateStats() {
            document.getElementById('orderCount').textContent = allOrders.length;

            const totalRevenue = allOrders.reduce((sum, order) => sum + (order.total || 0), 0);
            document.getElementById('totalRevenue').textContent = '₹' + totalRevenue;
        }

        window.addEventListener('load', () => {
            loadMenu();
            loadOrders();
        });
    </script>
</body>
</html>
