<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - FoodHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-purple-50 pb-24">
    <header class="bg-white p-5 shadow-md sticky top-0 z-50 border-b-4 border-purple-600">
        <h1 class="text-2xl font-black text-purple-600">⚙️ Admin Panel</h1>
    </header>

    <div class="max-w-4xl mx-auto p-4 space-y-6">
        
        <!-- TABS -->
        <div class="flex gap-2 bg-white p-2 rounded-xl shadow-md flex-wrap">
            <button onclick="switchTab('hotels')" id="tab-hotels" class="py-2 px-4 rounded-lg text-xs font-black uppercase bg-purple-600 text-white">🏢 Hotels</button>
            <button onclick="switchTab('items')" id="tab-items" class="py-2 px-4 rounded-lg text-xs font-black uppercase bg-gray-200 text-gray-700">📋 Menu Items</button>
            <button onclick="switchTab('drivers')" id="tab-drivers" class="py-2 px-4 rounded-lg text-xs font-black uppercase bg-gray-200 text-gray-700">🚚 Drivers</button>
        </div>

        <!-- HOTELS TAB -->
        <div id="section-hotels" class="space-y-6">
            <div class="bg-white p-6 rounded-[2rem] shadow-xl border space-y-3">
                <h2 class="font-black text-gray-800 uppercase text-xs tracking-widest">➕ Add New Hotel</h2>
                <input id="hotelName" type="text" placeholder="Hotel Name" class="w-full p-3 border rounded-xl bg-gray-50 text-sm">
                <input id="hotelImg" type="text" placeholder="Hotel Image URL" class="w-full p-3 border rounded-xl bg-gray-50 text-sm">
                <button onclick="addHotel()" class="w-full bg-green-600 text-white py-4 rounded-xl font-black uppercase shadow-lg active:scale-95">Save Hotel</button>
            </div>

            <h2 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-2">🏢 Managed Hotels</h2>
            <div id="admin-hotel-list" class="space-y-4"></div>
        </div>

        <!-- ITEMS TAB -->
        <div id="section-items" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-[2rem] shadow-xl border space-y-3">
                <h2 class="font-black text-gray-800 uppercase text-xs tracking-widest">➕ Add Menu Item</h2>
                <select id="itemHotelSelect" class="w-full p-3 border rounded-xl bg-gray-50 text-sm font-bold">
                    <option value="">Select Hotel *</option>
                </select>
                <input id="itemName" type="text" placeholder="Item Name" class="w-full p-3 border rounded-xl bg-gray-50 text-sm">
                <input id="itemPrice" type="number" placeholder="Price" class="w-full p-3 border rounded-xl bg-gray-50 text-sm">
                <input id="itemImg" type="text" placeholder="Item Image URL" class="w-full p-3 border rounded-xl bg-gray-50 text-sm">
                <button onclick="addMenuItem()" class="w-full bg-green-600 text-white py-4 rounded-xl font-black uppercase shadow-lg active:scale-95">Add Item</button>
            </div>

            <h2 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-2">📋 All Menu Items</h2>
            <div id="admin-items-list" class="space-y-4"></div>
        </div>

        <!-- DRIVERS TAB -->
        <div id="section-drivers" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-[2rem] shadow-xl border space-y-3">
                <h2 class="font-black text-gray-800 uppercase text-xs tracking-widest">➕ Register Delivery Boy</h2>
                <input id="driverName" type="text" placeholder="Full Name" class="w-full p-3 border rounded-xl bg-gray-50 text-sm">
                <input id="driverPhone" type="tel" placeholder="Phone Number" class="w-full p-3 border rounded-xl bg-gray-50 text-sm">
                <input id="driverEmail" type="email" placeholder="Email (optional)" class="w-full p-3 border rounded-xl bg-gray-50 text-sm">
                <input id="driverVehicle" type="text" placeholder="Vehicle Type (Bike/Cycle)" class="w-full p-3 border rounded-xl bg-gray-50 text-sm">
                <button onclick="addDriver()" class="w-full bg-green-600 text-white py-4 rounded-xl font-black uppercase shadow-lg active:scale-95">Register Driver</button>
            </div>

            <h2 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-2">🚚 Registered Drivers</h2>
            <div id="admin-drivers-list" class="space-y-4"></div>
        </div>

        <!-- STATS -->
        <div class="grid grid-cols-4 gap-3 bg-white p-4 rounded-xl shadow-md">
            <div class="text-center">
                <p id="stat-hotels" class="text-2xl font-black text-purple-600">0</p>
                <p class="text-xs text-gray-500">Hotels</p>
            </div>
            <div class="text-center">
                <p id="stat-items" class="text-2xl font-black text-purple-600">0</p>
                <p class="text-xs text-gray-500">Items</p>
            </div>
            <div class="text-center">
                <p id="stat-drivers" class="text-2xl font-black text-purple-600">0</p>
                <p class="text-xs text-gray-500">Drivers</p>
            </div>
            <div class="text-center">
                <p id="stat-orders" class="text-2xl font-black text-purple-600">0</p>
                <p class="text-xs text-gray-500">Orders</p>
            </div>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div id="editModal" class="hidden fixed inset-0 bg-black/60 z-[200] flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-2xl">
            <h3 class="text-lg font-black text-gray-800 mb-4">✏️ Edit Item</h3>
            <div class="space-y-3">
                <input type="text" id="editItemName" placeholder="Item Name" class="w-full p-3 border rounded-lg bg-gray-50 text-sm font-bold">
                <input type="number" id="editItemPrice" placeholder="Price" class="w-full p-3 border rounded-lg bg-gray-50 text-sm">
                <input type="text" id="editItemImg" placeholder="Image URL" class="w-full p-3 border rounded-lg bg-gray-50 text-sm">
                <div class="flex gap-2">
                    <button onclick="saveEdit()" class="flex-1 bg-blue-600 text-white p-3 rounded-lg font-black uppercase">Save</button>
                    <button onclick="closeEditModal()" class="flex-1 bg-gray-300 text-gray-700 p-3 rounded-lg font-black uppercase">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDMz8C0GSPbsYKinLVpUT1PLejBscKw_pc",
        authDomain: "train-parcel.firebaseapp.com",
        databaseURL: "https://train-parcel-default-rtdb.firebaseio.com",
        projectId: "train-parcel",
        storageBucket: "train-parcel.firebasestorage.app",
        messagingSenderId: "357680905494",
        appId: "1:357680905494:web:072f547f8fc7c05a1ce437"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let hotels = {};
    let editingItemId = null;
    let editingHotelId = null;

    // SWITCH TABS
    window.switchTab = (tab) => {
        document.getElementById('section-hotels').classList.add('hidden');
        document.getElementById('section-items').classList.add('hidden');
        document.getElementById('section-drivers').classList.add('hidden');
        document.getElementById(`section-${tab}`).classList.remove('hidden');

        ['hotels', 'items', 'drivers'].forEach(t => {
            document.getElementById(`tab-${t}`).classList.remove('bg-purple-600', 'text-white');
            document.getElementById(`tab-${t}`).classList.add('bg-gray-200', 'text-gray-700');
        });
        document.getElementById(`tab-${tab}`).classList.remove('bg-gray-200', 'text-gray-700');
        document.getElementById(`tab-${tab}`).classList.add('bg-purple-600', 'text-white');
    };

    // HOTELS
    window.addHotel = () => {
        const name = document.getElementById('hotelName').value;
        const image = document.getElementById('hotelImg').value;
        if(name) {
            push(ref(db, 'hotels'), { 
                name, 
                image: image || "https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=400"
            });
            document.getElementById('hotelName').value = "";
            document.getElementById('hotelImg').value = "";
        }
    };

    window.deleteHotel = (id) => {
        if(confirm("Delete hotel and all items?")) remove(ref(db, `hotels/${id}`));
    };

    onValue(ref(db, 'hotels'), (snap) => {
        hotels = snap.val() || {};
        displayHotels();
        updateHotelSelect();
        updateStats();
        document.getElementById('stat-hotels').textContent = Object.keys(hotels).length;
    });

    function displayHotels() {
        const list = document.getElementById('admin-hotel-list');
        list.innerHTML = "";
        Object.keys(hotels).forEach(id => {
            const h = hotels[id];
            list.innerHTML += `
            <div class="p-4 bg-white rounded-2xl shadow-sm border">
                <p class="font-bold text-sm uppercase mb-3 text-purple-600">${h.name}</p>
                <button onclick="deleteHotel('${id}')" class="w-full bg-red-600 text-white py-2 rounded-lg text-xs font-bold uppercase">Delete</button>
            </div>`;
        });
    }

    function updateHotelSelect() {
        const select = document.getElementById('itemHotelSelect');
        select.innerHTML = '<option value="">Select Hotel *</option>';
        Object.keys(hotels).forEach(id => {
            select.innerHTML += `<option value="${id}">${hotels[id].name}</option>`;
        });
    }

    // MENU ITEMS
    window.addMenuItem = () => {
        const hotelId = document.getElementById('itemHotelSelect').value;
        const name = document.getElementById('itemName').value;
        const price = document.getElementById('itemPrice').value;
        const img = document.getElementById('itemImg').value;

        if(!hotelId || !name || !price) return alert("Fill required fields");

        push(ref(db, `hotels/${hotelId}/menu`), {
            dish: name,
            price: parseInt(price),
            dishImg: img || "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200"
        });

        document.getElementById('itemName').value = "";
        document.getElementById('itemPrice').value = "";
        document.getElementById('itemImg').value = "";
        document.getElementById('itemHotelSelect').value = "";
    };

    window.deleteItem = (hotelId, itemId) => {
        if(confirm("Delete item?")) remove(ref(db, `hotels/${hotelId}/menu/${itemId}`));
    };

    window.openEditModal = (hotelId, itemId, name, price, img) => {
        editingItemId = itemId;
        editingHotelId = hotelId;
        document.getElementById('editItemName').value = name;
        document.getElementById('editItemPrice').value = price;
        document.getElementById('editItemImg').value = img;
        document.getElementById('editModal').classList.remove('hidden');
    };

    window.closeEditModal = () => {
        document.getElementById('editModal').classList.add('hidden');
    };

    window.saveEdit = () => {
        const name = document.getElementById('editItemName').value;
        const price = document.getElementById('editItemPrice').value;
        const img = document.getElementById('editItemImg').value;

        if(!name || !price) return alert("Fill all fields");

        update(ref(db, `hotels/${editingHotelId}/menu/${editingItemId}`), {
            dish: name,
            price: parseInt(price),
            dishImg: img
        });

        closeEditModal();
    };

    onValue(ref(db, 'hotels'), (snap) => {
        const list = document.getElementById('admin-items-list');
        list.innerHTML = "";
        snap.forEach(hotelSnap => {
            const hotelId = hotelSnap.key;
            const hotel = hotelSnap.val();
            if(hotel.menu) {
                Object.keys(hotel.menu).forEach(itemId => {
                    const item = hotel.menu[itemId];
                    list.innerHTML += `
                    <div class="p-4 bg-white rounded-2xl shadow-sm border border-l-4 border-purple-600">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <p class="font-bold text-gray-800">${item.dish}</p>
                                <p class="text-sm text-purple-600 font-black">₹${item.price}</p>
                            </div>
                            <span class="text-xs bg-purple-100 text-purple-700 px-2 py-1 rounded">${hotel.name}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="openEditModal('${hotelId}', '${itemId}', '${item.dish}', ${item.price}, '${item.dishImg}')" class="flex-1 bg-blue-600 text-white py-2 rounded text-xs font-bold uppercase">✏️ Edit</button>
                            <button onclick="deleteItem('${hotelId}', '${itemId}')" class="flex-1 bg-red-600 text-white py-2 rounded text-xs font-bold uppercase">🗑️ Delete</button>
                        </div>
                    </div>`;
                });
            }
        });

        let itemCount = 0;
        snap.forEach(h => {
            if(h.val().menu) itemCount += Object.keys(h.val().menu).length;
        });
        document.getElementById('stat-items').textContent = itemCount;
    });

    // DRIVERS
    window.addDriver = () => {
        const name = document.getElementById('driverName').value;
        const phone = document.getElementById('driverPhone').value;
        const email = document.getElementById('driverEmail').value;
        const vehicle = document.getElementById('driverVehicle').value;

        if(!name || !phone || !vehicle) return alert("Fill required fields");

        push(ref(db, 'drivers'), {
            name, phone, email, vehicle,
            status: "active",
            createdAt: new Date().toISOString()
        });

        document.getElementById('driverName').value = "";
        document.getElementById('driverPhone').value = "";
        document.getElementById('driverEmail').value = "";
        document.getElementById('driverVehicle').value = "";
    };

    window.deleteDriver = (id) => {
        if(confirm("Remove driver?")) remove(ref(db, `drivers/${id}`));
    };

    onValue(ref(db, 'drivers'), (snap) => {
        const list = document.getElementById('admin-drivers-list');
        list.innerHTML = "";
        snap.forEach(child => {
            const driver = child.val();
            const driverId = child.key;
            list.innerHTML += `
            <div class="p-4 bg-white rounded-2xl shadow-sm border">
                <p class="font-bold text-gray-800">${driver.name}</p>
                <p class="text-xs text-gray-500">📱 ${driver.phone}</p>
                <p class="text-xs text-gray-500">🏍️ ${driver.vehicle}</p>
                ${driver.email ? `<p class="text-xs text-gray-500">✉️ ${driver.email}</p>` : ''}
                <p class="text-xs text-green-600 font-bold mt-2">Status: ${driver.status}</p>
                <button onclick="deleteDriver('${driverId}')" class="w-full mt-3 bg-red-600 text-white py-2 rounded-lg text-xs font-bold uppercase">Remove</button>
            </div>`;
        });
        document.getElementById('stat-drivers').textContent = snap.size;
    });

    function updateStats() {
        onValue(ref(db, 'orders'), (snap) => {
            document.getElementById('stat-orders').textContent = snap.size;
        });
    }

    updateStats();
</script>
</body>
</html>
