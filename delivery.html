<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery - FoodHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-green-50 pb-40">

    <header class="bg-white shadow-md sticky top-0 z-40 border-b-4 border-green-600">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black text-green-600">🚚 Delivery</h1>
            <a href="control.html" class="bg-green-600 text-white px-3 py-1 rounded-full text-xs font-bold"><i class="fa-solid fa-home mr-1"></i>Home</a>
        </div>
    </header>

    <!-- LOGIN FORM -->
    <div id="login-panel" class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl w-full max-w-sm shadow-2xl">
            <h2 class="text-2xl font-black text-gray-800 mb-4">Driver Login</h2>
            <p class="text-sm text-gray-500 mb-6">Enter your details to start accepting orders</p>
            <div class="space-y-3">
                <input type="text" id="driver-select" placeholder="Select Your Name" class="w-full p-3 border rounded-lg bg-gray-50 text-sm font-bold" list="drivers-list">
                <datalist id="drivers-list"></datalist>
                <button onclick="driverLogin()" class="w-full bg-green-600 text-white py-4 rounded-lg font-black uppercase shadow-lg active:scale-95">Login as Driver</button>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto px-4 space-y-6 py-6">

        <!-- DRIVER INFO -->
        <div class="bg-green-600 text-white p-6 rounded-2xl shadow-lg">
            <p class="text-xs font-bold uppercase mb-2 opacity-90">Driver Logged In</p>
            <h2 id="driver-name-display" class="text-2xl font-black">--</h2>
            <p id="driver-earnings" class="text-3xl font-black text-green-100 mt-3">₹0</p>
            <p class="text-xs text-green-100 mt-1">Today's Earnings</p>
        </div>

        <!-- STATS -->
        <div class="grid grid-cols-3 gap-4">
            <div class="bg-white p-4 rounded-xl shadow-md text-center border-t-4 border-blue-600">
                <p class="text-xs text-gray-500 font-bold uppercase">Ready</p>
                <p id="stat-ready" class="text-3xl font-black text-blue-600 mt-2">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-md text-center border-t-4 border-orange-600">
                <p class="text-xs text-gray-500 font-bold uppercase">On Way</p>
                <p id="stat-onway" class="text-3xl font-black text-orange-600 mt-2">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-md text-center border-t-4 border-green-600">
                <p class="text-xs text-gray-500 font-bold uppercase">Delivered</p>
                <p id="stat-delivered" class="text-3xl font-black text-green-600 mt-2">0</p>
            </div>
        </div>

        <!-- TABS -->
        <div class="flex gap-2 bg-white p-2 rounded-lg shadow-md flex-wrap sticky top-20 z-30">
            <button onclick="switchTab('ready')" class="py-2 px-4 rounded-lg text-xs font-black uppercase transition-all bg-blue-600 text-white" id="tab-ready">🔵 Ready</button>
            <button onclick="switchTab('onway')" class="py-2 px-4 rounded-lg text-xs font-black uppercase transition-all bg-gray-200 text-gray-700" id="tab-onway">🟠 On Way</button>
            <button onclick="switchTab('delivered')" class="py-2 px-4 rounded-lg text-xs font-black uppercase transition-all bg-gray-200 text-gray-700" id="tab-delivered">✅ Delivered</button>
        </div>

        <!-- READY ORDERS -->
        <div id="ready-tab" class="space-y-4">
            <h2 class="text-xl font-black text-gray-800">🔵 Ready for Pickup</h2>
            <div id="ready-orders" class="space-y-3"></div>
        </div>

        <!-- ON WAY ORDERS -->
        <div id="onway-tab" class="hidden space-y-4">
            <h2 class="text-xl font-black text-gray-800">🟠 Orders On The Way</h2>
            <div id="onway-orders" class="space-y-3"></div>
        </div>

        <!-- DELIVERED ORDERS -->
        <div id="delivered-tab" class="hidden space-y-4">
            <h2 class="text-xl font-black text-gray-800">✅ Delivered Today</h2>
            <div id="delivered-orders" class="space-y-3"></div>
        </div>

        <!-- NAV -->
        <div class="flex gap-2 mt-8">
            <a href="index.html" class="flex-1 bg-yellow-600 text-white py-3 rounded-lg font-black uppercase text-center shadow-md active:scale-95">🛒 Customer</a>
            <a href="admin.html" class="flex-1 bg-red-600 text-white py-3 rounded-lg font-black uppercase text-center shadow-md active:scale-95">⚙️ Admin</a>
            <a href="kitchen.html" class="flex-1 bg-orange-600 text-white py-3 rounded-lg font-black uppercase text-center shadow-md active:scale-95">👨‍🍳 Kitchen</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDMz8C0GSPbsYKinLVpUT1PLejBscKw_pc",
            authDomain: "train-parcel.firebaseapp.com",
            databaseURL: "https://train-parcel-default-rtdb.firebaseio.com",
            projectId: "train-parcel",
            storageBucket: "train-parcel.firebasestorage.app",
            messagingSenderId: "357680905494",
            appId: "1:357680905494:web:072f547f8fc7c05a1ce437"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let driverId = localStorage.getItem('driver_id');
        let driverName = localStorage.getItem('driver_name');
        const COMMISSION_RATE = 10; // 10% commission

        function driverLogin() {
            const select = document.getElementById('driver-select').value;
            if (!select) return alert('❌ Select a driver');

            db.ref('drivers').orderByChild('name').equalTo(select).once('value', snap => {
                snap.forEach(child => {
                    driverId = child.key;
                    driverName = child.val().name;
                    localStorage.setItem('driver_id', driverId);
                    localStorage.setItem('driver_name', driverName);
                    document.getElementById('login-panel').classList.add('hidden');
                    document.getElementById('driver-name-display').textContent = driverName;
                    loadOrders();
                });
            });
        }

        function loadDriversList() {
            db.ref('drivers').on('value', snap => {
                const list = document.getElementById('drivers-list');
                list.innerHTML = '';
                snap.forEach(child => {
                    const option = document.createElement('option');
                    option.value = child.val().name;
                    list.appendChild(option);
                });
            });
        }

        function switchTab(tab) {
            document.getElementById('ready-tab').classList.toggle('hidden', tab !== 'ready');
            document.getElementById('onway-tab').classList.toggle('hidden', tab !== 'onway');
            document.getElementById('delivered-tab').classList.toggle('hidden', tab !== 'delivered');

            const tabs = ['ready', 'onway', 'delivered'];
            tabs.forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === tab) {
                    btn.classList.add('bg-green-600', 'text-white');
                    btn.classList.remove('bg-gray-200', 'text-gray-700');
                } else {
                    btn.classList.remove('bg-green-600', 'text-white');
                    btn.classList.add('bg-gray-200', 'text-gray-700');
                }
            });
        }

        function loadOrders() {
            db.ref('orders').on('value', snap => {
                const orders = snap.val() || {};
                const ready = Object.entries(orders).filter(([_, o]) => o.status === 'ready').reverse();
                const onway = Object.entries(orders).filter(([_, o]) => o.status === 'on-way' && o.deliveryDriver === driverId).reverse();
                const delivered = Object.entries(orders).filter(([_, o]) => o.status === 'delivered' && o.deliveryDriver === driverId).reverse();

                document.getElementById('stat-ready').textContent = ready.length;
                document.getElementById('stat-onway').textContent = onway.length;
                document.getElementById('stat-delivered').textContent = delivered.length;

                // Calculate earnings
                let earnings = 0;
                delivered.forEach(([_, o]) => {
                    earnings += (o.total * COMMISSION_RATE / 100);
                });
                document.getElementById('driver-earnings').textContent = '₹' + earnings.toFixed(0);

                displayOrders('ready-orders', ready);
                displayOrders('onway-orders', onway);
                displayOrders('delivered-orders', delivered);
            });
        }

        function displayOrders(containerId, orders) {
            const container = document.getElementById(containerId);
            if (orders.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 py-8">No orders</p>';
                return;
            }

            container.innerHTML = orders.map(([id, order]) => {
                const commission = (order.total * COMMISSION_RATE / 100).toFixed(0);
                return `
                    <div class="bg-white p-6 rounded-xl shadow-md border-l-4 border-green-600">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h3 class="text-lg font-black text-gray-800">#${id.substring(0, 8)}</h3>
                                <p class="text-xs text-gray-500">Hotel: ${order.hotelName}</p>
                            </div>
                            <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-black uppercase">${order.status}</span>
                        </div>

                        <div class="bg-yellow-50 p-3 rounded-lg mb-3 border-l-2 border-yellow-600">
                            <p class="text-sm font-bold text-gray-800">${order.customerName}</p>
                            <p class="text-xs text-gray-600">📱 <a href="tel:${order.customerPhone}" class="text-blue-600 hover:underline">${order.customerPhone}</a></p>
                            <p class="text-xs text-gray-600">📍 ${order.customerAddress}</p>
                        </div>

                        <div class="bg-blue-50 p-3 rounded-lg mb-3">
                            <h4 class="font-bold text-gray-800 text-sm mb-2">📦 Items:</h4>
                            <div class="space-y-1">
                                ${order.items.map(item => `
                                    <div class="flex justify-between text-xs">
                                        <span>${item.name}</span>
                                        <span>×${item.qty} @ ₹${item.price}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <div class="bg-purple-50 p-3 rounded-lg text-center">
                                <p class="text-xs text-gray-600">Total Amount</p>
                                <p class="text-xl font-black text-purple-600">₹${order.total}</p>
                            </div>
                            <div class="bg-green-50 p-3 rounded-lg text-center">
                                <p class="text-xs text-gray-600">Your Commission</p>
                                <p class="text-xl font-black text-green-600">₹${commission}</p>
                            </div>
                        </div>

                        <div class="flex gap-2">
                            ${order.status === 'ready' ? `
                                <button onclick="updateStatus('${id}', 'on-way')" class="flex-1 bg-orange-600 text-white py-3 rounded-lg font-black uppercase active:scale-95">Pickup Order</button>
                            ` : order.status === 'on-way' ? `
                                <button onclick="updateStatus('${id}', 'delivered')" class="flex-1 bg-green-600 text-white py-3 rounded-lg font-black uppercase active:scale-95">Mark Delivered</button>
                            ` : `
                                <span class="flex-1 bg-green-600 text-white py-3 rounded-lg font-black uppercase text-center">✅ Delivered</span>
                            `}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStatus(orderId, newStatus) {
            db.ref('orders').child(orderId).update({
                status: newStatus,
                deliveryDriver: driverId,
                deliveryName: driverName
            });
        }

        window.addEventListener('load', () => {
            loadDriversList();
            if (driverId) {
                document.getElementById('login-panel').classList.add('hidden');
                document.getElementById('driver-name-display').textContent = driverName;
                loadOrders();
            }
        });
    </script>
</body>
</html>
