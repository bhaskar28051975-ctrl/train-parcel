<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery - FoodHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-green-50 pb-24">
    <header class="bg-white p-5 shadow-md sticky top-0 z-50 border-b-4 border-green-600">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-black text-green-600">🚚 Delivery Dashboard</h1>
            <button onclick="location.reload()" class="text-[10px] font-bold bg-gray-100 px-3 py-1 rounded-full uppercase">Refresh</button>
        </div>
    </header>

    <!-- LOGIN PANEL -->
    <div id="login-panel" class="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-2xl">
            <h2 class="text-2xl font-black text-gray-800 mb-2">🚚 Driver Login</h2>
            <p class="text-sm text-gray-500 mb-4">Select your name to start accepting orders</p>
            <div class="space-y-3">
                <select id="driverSelect" class="w-full p-4 border rounded-lg bg-gray-50 text-sm font-bold">
                    <option value="">Loading drivers...</option>
                </select>
                <button onclick="driverLogin()" class="w-full bg-green-600 text-white p-4 rounded-lg font-black uppercase shadow-lg active:scale-95">Login as Driver</button>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto p-4">
        <!-- DRIVER INFO -->
        <div id="driver-info" class="hidden bg-green-600 text-white p-6 rounded-2xl shadow-md mb-6">
            <p class="text-xs font-bold uppercase mb-2 opacity-90">Driver Logged In</p>
            <h2 id="driver-name-display" class="text-3xl font-black">--</h2>
            <p id="driver-earnings" class="text-4xl font-black text-green-100 mt-3">₹0</p>
            <p class="text-xs text-green-100 mt-1">Today's Earnings (10% commission)</p>
        </div>

        <!-- TABS -->
        <div class="flex gap-2 bg-white p-2 rounded-xl shadow-md flex-wrap mb-6 sticky top-20 z-40">
            <button onclick="switchTab('ready')" id="tab-ready" class="py-2 px-4 rounded-lg text-xs font-black uppercase bg-blue-600 text-white">🔵 Ready</button>
            <button onclick="switchTab('onway')" id="tab-onway" class="py-2 px-4 rounded-lg text-xs font-black uppercase bg-gray-200 text-gray-700">🟠 On Way</button>
            <button onclick="switchTab('delivered')" id="tab-delivered" class="py-2 px-4 rounded-lg text-xs font-black uppercase bg-gray-200 text-gray-700">✅ Delivered</button>
        </div>

        <!-- STATS -->
        <div class="grid grid-cols-3 gap-3 mb-6 bg-white p-4 rounded-xl shadow-md">
            <div class="text-center">
                <p id="stat-ready" class="text-3xl font-black text-blue-600">0</p>
                <p class="text-xs text-gray-500">Ready</p>
            </div>
            <div class="text-center">
                <p id="stat-onway" class="text-3xl font-black text-orange-600">0</p>
                <p class="text-xs text-gray-500">On Way</p>
            </div>
            <div class="text-center">
                <p id="stat-delivered" class="text-3xl font-black text-green-600">0</p>
                <p class="text-xs text-gray-500">Delivered</p>
            </div>
        </div>

        <!-- READY ORDERS -->
        <div id="section-ready" class="space-y-4">
            <h2 class="text-xl font-black text-gray-800 mb-4">🔵 Ready for Pickup</h2>
            <div id="ready-orders" class="space-y-4"></div>
        </div>

        <!-- ON WAY ORDERS -->
        <div id="section-onway" class="hidden space-y-4">
            <h2 class="text-xl font-black text-gray-800 mb-4">🟠 Orders On The Way</h2>
            <div id="onway-orders" class="space-y-4"></div>
        </div>

        <!-- DELIVERED ORDERS -->
        <div id="section-delivered" class="hidden space-y-4">
            <h2 class="text-xl font-black text-gray-800 mb-4">✅ Delivered Today</h2>
            <div id="delivered-orders" class="space-y-4"></div>
        </div>

        <button id="logout-btn" onclick="logout()" class="hidden fixed bottom-20 right-4 bg-red-600 text-white px-6 py-3 rounded-full font-black uppercase shadow-lg active:scale-95">Logout</button>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDMz8C0GSPbsYKinLVpUT1PLejBscKw_pc",
        authDomain: "train-parcel.firebaseapp.com",
        databaseURL: "https://train-parcel-default-rtdb.firebaseio.com",
        projectId: "train-parcel",
        storageBucket: "train-parcel.firebasestorage.app",
        messagingSenderId: "357680905494",
        appId: "1:357680905494:web:072f547f8fc7c05a1ce437"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let driverId = localStorage.getItem('driver_id');
    let driverName = localStorage.getItem('driver_name');
    let driversMap = {};
    const COMMISSION_RATE = 10;

    window.switchTab = (tab) => {
        document.getElementById('section-ready').classList.add('hidden');
        document.getElementById('section-onway').classList.add('hidden');
        document.getElementById('section-delivered').classList.add('hidden');
        document.getElementById(`section-${tab}`).classList.remove('hidden');

        ['ready', 'onway', 'delivered'].forEach(t => {
            document.getElementById(`tab-${t}`).classList.remove('bg-blue-600', 'bg-orange-600', 'bg-green-600', 'text-white');
            document.getElementById(`tab-${t}`).classList.add('bg-gray-200', 'text-gray-700');
        });
        
        if(tab === 'ready') {
            document.getElementById(`tab-${tab}`).classList.remove('bg-gray-200', 'text-gray-700');
            document.getElementById(`tab-${tab}`).classList.add('bg-blue-600', 'text-white');
        } else if(tab === 'onway') {
            document.getElementById(`tab-${tab}`).classList.remove('bg-gray-200', 'text-gray-700');
            document.getElementById(`tab-${tab}`).classList.add('bg-orange-600', 'text-white');
        } else if(tab === 'delivered') {
            document.getElementById(`tab-${tab}`).classList.remove('bg-gray-200', 'text-gray-700');
            document.getElementById(`tab-${tab}`).classList.add('bg-green-600', 'text-white');
        }
    };

    window.driverLogin = () => {
        const selected = document.getElementById('driverSelect').value;
        if(!selected) return alert("❌ Select a driver");

        driverId = driversMap[selected];
        driverName = selected;
        
        if(!driverId) return alert("❌ Driver not found");

        localStorage.setItem('driver_id', driverId);
        localStorage.setItem('driver_name', driverName);
        
        document.getElementById('login-panel').classList.add('hidden');
        document.getElementById('driver-info').classList.remove('hidden');
        document.getElementById('logout-btn').classList.remove('hidden');
        document.getElementById('driver-name-display').textContent = driverName;
        
        loadOrders();
    };

    window.logout = () => {
        localStorage.removeItem('driver_id');
        localStorage.removeItem('driver_name');
        location.reload();
    };

    window.updateStatus = (orderId, newStatus) => {
        update(ref(db, `orders/${orderId}`), { 
            status: newStatus, 
            deliveryDriver: driverId, 
            deliveryName: driverName 
        });
    };

    function loadDriversList() {
        onValue(ref(db, 'drivers'), (snap) => {
            const select = document.getElementById('driverSelect');
            select.innerHTML = '<option value="">Select Your Name</option>';
            driversMap = {};
            
            snap.forEach(child => {
                const driver = child.val();
                driversMap[driver.name] = child.key;
                const option = document.createElement('option');
                option.value = driver.name;
                option.textContent = driver.name;
                select.appendChild(option);
            });
        });
    }

    function loadOrders() {
        onValue(ref(db, 'orders'), (snap) => {
            const allOrders = snap.val() || {};
            
            const ready = Object.entries(allOrders).filter(([_, o]) => o.status === "ready").reverse();
            const onway = Object.entries(allOrders).filter(([_, o]) => o.status === "on-way" && o.deliveryDriver === driverId).reverse();
            const delivered = Object.entries(allOrders).filter(([_, o]) => o.status === "delivered" && o.deliveryDriver === driverId).reverse();

            document.getElementById('stat-ready').textContent = ready.length;
            document.getElementById('stat-onway').textContent = onway.length;
            document.getElementById('stat-delivered').textContent = delivered.length;

            // Calculate earnings
            let earnings = 0;
            delivered.forEach(([_, o]) => {
                earnings += (o.totalAmount * COMMISSION_RATE / 100);
            });
            document.getElementById('driver-earnings').textContent = '₹' + earnings.toFixed(0);

            displayOrders('ready-orders', ready);
            displayOrders('onway-orders', onway);
            displayOrders('delivered-orders', delivered);
        });
    }

    function displayOrders(containerId, orders) {
        const container = document.getElementById(containerId);
        if(orders.length === 0) {
            container.innerHTML = '<p class="text-center text-gray-500 py-8">No orders</p>';
            return;
        }

        container.innerHTML = orders.map(([orderId, order]) => {
            const commission = (order.totalAmount * COMMISSION_RATE / 100).toFixed(0);
            const itemsList = typeof order.items === 'string' ? order.items : (Array.isArray(order.items) ? order.items.join(", ") : "");
            return `
            <div class="bg-white rounded-2xl p-6 shadow-md border-l-4 border-green-600">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="text-sm font-black text-gray-400 uppercase">Order ID</p>
                        <p class="text-lg font-black text-gray-800">#${orderId.substring(0, 8)}</p>
                    </div>
                    <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-black uppercase">${order.status}</span>
                </div>

                <div class="bg-yellow-50 p-4 rounded-lg mb-4 border-l-2 border-yellow-600">
                    <p class="font-bold text-gray-800">${order.customerName}</p>
                    <p class="text-sm text-gray-600">📱 <a href="tel:${order.customerPhone}" class="text-blue-600 hover:underline font-bold">${order.customerPhone}</a></p>
                    <p class="text-sm text-gray-600">📍 ${order.customerAddress}</p>
                </div>

                <div class="bg-gray-50 p-4 rounded-lg mb-4">
                    <h4 class="font-bold text-gray-800 text-sm mb-2">📦 Items:</h4>
                    <p class="text-sm text-gray-700">${itemsList}</p>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-purple-50 p-3 rounded-lg text-center border-l-2 border-purple-600">
                        <p class="text-xs text-gray-600 font-bold">Total Amount</p>
                        <p class="text-2xl font-black text-purple-600">₹${order.totalAmount}</p>
                    </div>
                    <div class="bg-green-50 p-3 rounded-lg text-center border-l-2 border-green-600">
                        <p class="text-xs text-gray-600 font-bold">Your Commission</p>
                        <p class="text-2xl font-black text-green-600">₹${commission}</p>
                    </div>
                </div>

                <div class="flex gap-2">
                    ${order.status === 'ready' ? `
                        <button onclick="updateStatus('${orderId}', 'on-way')" class="flex-1 bg-orange-600 text-white py-3 rounded-lg font-black uppercase active:scale-95">🚚 Pickup Order</button>
                    ` : order.status === 'on-way' ? `
                        <button onclick="updateStatus('${orderId}', 'delivered')" class="flex-1 bg-green-600 text-white py-3 rounded-lg font-black uppercase active:scale-95">✅ Mark Delivered</button>
                    ` : `
                        <span class="flex-1 bg-green-600 text-white py-3 rounded-lg font-black uppercase text-center">✅ DELIVERED</span>
                    `}
                </div>
            </div>`;
        }).join('');
    }

    // Initialize
    loadDriversList();
    
    if(driverId) {
        document.getElementById('login-panel').classList.add('hidden');
        document.getElementById('driver-info').classList.remove('hidden');
        document.getElementById('logout-btn').classList.remove('hidden');
        document.getElementById('driver-name-display').textContent = driverName;
        loadOrders();
    }
</script>
</body>
</html>
