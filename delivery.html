<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FoodHub - Delivery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 0;
        }

        .container {
            width: 100%;
            max-width: 100%;
            padding: 0;
        }

        header {
            background: white;
            padding: 15px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            width: 100%;
        }

        header h1 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            overflow-x: auto;
        }

        .nav-links a {
            padding: 8px 12px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 12px;
            white-space: nowrap;
            transition: background 0.3s;
        }

        .nav-links a.active {
            background: #764ba2;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 15px;
        }

        .stat-card {
            background: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin: 8px 0;
        }

        .stat-label {
            color: #666;
            font-size: 11px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            overflow-x: auto;
        }

        .tab-btn {
            padding: 8px 12px;
            background: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            white-space: nowrap;
            color: #667eea;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #667eea;
            color: white;
        }

        .content {
            padding: 10px;
            min-height: calc(100vh - 300px);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .deliveries-list {
            display: grid;
            gap: 12px;
        }

        .delivery-card {
            background: white;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .delivery-card.on-way {
            border-left-color: #ffc107;
        }

        .delivery-card.delivered {
            border-left-color: #28a745;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .order-id {
            font-weight: bold;
            color: #333;
            font-size: 14px;
        }

        .order-status {
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: bold;
        }

        .status-ready {
            background: #28a745;
            color: white;
        }

        .status-on-way {
            background: #ffc107;
            color: white;
        }

        .status-delivered {
            background: #17a2b8;
            color: white;
        }

        .customer-info {
            background: #fff3cd;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            border-left: 3px solid #ffc107;
        }

        .customer-name {
            font-weight: bold;
            color: #333;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .customer-phone {
            color: #667eea;
            font-size: 13px;
            text-decoration: none;
        }

        .delivery-address {
            background: #f8f9ff;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .address-label {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 4px;
        }

        .order-items {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            font-size: 12px;
        }

        .order-item {
            padding: 4px 0;
            border-bottom: 1px solid #ddd;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-total {
            font-weight: bold;
            color: #667eea;
            text-align: right;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .delivery-actions {
            display: grid;
            gap: 8px;
            grid-template-columns: 1fr 1fr;
        }

        .action-btn {
            padding: 8px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .btn-pickup {
            background: #ffc107;
            color: white;
        }

        .btn-pickup:active {
            background: #ffb300;
        }

        .btn-deliver {
            background: #28a745;
            color: white;
        }

        .btn-deliver:active {
            background: #218838;
        }

        .btn-cancel {
            background: #6c757d;
            color: white;
        }

        .empty-message {
            text-align: center;
            padding: 40px 20px;
            color: white;
            font-size: 14px;
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 20px;
            }

            .nav-links a {
                font-size: 11px;
                padding: 6px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚚 Delivery</h1>
            <div class="nav-links">
                <a href="index.html">🛒 Order</a>
                <a href="kitchen.html">👨‍🍳 Kitchen</a>
                <a href="delivery.html" class="active">🚚 Delivery</a>
                <a href="admin.html">⚙️ Admin</a>
                <a href="reports.html">📊 Reports</a>
            </div>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Ready</div>
                <div class="stat-number" id="readyCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">On Way</div>
                <div class="stat-number" id="onWayCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Delivered</div>
                <div class="stat-number" id="deliveredCount">0</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('ready')">Ready</button>
            <button class="tab-btn" onclick="switchTab('on-way')">On Way</button>
            <button class="tab-btn" onclick="switchTab('delivered')">Delivered</button>
        </div>

        <div class="content">
            <div id="ready" class="tab-content active"></div>
            <div id="on-way" class="tab-content"></div>
            <div id="delivered" class="tab-content"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDMz8C0GSPbsYKinLVpUT1PLejBscKw_pc",
            authDomain: "train-parcel.firebaseapp.com",
            databaseURL: "https://train-parcel-default-rtdb.firebaseio.com",
            projectId: "train-parcel",
            storageBucket: "train-parcel.firebasestorage.app",
            messagingSenderId: "357680905494",
            appId: "1:357680905494:web:072f547f8fc7c05a1ce437",
            measurementId: "G-SQX8M0MKHT"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let allOrders = [];

        function loadOrders() {
            database.ref('orders').on('value', (snapshot) => {
                allOrders = [];
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).forEach(key => {
                        allOrders.push({id: key, ...data[key]});
                    });
                }
                allOrders.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                updateDisplay();
            });
        }

        function updateDisplay() {
            const ready = allOrders.filter(o => o.status === 'ready');
            const onWay = allOrders.filter(o => o.status === 'on-way');
            const delivered = allOrders.filter(o => o.status === 'delivered');

            document.getElementById('readyCount').textContent = ready.length;
            document.getElementById('onWayCount').textContent = onWay.length;
            document.getElementById('deliveredCount').textContent = delivered.length;

            displayOrders('ready', ready);
            displayOrders('on-way', onWay);
            displayOrders('delivered', delivered);
        }

        function displayOrders(status, orders) {
            const container = document.getElementById(status);
            if (orders.length === 0) {
                container.innerHTML = '<div class="empty-message">No orders</div>';
                return;
            }

            container.innerHTML = `<div class="deliveries-list">${orders.map(order => `
                <div class="delivery-card ${status === 'on-way' ? 'on-way' : status === 'delivered' ? 'delivered' : ''}">
                    <div class="order-header">
                        <div class="order-id">#${order.id.substring(0, 8)}</div>
                        <div class="order-status status-${status}">${status === 'on-way' ? 'ON WAY' : status.toUpperCase()}</div>
                    </div>

                    <div class="customer-info">
                        <div class="customer-name">👤 ${order.customerName}</div>
                        <a href="tel:${order.customerPhone}" class="customer-phone">📱 ${order.customerPhone}</a>
                    </div>

                    <div class="delivery-address">
                        <div class="address-label">📍 Address:</div>
                        ${order.customerAddress}
                    </div>

                    <div class="order-items">
                        ${order.items.map(item => `
                            <div class="order-item">• ${item.name} x${item.qty}</div>
                        `).join('')}
                    </div>

                    <div class="order-total">₹${order.total}</div>

                    <div class="delivery-actions">
                        ${order.status === 'ready' ? `
                            <button class="action-btn btn-pickup" onclick="updateStatus('${order.id}', 'on-way')">Pickup</button>
                            <button class="action-btn btn-cancel" onclick="cancelDelivery('${order.id}')">Cancel</button>
                        ` : order.status === 'on-way' ? `
                            <button class="action-btn btn-deliver" onclick="updateStatus('${order.id}', 'delivered')">Delivered</button>
                            <button class="action-btn btn-cancel" onclick="updateStatus('${order.id}', 'ready')">Back</button>
                        ` : `
                            <button class="action-btn" style="grid-column: 1/-1; background: #28a745; color: white; cursor: default;">✓ Complete</button>
                        `}
                    </div>
                </div>
            `).join('')}</div>`;
        }

        function updateStatus(orderId, newStatus) {
            database.ref('orders').child(orderId).update({status: newStatus});
        }

        function cancelDelivery(orderId) {
            if (confirm('Cancel delivery?')) {
                database.ref('orders').child(orderId).update({status: 'ready'});
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
        }

        window.addEventListener('load', loadOrders);
    </script>
</body>
</html>
