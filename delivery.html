<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodHub Delivery Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 text-gray-800 pb-20">

    <header class="bg-red-600 text-white p-5 shadow-lg sticky top-0 z-40">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-black">🚗 Delivery Dashboard</h1>
            <select id="driverSelect" onchange="loginDriver()" class="px-4 py-2 rounded-lg border-2 font-black">
                <option value="">Select Driver</option>
            </select>
        </div>
        <p id="driverInfo" class="text-xs mt-2"></p>
    </header>

    <!-- TABS -->
    <div class="bg-white border-b flex gap-0">
        <button onclick="switchTab('ready')" id="tab-ready" class="flex-1 py-3 font-black text-red-600 border-b-4 border-red-600 text-sm">📦 READY</button>
        <button onclick="switchTab('onway')" id="tab-onway" class="flex-1 py-3 font-black text-gray-600 text-sm">🚗 ON WAY</button>
        <button onclick="switchTab('delivered')" id="tab-delivered" class="flex-1 py-3 font-black text-gray-600 text-sm">✅ DELIVERED</button>
    </div>

    <div class="p-4 space-y-4">

        <!-- ========== READY ORDERS ========== -->
        <div id="section-ready">
            <h2 class="text-lg font-black mb-3">📦 Ready for Pickup</h2>
            <div id="ready-list" class="space-y-3"></div>
        </div>

        <!-- ========== ON THE WAY ========== -->
        <div id="section-onway" class="hidden">
            <h2 class="text-lg font-black mb-3">🚗 On The Way</h2>
            <div id="onway-list" class="space-y-3"></div>
        </div>

        <!-- ========== DELIVERED ========== -->
        <div id="section-delivered" class="hidden">
            <h2 class="text-lg font-black mb-3">✅ Delivered Today</h2>
            <div id="delivered-list" class="space-y-3"></div>
        </div>

    </div>

    <!-- STATS FOOTER -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t-4 border-red-600 p-4">
        <div class="flex gap-4 justify-center">
            <div class="text-center">
                <p class="text-xs font-black text-gray-600">Ready</p>
                <p id="stat-ready" class="text-xl font-black text-red-600">0</p>
            </div>
            <div class="text-center">
                <p class="text-xs font-black text-gray-600">On Way</p>
                <p id="stat-onway" class="text-xl font-black text-blue-600">0</p>
            </div>
            <div class="text-center">
                <p class="text-xs font-black text-gray-600">Delivered</p>
                <p id="stat-delivered" class="text-xl font-black text-green-600">0</p>
            </div>
            <div class="text-center">
                <p class="text-xs font-black text-gray-600">Earnings</p>
                <p id="stat-earnings" class="text-xl font-black text-green-600">₹0</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDMz8C0GSPbsYKinLVpUT1PLejBscKw_pc",
            authDomain: "train-parcel.firebaseapp.com",
            databaseURL: "https://train-parcel-default-rtdb.firebaseio.com",
            projectId: "train-parcel",
            storageBucket: "train-parcel.firebasestorage.app",
            messagingSenderId: "357680905494",
            appId: "1:357680905494:web:072f547f8fc7c05a1ce437"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentDriver = null;
        let driversMap = {};
        let ordersData = {};
        let commission = 10;

        window.switchTab = (tab) => {
            ['ready', 'onway', 'delivered'].forEach(t => {
                document.getElementById(`section-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('border-b-4', 'border-red-600', 'text-red-600');
                document.getElementById(`tab-${t}`).classList.add('text-gray-600');
            });
            document.getElementById(`section-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('border-b-4', 'border-red-600', 'text-red-600');
        };

        window.loginDriver = () => {
            const driverId = document.getElementById('driverSelect').value;
            if(!driverId) {
                alert("❌ Please select a driver first");
                return;
            }
            
            const driverName = Object.keys(driversMap).find(name => driversMap[name] === driverId);
            if(!driverName) {
                alert("❌ Driver not found");
                return;
            }
            
            currentDriver = { id: driverId, name: driverName };
            localStorage.setItem('deliveryDriver', JSON.stringify(currentDriver));
            document.getElementById('driverInfo').innerText = `👤 ${driverName} logged in`;
            renderOrders();
        };

        window.pickOrder = (orderId) => {
            if(!currentDriver) {
                alert("❌ Please select a driver first from the dropdown");
                return;
            }
            update(ref(db, `orders/${orderId}`), {
                status: "on-way",
                deliveryDriver: currentDriver.id,
                deliveryName: currentDriver.name,
                pickedAt: Date.now()
            });
        };

        window.deliverOrder = (orderId) => {
            update(ref(db, `orders/${orderId}`), {
                status: "delivered",
                deliveredAt: Date.now()
            });
        };

        function renderOrders() {
            const readyList = document.getElementById('ready-list');
            const onwayList = document.getElementById('onway-list');
            const deliveredList = document.getElementById('delivered-list');
            
            readyList.innerHTML = "";
            onwayList.innerHTML = "";
            deliveredList.innerHTML = "";

            let readyCount = 0, onwayCount = 0, deliveredCount = 0, totalEarnings = 0;

            Object.keys(ordersData).forEach(orderId => {
                const order = ordersData[orderId];

                // READY ORDERS (status = ready)
                if(order.status === "ready") {
                    readyCount++;
                    readyList.innerHTML += `
                    <div class="bg-white p-4 rounded-lg shadow-md border-l-4 border-orange-600">
                        <div class="mb-3">
                            <h3 class="font-black text-sm">👤 ${order.customerName}</h3>
                            <p class="text-xs text-gray-600 mt-1">📞 <a href="tel:${order.customerPhone}" class="text-blue-600 underline">${order.customerPhone}</a></p>
                            <p class="text-xs text-gray-600 mt-1">📍 <strong>Pickup:</strong> ${order.customerAddress || 'N/A'}</p>
                            <p class="text-xs text-green-600 font-semibold mt-1">🎯 <strong>Deliver to:</strong> ${order.travelInfo || 'N/A'}</p>
                            <p class="text-xs text-gray-600 mt-1">📦 <strong>Items:</strong> ${order.items}</p>
                            <p class="font-black text-red-600 mt-2">₹${order.totalAmount}</p>
                        </div>
                        <button onclick="pickOrder('${orderId}')" class="w-full bg-orange-600 text-white py-2 rounded-lg font-black text-xs">PICK UP</button>
                    </div>`;
                }

                // ON THE WAY ORDERS (status = on-way, assigned to current driver)
                if(order.status === "on-way" && currentDriver && order.deliveryDriver === currentDriver.id) {
                    onwayCount++;
                    totalEarnings += (order.totalAmount * commission / 100);
                    onwayList.innerHTML += `
                    <div class="bg-white p-4 rounded-lg shadow-md border-l-4 border-blue-600">
                        <div class="mb-3">
                            <h3 class="font-black text-sm">👤 ${order.customerName}</h3>
                            <p class="text-xs text-gray-600 mt-1">📞 <a href="tel:${order.customerPhone}" class="text-blue-600 underline">${order.customerPhone}</a></p>
                            <p class="text-xs text-gray-600 mt-1">📍 <strong>Pickup:</strong> ${order.customerAddress || 'N/A'}</p>
                            <p class="text-xs text-green-600 font-black mt-1">🎯 <strong>Delivery:</strong> ${order.travelInfo || 'N/A'}</p>
                            <p class="text-xs text-gray-600 mt-1">📦 <strong>Items:</strong> ${order.items}</p>
                            <p class="font-black text-red-600 mt-2">₹${order.totalAmount} | 💰 Your: ₹${Math.round(order.totalAmount * commission / 100)}</p>
                        </div>
                        <button onclick="deliverOrder('${orderId}')" class="w-full bg-green-600 text-white py-2 rounded-lg font-black text-xs">DELIVERED ✅</button>
                    </div>`;
                }

                // DELIVERED ORDERS (status = delivered, assigned to current driver)
                if(order.status === "delivered" && currentDriver && order.deliveryDriver === currentDriver.id) {
                    deliveredCount++;
                    totalEarnings += (order.totalAmount * commission / 100);
                    deliveredList.innerHTML += `
                    <div class="bg-white p-4 rounded-lg shadow-md border-l-4 border-green-600">
                        <div>
                            <h3 class="font-black text-sm">✅ ${order.customerName}</h3>
                            <p class="text-xs text-gray-600 mt-1">📞 ${order.customerPhone}</p>
                            <p class="text-xs text-gray-600 mt-1">📍 <strong>Delivered to:</strong> ${order.travelInfo || 'N/A'}</p>
                            <p class="text-xs text-gray-600 mt-1">📦 ${order.items}</p>
                            <p class="font-black text-green-600 mt-2">₹${order.totalAmount} | 💰 You earned: ₹${Math.round(order.totalAmount * commission / 100)}</p>
                        </div>
                    </div>`;
                }
            });

            document.getElementById('stat-ready').innerText = readyCount;
            document.getElementById('stat-onway').innerText = onwayCount;
            document.getElementById('stat-delivered').innerText = deliveredCount;
            document.getElementById('stat-earnings').innerText = "₹" + Math.round(totalEarnings);
        }

        // LOAD DATA
        onValue(ref(db, 'drivers'), (snap) => {
            const data = snap.val() || {};
            driversMap = {};
            const select = document.getElementById('driverSelect');
            select.innerHTML = "<option value=''>Select Driver</option>";
            
            if(data && Object.keys(data).length > 0) {
                Object.keys(data).forEach(dId => {
                    const driver = data[dId];
                    if(driver && driver.name) {
                        driversMap[driver.name] = dId;
                        select.innerHTML += `<option value="${dId}">${driver.name} (${driver.vehicle || 'Vehicle'})</option>`;
                    }
                });

                // Auto-login if saved
                const saved = localStorage.getItem('deliveryDriver');
                if(saved) {
                    try {
                        const driver = JSON.parse(saved);
                        if(driver.id && select.querySelector(`option[value="${driver.id}"]`)) {
                            select.value = driver.id;
                            currentDriver = driver;
                            document.getElementById('driverInfo').innerText = `👤 ${driver.name} logged in`;
                            renderOrders();
                        }
                    } catch(e) {
                        console.log("Error loading saved driver");
                    }
                }
            }
        });

        onValue(ref(db, 'orders'), (snap) => {
            ordersData = snap.val() || {};
            renderOrders();
        });

        onValue(ref(db, 'settings/commission'), (snap) => {
            commission = snap.val() || 10;
            renderOrders();
        });
    </script>
</body>
</html>
