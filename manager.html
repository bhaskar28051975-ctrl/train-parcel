<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhaskar Food - Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,700;0,900;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --card2: #1c2330;
            --red: #e8303a;
            --red2: #ff4d57;
            --text: #f0f6fc;
            --muted: #8b949e;
            --border: #30363d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Barlow', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
            overflow-x: hidden;
        }

        /* subtle noise texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 48px;
            animation: fadeDown 0.6s ease both;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 52px;
            letter-spacing: 2px;
            line-height: 1;
            margin-bottom: 8px;
        }

        .logo span {
            color: var(--red);
        }

        .subtitle {
            letter-spacing: 0.35em;
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 14px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px 16px 28px;
            text-align: center;
            text-decoration: none;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
            animation: fadeUp 0.5s ease both;
            cursor: pointer;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.18s; }
        .card:nth-child(3) { animation-delay: 0.26s; }
        .card:nth-child(4) { animation-delay: 0.34s; }

        .card:hover {
            background: var(--card2);
            border-color: var(--red);
            transform: translateY(-3px);
        }

        .card:active { transform: scale(0.96); }

        .icon-wrap {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }

        .icon-hotels  { background: rgba(59,130,246,0.12); color: #60a5fa; }
        .icon-kitchen { background: rgba(249,115,22,0.12); color: #fb923c; }
        .icon-delivery{ background: rgba(34,197,94,0.12);  color: #4ade80; }
        .icon-reports { background: rgba(168,85,247,0.12); color: #c084fc; }

        .card-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 2px;
        }

        /* CUSTOMER BUTTON */
        .customer-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--text);
            color: var(--bg);
            border-radius: 100px;
            padding: 20px 32px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 3px;
            text-decoration: none;
            margin-top: 4px;
            transition: background 0.18s, transform 0.15s;
            animation: fadeUp 0.5s 0.5s ease both;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .customer-btn:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .customer-btn:active { transform: scale(0.97); }

        /* STATS */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 14px;
            animation: fadeUp 0.5s 0.6s ease both;
        }

        .stat-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            text-align: center;
        }

        .stat-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 34px;
            line-height: 1;
            color: var(--red);
        }

        .stat-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 4px;
        }

        .stats-title {
            font-size: 10px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-top: 20px;
            margin-bottom: 8px;
            animation: fadeUp 0.5s 0.58s ease both;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            margin-top: 28px;
            font-size: 11px;
            color: var(--border);
            animation: fadeUp 0.5s 0.7s ease both;
        }

        /* ANIMATIONS */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <div class="logo">BHASKAR <span>FOOD</span></div>
        <div class="subtitle">Command Center</div>
    </div>

    <div class="grid">
        <a href="index.html" class="card">
            <div class="icon-wrap icon-hotels">
                <i class="fa-solid fa-utensils"></i>
            </div>
            <div class="card-label">Customer</div>
        </a>

        <a href="kitchen.html" class="card">
            <div class="icon-wrap icon-kitchen">
                <i class="fa-solid fa-fire-flame-curved"></i>
            </div>
            <div class="card-label">Kitchen</div>
        </a>

        <a href="delivery.html" class="card">
            <div class="icon-wrap icon-delivery">
                <i class="fa-solid fa-motorcycle"></i>
            </div>
            <div class="card-label">Delivery</div>
        </a>

        <a href="reports.html" class="card">
            <div class="icon-wrap icon-reports">
                <i class="fa-solid fa-chart-line"></i>
            </div>
            <div class="card-label">Reports</div>
        </a>
    </div>

    <div class="stats-title">📊 Live Stats</div>
    <div class="stats">
        <div class="stat-box">
            <div class="stat-num" id="stat-hotels">0</div>
            <div class="stat-label">Hotels</div>
        </div>
        <div class="stat-box">
            <div class="stat-num" id="stat-orders">0</div>
            <div class="stat-label">Orders</div>
        </div>
        <div class="stat-box">
            <div class="stat-num" id="stat-drivers">0</div>
            <div class="stat-label">Drivers</div>
        </div>
        <div class="stat-box">
            <div class="stat-num" id="stat-items">0</div>
            <div class="stat-label">Items</div>
        </div>
    </div>

    <div class="footer">© 2024 Bhaskar Food · v1.0</div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDMz8C0GSPbsYKinLVpUT1PLejBscKw_pc",
        authDomain: "train-parcel.firebaseapp.com",
        databaseURL: "https://train-parcel-default-rtdb.firebaseio.com",
        projectId: "train-parcel",
        storageBucket: "train-parcel.firebasestorage.app",
        messagingSenderId: "357680905494",
        appId: "1:357680905494:web:072f547f8fc7c05a1ce437"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    onValue(ref(db, 'hotels'), snap => {
        document.getElementById('stat-hotels').textContent = snap.val() ? Object.keys(snap.val()).length : 0;
    });
    onValue(ref(db, 'orders'), snap => {
        document.getElementById('stat-orders').textContent = snap.val() ? Object.keys(snap.val()).length : 0;
    });
    onValue(ref(db, 'drivers'), snap => {
        document.getElementById('stat-drivers').textContent = snap.val() ? Object.keys(snap.val()).length : 0;
    });
    onValue(ref(db, 'hotels'), snap => {
        let count = 0;
        if (snap.val()) {
            Object.values(snap.val()).forEach(h => {
                if (h.menu) count += Object.keys(h.menu).length;
            });
        }
        document.getElementById('stat-items').textContent = count;
    });
</script>

</body>
</html>
