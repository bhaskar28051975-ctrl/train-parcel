<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodHub - Order Food</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; }
        .dish-card { transition: transform 0.2s; }
        .dish-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-gray-100 pb-80 text-gray-800">

    <header class="bg-white p-5 shadow-sm sticky top-0 z-40 flex justify-between items-center border-b-4 border-red-600">
        <h1 class="text-xl font-black text-red-600 italic uppercase">🍔 FoodHub</h1>
        <button onclick="location.reload()" class="text-[10px] font-bold bg-gray-100 px-3 py-1 rounded-full uppercase">Refresh</button>
    </header>

    <div id="customer-list" class="p-4 space-y-6"></div>

    <!-- CHECKOUT PANEL - ONLY SHOWS WHEN ITEM HAS QUANTITY -->
    <div id="checkout-panel" class="hidden fixed bottom-0 left-0 right-0 bg-white rounded-t-[3rem] shadow-2xl p-4 border-t z-30 max-h-[50vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-2 px-2">
            <div>
                <p class="text-[8px] font-black text-gray-400 uppercase">Total</p>
                <p id="panel-total" class="text-2xl font-black text-red-600">₹0</p>
            </div>
            <button onclick="cancelOrder()" class="text-red-500 font-bold text-xs uppercase bg-red-50 px-3 py-1 rounded-full text-[10px]">Cancel</button>
        </div>
        <div class="space-y-2">
            <!-- CUSTOMER NAME & PHONE -->
            <input id="custName" type="text" placeholder="Enter Your Name *" class="w-full p-2 border rounded-lg bg-gray-50 font-bold text-xs">
            <input id="custPhone" type="tel" placeholder="Enter Your Phone *" class="w-full p-2 border rounded-lg bg-gray-50 font-bold text-xs">
            <input id="custAddress" type="text" placeholder="📍 Your Pickup Location (e.g. Home/Office) *" class="w-full p-2 border rounded-lg bg-gray-50 font-bold text-xs text-green-700">

            <!-- TRAVEL & HOTEL SELECTION TABS -->
            <div class="flex gap-1 bg-gray-100 p-1 rounded-lg">
                <button onclick="switchTab('train')" id="tab-train" class="flex-1 py-1 px-2 rounded-lg text-[10px] font-black uppercase bg-red-600 text-white">🚆 Train</button>
                <button onclick="switchTab('bus')" id="tab-bus" class="flex-1 py-1 px-2 rounded-lg text-[10px] font-black uppercase bg-gray-300 text-gray-700">🚌 Bus</button>
                <button onclick="switchTab('hotel')" id="tab-hotel" class="flex-1 py-1 px-2 rounded-lg text-[10px] font-black uppercase bg-gray-300 text-gray-700">🏨 Hotel</button>
            </div>

            <!-- TRAIN TAB -->
            <div id="section-train" class="space-y-1">
                <input id="trainName" type="text" placeholder="Train Name" class="w-full p-2 border rounded-lg bg-gray-50 text-xs">
                <input id="trainNumber" type="text" placeholder="Train Number" class="w-full p-2 border rounded-lg bg-gray-50 text-xs">
                <input id="coachNumber" type="text" placeholder="Coach Number" class="w-full p-2 border rounded-lg bg-gray-50 text-xs">
                <input id="seatNumber" type="text" placeholder="Seat Number" class="w-full p-2 border rounded-lg bg-gray-50 text-xs">
                <input id="departureTime" type="time" class="w-full p-2 border rounded-lg bg-gray-50 text-xs">
                <input id="departureDate" type="date" class="w-full p-2 border rounded-lg bg-gray-50 text-xs">
            </div>

            <!-- BUS TAB -->
            <div id="section-bus" class="hidden space-y-1">
                <input id="busName" type="text" placeholder="Travel Name" class="w-full p-2 border rounded-lg bg-gray-50 text-xs">
                <input id="busSeatNumber" type="text" placeholder="Seat Number" class="w-full p-2 border rounded-lg bg-gray-50 text-xs">
                <input id="busLocation" type="text" placeholder="Bus Location" class="w-full p-2 border rounded-lg bg-gray-50 text-xs">
                <input id="busDate" type="date" class="w-full p-2 border rounded-lg bg-gray-50 text-xs">
                <input id="busTime" type="time" class="w-full p-2 border rounded-lg bg-gray-50 text-xs">
            </div>

            <!-- HOTEL TAB -->
            <div id="section-hotel" class="hidden space-y-1">
                <input id="hotelName" type="text" placeholder="Hotel Name" onchange="autoSetPickupAddress()" class="w-full p-2 border rounded-lg bg-gray-50 text-xs">
                <input id="roomNumber" type="text" placeholder="Room Number" class="w-full p-2 border rounded-lg bg-gray-50 text-xs">
                <input id="hotelLocation" type="text" placeholder="Hotel Location" class="w-full p-2 border rounded-lg bg-gray-50 text-xs">
            </div>

            <button onclick="placeOrder()" class="w-full bg-red-600 text-white py-2 rounded-xl font-black uppercase shadow-lg text-sm">Confirm Order</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDMz8C0GSPbsYKinLVpUT1PLejBscKw_pc",
            authDomain: "train-parcel.firebaseapp.com",
            databaseURL: "https://train-parcel-default-rtdb.firebaseio.com",
            projectId: "train-parcel",
            storageBucket: "train-parcel.firebasestorage.app",
            messagingSenderId: "357680905494",
            appId: "1:357680905494:web:072f547f8fc7c05a1ce437"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let cart = {};
        let hotelData = {};
        let selectedTab = 'train';

        // UPDATE QUANTITY FROM DROPDOWN
        window.changeQty = (id, dish, price, newQty, hotelId) => {
            newQty = parseInt(newQty);
            if(newQty <= 0) {
                delete cart[id];
            } else {
                if(!cart[id]) cart[id] = { dish, price: parseInt(price), qty: 0, hotelId: hotelId };
                cart[id].qty = newQty;
                cart[id].hotelId = hotelId;
            }
            updateUI();
            renderMenu();
        };

        window.cancelOrder = () => {
            cart = {};
            updateUI();
            renderMenu();
        };

        window.switchTab = (tab) => {
            selectedTab = tab;
            document.getElementById('section-train').classList.add('hidden');
            document.getElementById('section-bus').classList.add('hidden');
            document.getElementById('section-hotel').classList.add('hidden');
            document.getElementById(`section-${tab}`).classList.remove('hidden');

            ['train', 'bus', 'hotel'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.remove('bg-red-600', 'text-white');
                document.getElementById(`tab-${t}`).classList.add('bg-gray-300', 'text-gray-700');
            });
            document.getElementById(`tab-${tab}`).classList.remove('bg-gray-300', 'text-gray-700');
            document.getElementById(`tab-${tab}`).classList.add('bg-red-600', 'text-white');

            // AUTO-SET PICKUP ADDRESS FOR HOTEL
            if(tab === 'hotel') {
                autoSetPickupAddress();
            }
        };

        window.autoSetPickupAddress = () => {
            const hotelNameField = document.getElementById('hotelName').value;
            if(hotelNameField) {
                // Find hotel in database and get its address
                for(let hId in hotelData) {
                    if(hotelData[hId].name === hotelNameField) {
                        const hotelAddress = hotelData[hId].address || hotelNameField;
                        document.getElementById('custAddress').value = hotelAddress;
                        break;
                    }
                }
            }
        };

        function updateUI() {
            const total = Object.values(cart).reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('checkout-panel').style.display = total > 0 ? 'block' : 'none';
            document.getElementById('panel-total').innerText = "₹" + total;
        }

        function renderMenu() {
            const container = document.getElementById('customer-list');
            container.innerHTML = "";
            Object.keys(hotelData).forEach(hotelId => {
                const hotel = hotelData[hotelId];
                let menuHtml = "";
                if(hotel.menu) {
                    Object.keys(hotel.menu).forEach(mId => {
                        const m = hotel.menu[mId];
                        const currentQty = cart[mId] ? cart[mId].qty : 0;
                        menuHtml += `
                        <div class="dish-card bg-white rounded-2xl border shadow-sm hover:shadow-md overflow-hidden">
                            <div class="w-full h-32">
                                <img src="${m.dishImg}" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400'" class="w-full h-full object-cover">
                            </div>

                            <div class="p-3 flex items-center gap-3">
                                <div class="flex-1 min-w-0">
                                    <h4 class="font-black text-gray-800 text-sm truncate">${m.dish}</h4>
                                    <p class="text-red-600 font-black text-lg">₹${m.price}</p>
                                    <p class="text-xs text-gray-500 truncate">Delicious homemade food</p>
                                </div>

                                <!-- QUANTITY DROPDOWN - SELECT 0-10 -->
                                <select onchange="changeQty('${mId}', '${m.dish}', '${m.price}', this.value, '${hotelId}')" class="px-3 py-2 border-2 border-red-600 rounded-lg font-black text-red-600 bg-white text-sm w-16 flex-shrink-0">
                                    <option value="0">0</option>
                                    <option value="1" ${currentQty === 1 ? 'selected' : ''}>1</option>
                                    <option value="2" ${currentQty === 2 ? 'selected' : ''}>2</option>
                                    <option value="3" ${currentQty === 3 ? 'selected' : ''}>3</option>
                                    <option value="4" ${currentQty === 4 ? 'selected' : ''}>4</option>
                                    <option value="5" ${currentQty === 5 ? 'selected' : ''}>5</option>
                                    <option value="6" ${currentQty === 6 ? 'selected' : ''}>6</option>
                                    <option value="7" ${currentQty === 7 ? 'selected' : ''}>7</option>
                                    <option value="8" ${currentQty === 8 ? 'selected' : ''}>8</option>
                                    <option value="9" ${currentQty === 9 ? 'selected' : ''}>9</option>
                                    <option value="10" ${currentQty === 10 ? 'selected' : ''}>10</option>
                                </select>
                            </div>
                        </div>`;
                    });
                }
                container.innerHTML += `
                <div class="bg-white rounded-[3rem] shadow-sm border overflow-hidden">
                    <img src="${hotel.image}" onerror="this.src='https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=400'" class="w-full h-44 object-cover">
                    <div class="p-6">
                        <h2 class="text-xl font-black text-gray-800 uppercase italic mb-6 border-l-4 border-red-600 pl-3">${hotel.name}</h2>
                        <div class="space-y-4">${menuHtml}</div>
                    </div>
                </div>`;
            });
        }

        onValue(ref(db, 'hotels'), (snap) => {
            hotelData = snap.val() || {};
            renderMenu();
        });

        window.placeOrder = () => {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const address = document.getElementById('custAddress').value;
            
            if(!name || !phone || !address) return alert("❌ Please enter name, phone and pickup location!");
            if(Object.keys(cart).length === 0) return alert("❌ Cart is empty!");
            
            // Get hotel address from cart
            let pickupHotelAddress = "";
            const firstItem = Object.values(cart)[0];
            if(firstItem && firstItem.hotelId) {
                const hotel = hotelData[firstItem.hotelId];
                if(hotel) {
                    pickupHotelAddress = hotel.address || hotel.name;
                }
            }
            
            let travelInfo = "";
            if(selectedTab === 'train') {
                const trainName = document.getElementById('trainName').value;
                const trainNum = document.getElementById('trainNumber').value;
                const coach = document.getElementById('coachNumber').value;
                const seat = document.getElementById('seatNumber').value;
                const time = document.getElementById('departureTime').value;
                const date = document.getElementById('departureDate').value;
                travelInfo = `Train: ${trainName} (${trainNum}) | Coach: ${coach} | Seat: ${seat} | Departure: ${date} ${time}`;
            } else if(selectedTab === 'bus') {
                const busName = document.getElementById('busName').value;
                const seat = document.getElementById('busSeatNumber').value;
                const loc = document.getElementById('busLocation').value;
                const date = document.getElementById('busDate').value;
                const time = document.getElementById('busTime').value;
                travelInfo = `Bus: ${busName} | Seat: ${seat} | Location: ${loc} | Date: ${date} Time: ${time}`;
            } else if(selectedTab === 'hotel') {
                const hotelN = document.getElementById('hotelName').value;
                const room = document.getElementById('roomNumber').value;
                const loc = document.getElementById('hotelLocation').value;
                travelInfo = `Hotel: ${hotelN} | Room: ${room} | Location: ${loc}`;
            }

            const totalAmount = Object.values(cart).reduce((s, i) => s + (i.price * i.qty), 0);
            const itemsList = Object.values(cart).map(i => `${i.dish} x${i.qty}`).join(", ");
            
            push(ref(db, 'orders'), {
                customerName: name,
                customerPhone: phone,
                customerAddress: address,
                pickupHotelAddress: pickupHotelAddress,
                travelInfo: travelInfo,
                items: itemsList,
                totalAmount: totalAmount,
                status: "pending",
                timestamp: Date.now()
            }).then(() => {
                alert("✅ Order Sent Successfully!");
                cart = {};
                document.getElementById('custName').value = "";
                document.getElementById('custPhone').value = "";
                document.getElementById('custAddress').value = "";
                updateUI();
                renderMenu();
            }).catch(err => {
                alert("❌ Error: " + err.message);
            });
        };
    </script>
</body>
</html>
