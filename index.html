<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodHub - Initialize Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-purple-600 text-white min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full space-y-6 text-center">
        <h1 class="text-4xl font-black">🍔 FoodHub</h1>
        <p class="text-lg">Initializing Database...</p>
        <div id="status" class="bg-white/20 p-6 rounded-lg space-y-3 text-left">
            <p id="msg1">⏳ Connecting to Firebase...</p>
            <p id="msg2" style="display:none">📝 Adding Hotels...</p>
            <p id="msg3" style="display:none">🍽️ Adding Menu Items...</p>
            <p id="msg4" style="display:none">🚚 Adding Drivers...</p>
            <p id="msg5" style="display:none">✅ Done! Redirecting...</p>
            <p id="error" style="display:none" class="text-red-300"></p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDMz8C0GSPbsYKinLVpUT1PLejBscKw_pc",
            authDomain: "train-parcel.firebaseapp.com",
            databaseURL: "https://train-parcel-default-rtdb.firebaseio.com",
            projectId: "train-parcel",
            storageBucket: "train-parcel.firebasestorage.app",
            messagingSenderId: "357680905494",
            appId: "1:357680905494:web:072f547f8fc7c05a1ce437"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        console.log("✅ Firebase initialized");

        async function initData() {
            try {
                // Check if data exists
                console.log("Checking database...");
                const snapshot = await db.ref('hotels').get();
                
                if (snapshot.exists()) {
                    console.log("✅ Data already exists!");
                    document.getElementById('msg5').style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'customer.html';
                    }, 2000);
                    return;
                }

                console.log("Database empty, adding data...");

                // Step 1: Add Hotels
                document.getElementById('msg2').style.display = 'block';
                const hotels = {
                    hotel_001: {name: "The Grill on Duty", cuisines: "Indian, North Indian", image: "https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=500"},
                    hotel_002: {name: "Spice Route", cuisines: "Indian, Chinese, Continental", image: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500"},
                    hotel_003: {name: "Royal Kitchen", cuisines: "Mughlai, Tandoori", image: "https://images.unsplash.com/photo-1504674900969-f2df05b3252d?w=500"}
                };
                await db.ref('hotels').set(hotels);
                console.log("✅ Hotels added");

                // Step 2: Add Menu Items
                document.getElementById('msg3').style.display = 'block';
                const menuItems = {
                    hotel_001: {
                        item_001: {name: "Butter Chicken", description: "Creamy butter chicken", price: 280},
                        item_002: {name: "Paneer Tikka", description: "Grilled paneer", price: 220},
                        item_003: {name: "Dal Makhani", description: "Creamy lentils", price: 180},
                        item_004: {name: "Biryani", description: "Fragrant rice", price: 250},
                        item_005: {name: "Samosa", description: "Fried pastry", price: 50},
                        item_006: {name: "Tandoori Chicken", description: "Spicy chicken", price: 320},
                        item_007: {name: "Naan", description: "Indian bread", price: 40},
                        item_008: {name: "Gulab Jamun", description: "Sweet dessert", price: 80}
                    },
                    hotel_002: {
                        item_009: {name: "Hakka Noodles", description: "Indo-Chinese noodles", price: 200},
                        item_010: {name: "Fried Rice", description: "Fragrant rice", price: 150},
                        item_011: {name: "Chilli Garlic Naan", description: "Spiced naan", price: 50},
                        item_012: {name: "Manchow Soup", description: "Indo-Chinese soup", price: 120},
                        item_013: {name: "Spring Rolls", description: "Crispy rolls", price: 100},
                        item_014: {name: "Gobi Manchurian", description: "Spiced cauliflower", price: 180},
                        item_015: {name: "Hakka Balls", description: "Spiced balls", price: 160},
                        item_016: {name: "Chilli Paneer", description: "Spicy paneer", price: 240}
                    },
                    hotel_003: {
                        item_017: {name: "Nihari", description: "Slow-cooked meat", price: 280},
                        item_018: {name: "Seekh Kebab", description: "Minced meat kebab", price: 250},
                        item_019: {name: "Shahi Tukda", description: "Bread pudding", price: 120},
                        item_020: {name: "Haleem", description: "Meat stew", price: 260},
                        item_021: {name: "Galauti Kebab", description: "Soft kebab", price: 240},
                        item_022: {name: "Phirni", description: "Rice pudding", price: 100},
                        item_023: {name: "Roghni Naan", description: "Buttered naan", price: 50},
                        item_024: {name: "Mughlai Paratha", description: "Egg paratha", price: 80}
                    }
                };
                await db.ref('menuItems').set(menuItems);
                console.log("✅ Menu items added");

                // Step 3: Add Drivers
                document.getElementById('msg4').style.display = 'block';
                const drivers = {
                    driver_001: {name: "Raj Kumar", phone: "9876543210", vehicle: "Bike", status: "active"},
                    driver_002: {name: "Priya Singh", phone: "9876543211", vehicle: "Bike", status: "active"},
                    driver_003: {name: "Arjun Patel", phone: "9876543212", vehicle: "Cycle", status: "active"}
                };
                await db.ref('drivers').set(drivers);
                console.log("✅ Drivers added");

                // Done
                document.getElementById('msg5').style.display = 'block';
                console.log("🎉 Database initialization complete!");
                
                setTimeout(() => {
                    window.location.href = 'customer.html';
                }, 2000);

            } catch (error) {
                console.error("❌ Error:", error);
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = "Error: " + error.message;
            }
        }

        // Start initialization
        initData();
    </script>
</body>
</html>
