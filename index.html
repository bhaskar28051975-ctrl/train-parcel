<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodHub - Order Food</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        header h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .nav-links {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-links a {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            background: #764ba2;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .menu-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .menu-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .menu-items {
            display: grid;
            gap: 15px;
        }

        .menu-item {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.3s;
        }

        .menu-item:hover {
            transform: translateX(5px);
            background: #f0f2ff;
        }

        .item-info h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .item-info p {
            color: #666;
            font-size: 13px;
        }

        .item-price {
            color: #667eea;
            font-weight: bold;
            font-size: 18px;
            margin: 0 15px;
        }

        .item-controls {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .qty-btn {
            background: #667eea;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .qty-btn:hover {
            background: #764ba2;
        }

        .qty-display {
            width: 30px;
            text-align: center;
            font-weight: bold;
        }

        .cart-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .cart-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .cart-items {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .cart-item {
            background: #f8f9ff;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .cart-item-name {
            flex: 1;
        }

        .cart-item-price {
            color: #667eea;
            font-weight: bold;
            margin: 0 10px;
        }

        .cart-item-qty {
            background: #667eea;
            color: white;
            width: 25px;
            height: 25px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .cart-summary {
            border-top: 2px solid #667eea;
            padding-top: 15px;
            margin-bottom: 15px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .summary-row.total {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }

        .customer-info {
            display: grid;
            gap: 12px;
            margin-bottom: 15px;
        }

        .customer-info input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .customer-info input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .place-order-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .place-order-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .place-order-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 30px 10px;
            font-size: 14px;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }

            .cart-section {
                position: static;
            }

            .nav-links {
                flex-direction: column;
            }

            .nav-links a {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🍔 FoodHub</h1>
            <div class="nav-links">
                <a href="index.html" class="active">🛒 Order</a>
                <a href="kitchen.html">👨‍🍳 Kitchen</a>
                <a href="delivery.html">🚚 Delivery</a>
                <a href="admin.html">⚙️ Admin</a>
                <a href="reports.html">📊 Reports</a>
            </div>
        </header>

        <div class="content">
            <div class="menu-section">
                <h2>📋 Menu</h2>
                <div class="menu-items" id="menuContainer">
                    <div class="empty-message">Loading menu...</div>
                </div>
            </div>

            <div class="cart-section">
                <h2>🛒 Your Order</h2>
                <div class="success-message" id="successMessage">
                    ✓ Order placed successfully! Check order tracking below.
                </div>
                <div class="cart-items" id="cartItems">
                    <div class="empty-message">No items in cart</div>
                </div>

                <div class="cart-summary">
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span id="subtotal">₹0</span>
                    </div>
                    <div class="summary-row">
                        <span>Delivery:</span>
                        <span id="delivery">₹50</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span id="total">₹0</span>
                    </div>
                </div>

                <div class="customer-info">
                    <input type="text" id="customerName" placeholder="Your Name *" required>
                    <input type="tel" id="customerPhone" placeholder="Your Phone Number *" required>
                    <input type="text" id="customerAddress" placeholder="Delivery Address *" required>
                </div>

                <button class="place-order-btn" onclick="placeOrder()">Place Order</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDMz8C0GSPbsYKinLVpUT1PLejBscKw_pc",
            authDomain: "train-parcel.firebaseapp.com",
            databaseURL: "https://train-parcel-default-rtdb.firebaseio.com",
            projectId: "train-parcel",
            storageBucket: "train-parcel.firebasestorage.app",
            messagingSenderId: "357680905494",
            appId: "1:357680905494:web:072f547f8fc7c05a1ce437",
            measurementId: "G-SQX8M0MKHT"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let cart = {};
        let menuItems = [];
        const DELIVERY_FEE = 50;

        // Load menu items
        function loadMenu() {
            database.ref('menuItems').on('value', (snapshot) => {
                menuItems = [];
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).forEach(key => {
                        menuItems.push({id: key, ...data[key]});
                    });
                }
                displayMenu();
            });
        }

        function displayMenu() {
            const container = document.getElementById('menuContainer');
            if (menuItems.length === 0) {
                container.innerHTML = '<div class="empty-message">No items available</div>';
                return;
            }

            container.innerHTML = menuItems.map(item => `
                <div class="menu-item">
                    <div class="item-info">
                        <h3>${item.name}</h3>
                        <p>${item.description || 'Delicious food'}</p>
                    </div>
                    <div class="item-price">₹${item.price}</div>
                    <div class="item-controls">
                        <button class="qty-btn" onclick="updateCart('${item.id}', -1)">−</button>
                        <div class="qty-display">${cart[item.id] ? cart[item.id].qty : 0}</div>
                        <button class="qty-btn" onclick="updateCart('${item.id}', 1)">+</button>
                    </div>
                </div>
            `).join('');
        }

        function updateCart(itemId, change) {
            const item = menuItems.find(m => m.id === itemId);
            if (!item) return;

            if (!cart[itemId]) {
                cart[itemId] = {name: item.name, price: item.price, qty: 0};
            }

            cart[itemId].qty += change;
            if (cart[itemId].qty <= 0) {
                delete cart[itemId];
            }

            displayMenu();
            updateCartDisplay();
        }

        function updateCartDisplay() {
            const cartItems = document.getElementById('cartItems');
            const items = Object.entries(cart);

            if (items.length === 0) {
                cartItems.innerHTML = '<div class="empty-message">No items in cart</div>';
                document.getElementById('subtotal').textContent = '₹0';
                document.getElementById('total').textContent = '₹0';
                return;
            }

            let subtotal = 0;
            cartItems.innerHTML = items.map(([id, item]) => {
                const itemTotal = item.price * item.qty;
                subtotal += itemTotal;
                return `
                    <div class="cart-item">
                        <div class="cart-item-name">${item.name} x${item.qty}</div>
                        <div class="cart-item-price">₹${itemTotal}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('subtotal').textContent = '₹' + subtotal;
            document.getElementById('total').textContent = '₹' + (subtotal + DELIVERY_FEE);
        }

        function placeOrder() {
            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const address = document.getElementById('customerAddress').value.trim();

            if (!name || !phone || !address) {
                alert('❌ Please fill all customer details');
                return;
            }

            if (Object.keys(cart).length === 0) {
                alert('❌ Please add items to cart');
                return;
            }

            const items = Object.entries(cart).map(([id, item]) => ({
                id,
                name: item.name,
                price: item.price,
                qty: item.qty
            }));

            const subtotal = items.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const total = subtotal + DELIVERY_FEE;

            const order = {
                id: Date.now().toString(),
                customerName: name,
                customerPhone: phone,
                customerAddress: address,
                items: items,
                subtotal: subtotal,
                deliveryFee: DELIVERY_FEE,
                total: total,
                status: 'pending',
                createdAt: new Date().toISOString()
            };

            document.querySelector('.place-order-btn').disabled = true;

            database.ref('orders').child(order.id).set(order).then(() => {
                document.getElementById('successMessage').style.display = 'block';
                cart = {};
                document.getElementById('customerName').value = '';
                document.getElementById('customerPhone').value = '';
                document.getElementById('customerAddress').value = '';
                updateCartDisplay();
                displayMenu();

                setTimeout(() => {
                    document.getElementById('successMessage').style.display = 'none';
                    document.querySelector('.place-order-btn').disabled = false;
                }, 3000);
            }).catch(err => {
                alert('❌ Error placing order: ' + err.message);
                document.querySelector('.place-order-btn').disabled = false;
            });
        }

        // Initialize
        loadMenu();
    </script>
</body>
</html>
