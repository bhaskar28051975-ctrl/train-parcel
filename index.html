<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodHub - Order Food</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; }
        .dish-card { transition: transform 0.2s; }
        .dish-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-gray-100 pb-80 text-gray-800">

    <header class="bg-white p-5 shadow-sm sticky top-0 z-50 flex justify-between items-center border-b-4 border-red-600">
        <h1 class="text-xl font-black text-red-600 italic uppercase">🍔 FoodHub</h1>
        <button onclick="location.reload()" class="text-[10px] font-bold bg-gray-100 px-3 py-1 rounded-full uppercase">Refresh</button>
    </header>

    <div id="customer-list" class="p-4 space-y-6"></div>

    <div id="checkout-panel" class="hidden fixed bottom-0 left-0 right-0 bg-white rounded-t-[3rem] shadow-2xl p-6 border-t z-[100]">
        <div class="flex justify-between items-center mb-4 px-2">
            <div>
                <p class="text-[10px] font-black text-gray-400 uppercase">Total Bill</p>
                <p id="panel-total" class="text-3xl font-black text-red-600">₹0</p>
            </div>
            <button onclick="cancelOrder()" class="text-red-500 font-bold text-xs uppercase bg-red-50 px-4 py-2 rounded-full">Cancel</button>
        </div>
        <div class="space-y-3">
            <input id="custName" type="text" placeholder="Enter Your Name *" class="w-full p-4 border rounded-2xl bg-gray-50 font-bold text-sm">
            <input id="custPhone" type="tel" placeholder="Enter Your Phone *" class="w-full p-4 border rounded-2xl bg-gray-50 font-bold text-sm">
            <input id="custAddress" type="text" placeholder="Enter Your Address *" class="w-full p-4 border rounded-2xl bg-gray-50 text-sm">
            <button onclick="placeOrder()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg">Confirm Order</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDMz8C0GSPbsYKinLVpUT1PLejBscKw_pc",
            authDomain: "train-parcel.firebaseapp.com",
            databaseURL: "https://train-parcel-default-rtdb.firebaseio.com",
            projectId: "train-parcel",
            storageBucket: "train-parcel.firebasestorage.app",
            messagingSenderId: "357680905494",
            appId: "1:357680905494:web:072f547f8fc7c05a1ce437"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let cart = {};
        let hotelData = {};

        window.updateQty = (id, dish, price, change) => {
            if(!cart[id]) cart[id] = { dish, price: parseInt(price), qty: 0 };
            cart[id].qty += change;
            if(cart[id].qty <= 0) delete cart[id];
            updateUI();
            renderMenu();
        };

        window.cancelOrder = () => {
            cart = {};
            updateUI();
            renderMenu();
        };

        function updateUI() {
            const total = Object.values(cart).reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('checkout-panel').style.display = total > 0 ? 'block' : 'none';
            document.getElementById('panel-total').innerText = "₹" + total;
        }

        function renderMenu() {
            const container = document.getElementById('customer-list');
            container.innerHTML = "";
            Object.keys(hotelData).forEach(hotelId => {
                const hotel = hotelData[hotelId];
                let menuHtml = "";
                if(hotel.menu) {
                    Object.keys(hotel.menu).forEach(mId => {
                        const m = hotel.menu[mId];
                        const currentQty = cart[mId] ? cart[mId].qty : 0;
                        menuHtml += `
                        <div class="dish-card bg-white rounded-2xl p-4 border shadow-sm hover:shadow-md flex gap-4">
                            <!-- IMAGE LEFT -->
                            <div class="w-28 h-28 flex-shrink-0">
                                <img src="${m.dishImg}" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=300'" class="w-full h-full rounded-xl object-cover">
                            </div>

                            <!-- DETAILS RIGHT -->
                            <div class="flex-1 flex flex-col justify-between">
                                <!-- NAME & QUANTITY (TOP ROW) -->
                                <div class="flex justify-between items-start gap-2">
                                    <h4 class="font-black text-gray-800 text-sm flex-1">${m.dish}</h4>
                                    
                                    <!-- QUANTITY DROPDOWN ON RIGHT -->
                                    ${currentQty === 0 ? `
                                        <span class="text-xs text-gray-400"></span>
                                    ` : `
                                        <select onchange="updateQty('${mId}', '${m.dish}', '${m.price}', parseInt(this.value) - ${currentQty})" class="px-2 py-1 border border-red-600 rounded-lg font-black text-red-600 bg-white text-xs w-12 flex-shrink-0">
                                            ${Array.from({length: 10}, (_, i) => `<option value="${i+1}" ${i+1 === currentQty ? 'selected' : ''}>${i+1}</option>`).join('')}
                                        </select>
                                    `}
                                </div>

                                <!-- PRICE -->
                                <p class="text-red-600 font-black text-lg">₹${m.price}</p>

                                <!-- DESCRIPTION -->
                                <p class="text-xs text-gray-500">Delicious homemade food</p>

                                <!-- ADD/REMOVE BUTTONS (BOTTOM) -->
                                <div class="flex items-center gap-2">
                                    ${currentQty === 0 ? `
                                        <button onclick="updateQty('${mId}', '${m.dish}', '${m.price}', 1)" class="flex-1 bg-red-600 text-white py-2 rounded-lg text-xs font-bold uppercase">
                                            Add to Cart
                                        </button>
                                    ` : `
                                        <button onclick="updateQty('${mId}', '${m.dish}', '${m.price}', -1)" class="px-3 py-2 bg-red-600 text-white rounded-lg font-bold text-sm">−</button>
                                        <button onclick="updateQty('${mId}', '${m.dish}', '${m.price}', 1)" class="px-3 py-2 bg-red-600 text-white rounded-lg font-bold text-sm">+</button>
                                    `}
                                </div>
                            </div>
                        </div>`;
                    });
                }
                container.innerHTML += `
                <div class="bg-white rounded-[3rem] shadow-sm border overflow-hidden">
                    <img src="${hotel.image}" onerror="this.src='https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=400'" class="w-full h-44 object-cover">
                    <div class="p-6">
                        <h2 class="text-xl font-black text-gray-800 uppercase italic mb-6 border-l-4 border-red-600 pl-3">${hotel.name}</h2>
                        <div class="space-y-4">${menuHtml}</div>
                    </div>
                </div>`;
            });
        }

        onValue(ref(db, 'hotels'), (snap) => {
            hotelData = snap.val() || {};
            renderMenu();
        });

        window.placeOrder = () => {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const address = document.getElementById('custAddress').value;
            
            if(!name || !phone || !address) return alert("❌ Please fill all details!");
            if(Object.keys(cart).length === 0) return alert("❌ Cart is empty!");
            
            const totalAmount = Object.values(cart).reduce((s, i) => s + (i.price * i.qty), 0);
            const itemsList = Object.values(cart).map(i => `${i.dish} x${i.qty}`).join(", ");
            
            push(ref(db, 'orders'), {
                customerName: name,
                customerPhone: phone,
                customerAddress: address,
                items: itemsList,
                totalAmount: totalAmount,
                status: "pending",
                timestamp: Date.now()
            }).then(() => {
                alert("✅ Order Sent Successfully!");
                cart = {};
                document.getElementById('custName').value = "";
                document.getElementById('custPhone').value = "";
                document.getElementById('custAddress').value = "";
                updateUI();
                renderMenu();
            }).catch(err => {
                alert("❌ Error: " + err.message);
            });
        };
    </script>
</body>
</html>
