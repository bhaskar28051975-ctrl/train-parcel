<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FoodHub - Order Food</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding-top: 0;
            padding-bottom: 20px;
        }

        .container {
            width: 100%;
            max-width: 100%;
            padding: 0;
            margin: 0;
        }

        header {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            width: 100%;
        }

        header h1 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            overflow-x: auto;
            padding: 5px 0;
        }

        .nav-links::-webkit-scrollbar {
            height: 4px;
        }

        .nav-links::-webkit-scrollbar-track {
            background: transparent;
        }

        .nav-links::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 2px;
        }

        .nav-links a {
            padding: 8px 12px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 12px;
            white-space: nowrap;
            transition: background 0.3s;
        }

        .nav-links a:active,
        .nav-links a.active {
            background: #764ba2;
        }

        .content {
            padding: 0 10px;
        }

        .section-title {
            color: white;
            font-size: 18px;
            margin: 20px 0 15px 0;
            font-weight: bold;
        }

        .menu-items {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }

        .menu-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .item-info {
            flex: 1;
        }

        .item-info h3 {
            color: #333;
            font-size: 14px;
            margin-bottom: 3px;
        }

        .item-info p {
            color: #666;
            font-size: 12px;
        }

        .item-price {
            color: #667eea;
            font-weight: bold;
            font-size: 16px;
            min-width: 45px;
            text-align: right;
        }

        .item-controls {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .qty-btn {
            background: #667eea;
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-btn:active {
            background: #764ba2;
        }

        .qty-display {
            width: 28px;
            text-align: center;
            font-weight: bold;
            color: #333;
            font-size: 14px;
        }

        .cart-section {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .cart-section h2 {
            color: #667eea;
            font-size: 16px;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .cart-items {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 12px;
        }

        .cart-item {
            background: #f8f9ff;
            padding: 8px;
            border-radius: 5px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .cart-item-name {
            flex: 1;
        }

        .cart-item-price {
            color: #667eea;
            font-weight: bold;
            margin: 0 8px;
        }

        .cart-item-qty {
            background: #667eea;
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
        }

        .cart-summary {
            border-top: 2px solid #667eea;
            padding-top: 12px;
            margin-bottom: 12px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .summary-row.total {
            font-size: 16px;
            font-weight: bold;
            color: #667eea;
        }

        .customer-info {
            display: grid;
            gap: 10px;
            margin-bottom: 12px;
        }

        .customer-info input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .customer-info input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .place-order-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .place-order-btn:active {
            transform: scale(0.98);
        }

        .place-order-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 20px 10px;
            font-size: 13px;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 12px;
            display: none;
            font-size: 13px;
            border-left: 4px solid #28a745;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: white;
            font-size: 14px;
        }

        @media (max-width: 480px) {
            header {
                padding: 12px;
            }

            header h1 {
                font-size: 20px;
            }

            .nav-links a {
                font-size: 11px;
                padding: 6px 10px;
            }

            .menu-item {
                padding: 10px;
            }

            .item-info h3 {
                font-size: 13px;
            }

            .item-info p {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🍔 FoodHub</h1>
            <div class="nav-links">
                <a href="index.html" class="active">🛒 Order</a>
                <a href="kitchen.html">👨‍🍳 Kitchen</a>
                <a href="delivery.html">🚚 Delivery</a>
                <a href="admin.html">⚙️ Admin</a>
                <a href="reports.html">📊 Reports</a>
            </div>
        </header>

        <div class="content">
            <h2 class="section-title">📋 Menu</h2>
            <div class="menu-items" id="menuContainer">
                <div class="loading">Loading menu...</div>
            </div>

            <div class="cart-section">
                <h2>🛒 Your Order</h2>
                <div class="success-message" id="successMessage">
                    ✓ Order placed successfully!
                </div>
                <div class="cart-items" id="cartItems">
                    <div class="empty-message">No items in cart</div>
                </div>

                <div class="cart-summary">
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span id="subtotal">₹0</span>
                    </div>
                    <div class="summary-row">
                        <span>Delivery:</span>
                        <span id="delivery">₹50</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span id="total">₹0</span>
                    </div>
                </div>

                <div class="customer-info">
                    <input type="text" id="customerName" placeholder="Your Name *" required>
                    <input type="tel" id="customerPhone" placeholder="Phone Number *" required>
                    <input type="text" id="customerAddress" placeholder="Address *" required>
                </div>

                <button class="place-order-btn" onclick="placeOrder()">Place Order</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDMz8C0GSPbsYKinLVpUT1PLejBscKw_pc",
            authDomain: "train-parcel.firebaseapp.com",
            databaseURL: "https://train-parcel-default-rtdb.firebaseio.com",
            projectId: "train-parcel",
            storageBucket: "train-parcel.firebasestorage.app",
            messagingSenderId: "357680905494",
            appId: "1:357680905494:web:072f547f8fc7c05a1ce437",
            measurementId: "G-SQX8M0MKHT"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let cart = {};
        let menuItems = [];
        const DELIVERY_FEE = 50;

        // Initialize database with sample data
        function initializeDatabase() {
            console.log('Checking Firebase database...');
            
            database.ref('menuItems').once('value', (snapshot) => {
                if (!snapshot.exists()) {
                    console.log('Database is empty - adding 8 menu items...');
                    
                    const sampleMenuItems = {
                        item_001: {
                            name: "Butter Chicken",
                            description: "Creamy butter chicken with rice",
                            price: 280
                        },
                        item_002: {
                            name: "Paneer Tikka",
                            description: "Grilled paneer with spices",
                            price: 220
                        },
                        item_003: {
                            name: "Dal Makhani",
                            description: "Creamy lentil curry",
                            price: 180
                        },
                        item_004: {
                            name: "Biryani",
                            description: "Fragrant rice with meat",
                            price: 250
                        },
                        item_005: {
                            name: "Tandoori Chicken",
                            description: "Spicy tandoori chicken",
                            price: 320
                        },
                        item_006: {
                            name: "Samosa",
                            description: "Crispy fried pastry",
                            price: 50
                        },
                        item_007: {
                            name: "Naan",
                            description: "Soft Indian bread",
                            price: 40
                        },
                        item_008: {
                            name: "Gulab Jamun",
                            description: "Sweet milk solids in syrup",
                            price: 80
                        }
                    };

                    database.ref('menuItems').set(sampleMenuItems).then(() => {
                        console.log('✅ SUCCESS! 8 menu items added to Firebase!');
                        loadMenu();
                    }).catch((error) => {
                        console.error('❌ Error adding data:', error);
                    });
                } else {
                    console.log('✓ Database has data - loading menu...');
                    loadMenu();
                }
            });
        }

        // Load menu items from Firebase
        function loadMenu() {
            database.ref('menuItems').on('value', (snapshot) => {
                menuItems = [];
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).forEach(key => {
                        menuItems.push({id: key, ...data[key]});
                    });
                    console.log(`Loaded ${menuItems.length} menu items`);
                }
                displayMenu();
            });
        }

        // Display menu items on page
        function displayMenu() {
            const container = document.getElementById('menuContainer');
            if (menuItems.length === 0) {
                container.innerHTML = '<div class="empty-message">No items available</div>';
                return;
            }

            container.innerHTML = menuItems.map(item => `
                <div class="menu-item">
                    <div class="item-info">
                        <h3>${item.name}</h3>
                        <p>${item.description || ''}</p>
                    </div>
                    <div class="item-price">₹${item.price}</div>
                    <div class="item-controls">
                        <button class="qty-btn" onclick="updateCart('${item.id}', -1)">−</button>
                        <div class="qty-display">${cart[item.id] ? cart[item.id].qty : 0}</div>
                        <button class="qty-btn" onclick="updateCart('${item.id}', 1)">+</button>
                    </div>
                </div>
            `).join('');
        }

        // Update cart when user clicks +/-
        function updateCart(itemId, change) {
            const item = menuItems.find(m => m.id === itemId);
            if (!item) return;

            if (!cart[itemId]) {
                cart[itemId] = {name: item.name, price: item.price, qty: 0};
            }

            cart[itemId].qty += change;
            if (cart[itemId].qty <= 0) {
                delete cart[itemId];
            }

            displayMenu();
            updateCartDisplay();
        }

        // Update cart display
        function updateCartDisplay() {
            const cartItems = document.getElementById('cartItems');
            const items = Object.entries(cart);

            if (items.length === 0) {
                cartItems.innerHTML = '<div class="empty-message">No items in cart</div>';
                document.getElementById('subtotal').textContent = '₹0';
                document.getElementById('total').textContent = '₹0';
                return;
            }

            let subtotal = 0;
            cartItems.innerHTML = items.map(([id, item]) => {
                const itemTotal = item.price * item.qty;
                subtotal += itemTotal;
                return `
                    <div class="cart-item">
                        <div class="cart-item-name">${item.name} x${item.qty}</div>
                        <div class="cart-item-price">₹${itemTotal}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('subtotal').textContent = '₹' + subtotal;
            document.getElementById('total').textContent = '₹' + (subtotal + DELIVERY_FEE);
        }

        // Place order
        function placeOrder() {
            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const address = document.getElementById('customerAddress').value.trim();

            if (!name || !phone || !address) {
                alert('❌ Please fill all details');
                return;
            }

            if (Object.keys(cart).length === 0) {
                alert('❌ Please add items to cart');
                return;
            }

            const items = Object.entries(cart).map(([id, item]) => ({
                id, 
                name: item.name, 
                price: item.price, 
                qty: item.qty
            }));

            const subtotal = items.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const total = subtotal + DELIVERY_FEE;

            const order = {
                id: Date.now().toString(),
                customerName: name,
                customerPhone: phone,
                customerAddress: address,
                items: items,
                subtotal: subtotal,
                deliveryFee: DELIVERY_FEE,
                total: total,
                status: 'pending',
                createdAt: new Date().toISOString()
            };

            document.querySelector('.place-order-btn').disabled = true;

            database.ref('orders').child(order.id).set(order).then(() => {
                console.log('✅ Order placed successfully!');
                document.getElementById('successMessage').style.display = 'block';
                cart = {};
                document.getElementById('customerName').value = '';
                document.getElementById('customerPhone').value = '';
                document.getElementById('customerAddress').value = '';
                updateCartDisplay();
                displayMenu();

                setTimeout(() => {
                    document.getElementById('successMessage').style.display = 'none';
                    document.querySelector('.place-order-btn').disabled = false;
                }, 3000);
            }).catch(err => {
                alert('❌ Error: ' + err.message);
                document.querySelector('.place-order-btn').disabled = false;
            });
        }

        // Start everything when page loads
        window.addEventListener('load', () => {
            console.log('🚀 FoodHub app loading...');
            initializeDatabase();
        });
    </script>
</body>
</html>
