<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodHub Kitchen Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 text-gray-800 pb-20">

    <header class="bg-red-600 text-white p-5 shadow-lg sticky top-0 z-40">
        <h1 class="text-2xl font-black">👨‍🍳 Kitchen Dashboard</h1>
    </header>

    <!-- TABS -->
    <div class="bg-white border-b flex gap-0">
        <button onclick="switchTab('pending')" id="tab-pending" class="flex-1 py-3 font-black text-red-600 border-b-4 border-red-600 text-sm">⏳ PENDING</button>
        <button onclick="switchTab('preparing')" id="tab-preparing" class="flex-1 py-3 font-black text-gray-600 text-sm">👨‍🍳 PREPARING</button>
        <button onclick="switchTab('ready')" id="tab-ready" class="flex-1 py-3 font-black text-gray-600 text-sm">✅ READY</button>
    </div>

    <div class="p-4 space-y-4">

        <!-- ========== PENDING ORDERS ========== -->
        <div id="section-pending">
            <h2 class="text-lg font-black mb-3">⏳ New Orders</h2>
            <div id="pending-list" class="space-y-3"></div>
        </div>

        <!-- ========== PREPARING ORDERS ========== -->
        <div id="section-preparing" class="hidden">
            <h2 class="text-lg font-black mb-3">👨‍🍳 Being Prepared</h2>
            <div id="preparing-list" class="space-y-3"></div>
        </div>

        <!-- ========== READY ORDERS ========== -->
        <div id="section-ready" class="hidden">
            <h2 class="text-lg font-black mb-3">✅ Ready for Pickup</h2>
            <div id="ready-list" class="space-y-3"></div>
        </div>

    </div>

    <!-- STATS FOOTER -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t-4 border-red-600 p-4">
        <div class="flex gap-4 justify-center">
            <div class="text-center">
                <p class="text-xs font-black text-gray-600">Pending</p>
                <p id="stat-pending" class="text-xl font-black text-red-600">0</p>
            </div>
            <div class="text-center">
                <p class="text-xs font-black text-gray-600">Preparing</p>
                <p id="stat-preparing" class="text-xl font-black text-orange-600">0</p>
            </div>
            <div class="text-center">
                <p class="text-xs font-black text-gray-600">Ready</p>
                <p id="stat-ready" class="text-xl font-black text-green-600">0</p>
            </div>
            <div class="text-center">
                <p class="text-xs font-black text-gray-600">Total</p>
                <p id="stat-total" class="text-xl font-black text-blue-600">0</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDMz8C0GSPbsYKinLVpUT1PLejBscKw_pc",
            authDomain: "train-parcel.firebaseapp.com",
            databaseURL: "https://train-parcel-default-rtdb.firebaseio.com",
            projectId: "train-parcel",
            storageBucket: "train-parcel.firebasestorage.app",
            messagingSenderId: "357680905494",
            appId: "1:357680905494:web:072f547f8fc7c05a1ce437"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let ordersData = {};

        window.switchTab = (tab) => {
            ['pending', 'preparing', 'ready'].forEach(t => {
                document.getElementById(`section-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('border-b-4', 'border-red-600', 'text-red-600');
                document.getElementById(`tab-${t}`).classList.add('text-gray-600');
            });
            document.getElementById(`section-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('border-b-4', 'border-red-600', 'text-red-600');
        };

        // STATUS FLOW: pending → preparing → ready → (delivery picks up) → on-way → delivered

        window.startCooking = (orderId) => {
            // pending → preparing
            update(ref(db, `orders/${orderId}`), {
                status: "preparing",
                cookingStartedAt: Date.now()
            });
        };

        window.markReady = (orderId) => {
            // preparing → ready
            update(ref(db, `orders/${orderId}`), {
                status: "ready",
                readyAt: Date.now()
            });
        };

        window.cancelOrder = (orderId) => {
            // Delete order
            if(confirm("❌ Cancel this order?")) {
                remove(ref(db, `orders/${orderId}`));
            }
        };

        function renderOrders() {
            const pendingList = document.getElementById('pending-list');
            const preparingList = document.getElementById('preparing-list');
            const readyList = document.getElementById('ready-list');
            
            pendingList.innerHTML = "";
            preparingList.innerHTML = "";
            readyList.innerHTML = "";

            let pendingCount = 0, preparingCount = 0, readyCount = 0;

            Object.keys(ordersData).forEach(orderId => {
                const order = ordersData[orderId];

                // PENDING ORDERS (New orders that need to be cooked)
                if(order.status === "pending") {
                    pendingCount++;
                    pendingList.innerHTML += `
                    <div class="bg-white p-4 rounded-lg shadow-md border-l-4 border-red-600">
                        <div class="mb-3">
                            <h3 class="font-black text-sm">👤 ${order.customerName}</h3>
                            <p class="text-xs text-gray-600 mt-1">📞 ${order.customerPhone}</p>
                            <p class="text-xs text-gray-600 mt-1">📍 ${order.customerAddress}</p>
                            <p class="text-xs text-red-600 font-black mt-2">🍽️ ${order.items}</p>
                            <p class="text-xs text-gray-600 mt-1">💰 ₹${order.totalAmount}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="startCooking('${orderId}')" class="flex-1 bg-orange-600 text-white py-2 rounded-lg font-black text-xs">START COOKING 👨‍🍳</button>
                            <button onclick="cancelOrder('${orderId}')" class="flex-1 bg-gray-600 text-white py-2 rounded-lg font-black text-xs">Cancel</button>
                        </div>
                    </div>`;
                }

                // PREPARING ORDERS (Currently being cooked)
                if(order.status === "preparing") {
                    preparingCount++;
                    preparingList.innerHTML += `
                    <div class="bg-white p-4 rounded-lg shadow-md border-l-4 border-orange-600">
                        <div class="mb-3">
                            <h3 class="font-black text-sm">👤 ${order.customerName}</h3>
                            <p class="text-xs text-gray-600 mt-1">📞 ${order.customerPhone}</p>
                            <p class="text-xs text-gray-600 mt-1">📍 ${order.customerAddress}</p>
                            <p class="text-xs text-orange-600 font-black mt-2">🍳 Cooking... | 🍽️ ${order.items}</p>
                            <p class="text-xs text-gray-600 mt-1">💰 ₹${order.totalAmount}</p>
                        </div>
                        <button onclick="markReady('${orderId}')" class="w-full bg-green-600 text-white py-2 rounded-lg font-black text-xs">MARK READY ✅</button>
                    </div>`;
                }

                // READY ORDERS (Cooked, waiting for delivery pickup)
                if(order.status === "ready") {
                    readyCount++;
                    readyList.innerHTML += `
                    <div class="bg-white p-4 rounded-lg shadow-md border-l-4 border-green-600">
                        <div>
                            <h3 class="font-black text-sm">✅ ${order.customerName}</h3>
                            <p class="text-xs text-gray-600 mt-1">📞 ${order.customerPhone}</p>
                            <p class="text-xs text-gray-600 mt-1">📍 ${order.customerAddress}</p>
                            <p class="text-xs text-green-600 font-black mt-2">✨ Ready! | 🍽️ ${order.items}</p>
                            <p class="text-xs text-gray-600 mt-1">💰 ₹${order.totalAmount}</p>
                            <p class="text-xs text-gray-600 mt-1">⏰ Waiting for driver pickup...</p>
                        </div>
                    </div>`;
                }
            });

            const totalOrders = pendingCount + preparingCount + readyCount;
            document.getElementById('stat-pending').innerText = pendingCount;
            document.getElementById('stat-preparing').innerText = preparingCount;
            document.getElementById('stat-ready').innerText = readyCount;
            document.getElementById('stat-total').innerText = totalOrders;
        }

        // LOAD DATA
        onValue(ref(db, 'orders'), (snap) => {
            ordersData = snap.val() || {};
            renderOrders();
        });
    </script>
</body>
</html>
