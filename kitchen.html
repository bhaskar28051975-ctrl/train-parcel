<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen - FoodHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-orange-50 pb-40">

    <header class="bg-white shadow-md sticky top-0 z-40 border-b-4 border-orange-600">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black text-orange-600">👨‍🍳 Kitchen</h1>
            <a href="control.html" class="bg-orange-600 text-white px-3 py-1 rounded-full text-xs font-bold"><i class="fa-solid fa-home mr-1"></i>Home</a>
        </div>
    </header>

    <div class="max-w-4xl mx-auto px-4 space-y-6 py-6">

        <!-- STATS -->
        <div class="grid grid-cols-3 gap-4">
            <div class="bg-white p-4 rounded-xl shadow-md text-center border-t-4 border-red-600">
                <p class="text-xs text-gray-500 font-bold uppercase">Pending</p>
                <p id="stat-pending" class="text-3xl font-black text-red-600 mt-2">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-md text-center border-t-4 border-orange-600">
                <p class="text-xs text-gray-500 font-bold uppercase">Preparing</p>
                <p id="stat-preparing" class="text-3xl font-black text-orange-600 mt-2">0</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-md text-center border-t-4 border-green-600">
                <p class="text-xs text-gray-500 font-bold uppercase">Ready</p>
                <p id="stat-ready" class="text-3xl font-black text-green-600 mt-2">0</p>
            </div>
        </div>

        <!-- TABS -->
        <div class="flex gap-2 bg-white p-2 rounded-lg shadow-md flex-wrap sticky top-20 z-30">
            <button onclick="switchTab('pending')" class="py-2 px-4 rounded-lg text-xs font-black uppercase transition-all bg-red-600 text-white" id="tab-pending">🔔 Pending</button>
            <button onclick="switchTab('preparing')" class="py-2 px-4 rounded-lg text-xs font-black uppercase transition-all bg-gray-200 text-gray-700" id="tab-preparing">⏳ Preparing</button>
            <button onclick="switchTab('ready')" class="py-2 px-4 rounded-lg text-xs font-black uppercase transition-all bg-gray-200 text-gray-700" id="tab-ready">✅ Ready</button>
        </div>

        <!-- PENDING ORDERS -->
        <div id="pending-tab" class="space-y-4">
            <h2 class="text-xl font-black text-gray-800">🔔 New Orders (Pending)</h2>
            <div id="pending-orders" class="space-y-3"></div>
        </div>

        <!-- PREPARING ORDERS -->
        <div id="preparing-tab" class="hidden space-y-4">
            <h2 class="text-xl font-black text-gray-800">⏳ Orders Being Prepared</h2>
            <div id="preparing-orders" class="space-y-3"></div>
        </div>

        <!-- READY ORDERS -->
        <div id="ready-tab" class="hidden space-y-4">
            <h2 class="text-xl font-black text-gray-800">✅ Ready for Pickup</h2>
            <div id="ready-orders" class="space-y-3"></div>
        </div>

        <!-- NAV -->
        <div class="flex gap-2 mt-8">
            <a href="index.html" class="flex-1 bg-yellow-600 text-white py-3 rounded-lg font-black uppercase text-center shadow-md active:scale-95">🛒 Customer</a>
            <a href="admin.html" class="flex-1 bg-red-600 text-white py-3 rounded-lg font-black uppercase text-center shadow-md active:scale-95">⚙️ Admin</a>
            <a href="delivery.html" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-black uppercase text-center shadow-md active:scale-95">🚚 Delivery</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDMz8C0GSPbsYKinLVpUT1PLejBscKw_pc",
            authDomain: "train-parcel.firebaseapp.com",
            databaseURL: "https://train-parcel-default-rtdb.firebaseio.com",
            projectId: "train-parcel",
            storageBucket: "train-parcel.firebasestorage.app",
            messagingSenderId: "357680905494",
            appId: "1:357680905494:web:072f547f8fc7c05a1ce437"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function switchTab(tab) {
            document.getElementById('pending-tab').classList.toggle('hidden', tab !== 'pending');
            document.getElementById('preparing-tab').classList.toggle('hidden', tab !== 'preparing');
            document.getElementById('ready-tab').classList.toggle('hidden', tab !== 'ready');

            const tabs = ['pending', 'preparing', 'ready'];
            tabs.forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === tab) {
                    btn.classList.add('bg-orange-600', 'text-white');
                    btn.classList.remove('bg-gray-200', 'text-gray-700');
                } else {
                    btn.classList.remove('bg-orange-600', 'text-white');
                    btn.classList.add('bg-gray-200', 'text-gray-700');
                }
            });
        }

        function loadOrders() {
            db.ref('orders').on('value', snap => {
                const orders = snap.val() || {};
                const pending = Object.entries(orders).filter(([_, o]) => o.status === 'pending').reverse();
                const preparing = Object.entries(orders).filter(([_, o]) => o.status === 'preparing').reverse();
                const ready = Object.entries(orders).filter(([_, o]) => o.status === 'ready').reverse();

                document.getElementById('stat-pending').textContent = pending.length;
                document.getElementById('stat-preparing').textContent = preparing.length;
                document.getElementById('stat-ready').textContent = ready.length;

                displayOrders('pending-orders', pending);
                displayOrders('preparing-orders', preparing);
                displayOrders('ready-orders', ready);
            });
        }

        function displayOrders(containerId, orders) {
            const container = document.getElementById(containerId);
            if (orders.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 py-8">No orders</p>';
                return;
            }

            container.innerHTML = orders.map(([id, order]) => `
                <div class="bg-white p-6 rounded-xl shadow-md border-l-4 border-orange-600">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h3 class="text-lg font-black text-gray-800">#${id.substring(0, 8)}</h3>
                            <p class="text-xs text-gray-500">Hotel: ${order.hotelName}</p>
                        </div>
                        <span class="bg-orange-100 text-orange-700 px-3 py-1 rounded-full text-xs font-black uppercase">${order.status}</span>
                    </div>

                    <div class="bg-gray-50 p-4 rounded-lg mb-3">
                        <h4 class="font-bold text-gray-800 text-sm mb-2">📦 Items:</h4>
                        <div class="space-y-1">
                            ${order.items.map(item => `
                                <div class="flex justify-between text-sm">
                                    <span class="text-gray-700">${item.name}</span>
                                    <span class="text-gray-600">x${item.qty} @ ₹${item.price}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="bg-blue-50 p-3 rounded-lg mb-3 border-l-2 border-blue-600">
                        <p class="text-sm font-bold text-gray-800">${order.customerName}</p>
                        <p class="text-xs text-gray-600">📱 ${order.customerPhone}</p>
                        <p class="text-xs text-gray-600">📍 ${order.customerAddress}</p>
                    </div>

                    <div class="bg-green-50 p-3 rounded-lg mb-4 text-center border-t-2 border-green-600">
                        <p class="text-xs text-gray-600">Total Bill</p>
                        <p class="text-2xl font-black text-green-600">₹${order.total}</p>
                    </div>

                    <div class="flex gap-2">
                        ${order.status === 'pending' ? `
                            <button onclick="updateStatus('${id}', 'preparing')" class="flex-1 bg-orange-600 text-white py-3 rounded-lg font-black uppercase active:scale-95">Start Cooking</button>
                            <button onclick="updateStatus('${id}', 'cancelled')" class="bg-gray-300 text-gray-700 px-4 py-3 rounded-lg font-bold text-xs uppercase">Cancel</button>
                        ` : order.status === 'preparing' ? `
                            <button onclick="updateStatus('${id}', 'ready')" class="flex-1 bg-green-600 text-white py-3 rounded-lg font-black uppercase active:scale-95">Mark Ready</button>
                            <button onclick="updateStatus('${id}', 'pending')" class="bg-gray-300 text-gray-700 px-4 py-3 rounded-lg font-bold text-xs uppercase">Back</button>
                        ` : `
                            <span class="flex-1 bg-green-600 text-white py-3 rounded-lg font-black uppercase text-center">✅ Ready</span>
                        `}
                    </div>
                </div>
            `).join('');
        }

        function updateStatus(orderId, newStatus) {
            db.ref('orders').child(orderId).update({status: newStatus});
        }

        window.addEventListener('load', loadOrders);
    </script>
</body>
</html>
