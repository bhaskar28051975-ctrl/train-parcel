<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen - FoodHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-orange-50 pb-24">
    <header class="bg-white p-5 shadow-md sticky top-0 z-50 border-b-4 border-orange-600">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-black text-orange-600">👨‍🍳 Kitchen Dashboard</h1>
            <button onclick="location.reload()" class="text-[10px] font-bold bg-gray-100 px-3 py-1 rounded-full uppercase">Refresh</button>
        </div>
    </header>

    <div class="max-w-6xl mx-auto p-4">
        <!-- TABS -->
        <div class="flex gap-2 bg-white p-2 rounded-xl shadow-md flex-wrap mb-6 sticky top-20 z-40">
            <button onclick="switchTab('pending')" id="tab-pending" class="py-2 px-4 rounded-lg text-xs font-black uppercase bg-red-600 text-white">🔴 Pending</button>
            <button onclick="switchTab('preparing')" id="tab-preparing" class="py-2 px-4 rounded-lg text-xs font-black uppercase bg-gray-200 text-gray-700">⏳ Preparing</button>
            <button onclick="switchTab('ready')" id="tab-ready" class="py-2 px-4 rounded-lg text-xs font-black uppercase bg-gray-200 text-gray-700">✅ Ready</button>
        </div>

        <!-- STATS -->
        <div class="grid grid-cols-3 gap-3 mb-6 bg-white p-4 rounded-xl shadow-md">
            <div class="text-center">
                <p id="stat-pending" class="text-3xl font-black text-red-600">0</p>
                <p class="text-xs text-gray-500">Pending</p>
            </div>
            <div class="text-center">
                <p id="stat-preparing" class="text-3xl font-black text-orange-600">0</p>
                <p class="text-xs text-gray-500">Preparing</p>
            </div>
            <div class="text-center">
                <p id="stat-ready" class="text-3xl font-black text-green-600">0</p>
                <p class="text-xs text-gray-500">Ready</p>
            </div>
        </div>

        <!-- PENDING ORDERS -->
        <div id="section-pending" class="space-y-4">
            <h2 class="text-xl font-black text-gray-800 mb-4">🔴 New Orders (Pending)</h2>
            <div id="pending-orders" class="space-y-4"></div>
        </div>

        <!-- PREPARING ORDERS -->
        <div id="section-preparing" class="hidden space-y-4">
            <h2 class="text-xl font-black text-gray-800 mb-4">⏳ Orders Being Prepared</h2>
            <div id="preparing-orders" class="space-y-4"></div>
        </div>

        <!-- READY ORDERS -->
        <div id="section-ready" class="hidden space-y-4">
            <h2 class="text-xl font-black text-gray-800 mb-4">✅ Ready for Pickup</h2>
            <div id="ready-orders" class="space-y-4"></div>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDMz8C0GSPbsYKinLVpUT1PLejBscKw_pc",
        authDomain: "train-parcel.firebaseapp.com",
        databaseURL: "https://train-parcel-default-rtdb.firebaseio.com",
        projectId: "train-parcel",
        storageBucket: "train-parcel.firebasestorage.app",
        messagingSenderId: "357680905494",
        appId: "1:357680905494:web:072f547f8fc7c05a1ce437"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let allOrders = {};

    window.switchTab = (tab) => {
        document.getElementById('section-pending').classList.add('hidden');
        document.getElementById('section-preparing').classList.add('hidden');
        document.getElementById('section-ready').classList.add('hidden');
        document.getElementById(`section-${tab}`).classList.remove('hidden');

        ['pending', 'preparing', 'ready'].forEach(t => {
            document.getElementById(`tab-${t}`).classList.remove('bg-red-600', 'bg-orange-600', 'bg-green-600', 'text-white');
            document.getElementById(`tab-${t}`).classList.add('bg-gray-200', 'text-gray-700');
        });
        
        if(tab === 'pending') document.getElementById(`tab-${tab}`).classList.remove('bg-gray-200', 'text-gray-700'), document.getElementById(`tab-${tab}`).classList.add('bg-red-600', 'text-white');
        else if(tab === 'preparing') document.getElementById(`tab-${tab}`).classList.remove('bg-gray-200', 'text-gray-700'), document.getElementById(`tab-${tab}`).classList.add('bg-orange-600', 'text-white');
        else if(tab === 'ready') document.getElementById(`tab-${tab}`).classList.remove('bg-gray-200', 'text-gray-700'), document.getElementById(`tab-${tab}`).classList.add('bg-green-600', 'text-white');
    };

    window.updateStatus = (orderId, newStatus) => {
        update(ref(db, `orders/${orderId}`), { status: newStatus });
    };

    function loadOrders() {
        onValue(ref(db, 'orders'), (snap) => {
            allOrders = snap.val() || {};
            
            const pending = Object.entries(allOrders).filter(([_, o]) => o.status === "pending").reverse();
            const preparing = Object.entries(allOrders).filter(([_, o]) => o.status === "preparing").reverse();
            const ready = Object.entries(allOrders).filter(([_, o]) => o.status === "ready").reverse();

            document.getElementById('stat-pending').textContent = pending.length;
            document.getElementById('stat-preparing').textContent = preparing.length;
            document.getElementById('stat-ready').textContent = ready.length;

            displayOrders('pending-orders', pending);
            displayOrders('preparing-orders', preparing);
            displayOrders('ready-orders', ready);
        });
    }

    function displayOrders(containerId, orders) {
        const container = document.getElementById(containerId);
        if(orders.length === 0) {
            container.innerHTML = '<p class="text-center text-gray-500 py-8">No orders</p>';
            return;
        }

        container.innerHTML = orders.map(([orderId, order]) => {
            const itemsList = typeof order.items === 'string' ? order.items : (Array.isArray(order.items) ? order.items.join(", ") : "");
            return `
            <div class="bg-white rounded-2xl p-6 shadow-md border-l-4 border-orange-600">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="text-sm font-black text-gray-400 uppercase">Order ID</p>
                        <p class="text-lg font-black text-gray-800">#${orderId.substring(0, 8)}</p>
                    </div>
                    <span class="bg-orange-100 text-orange-700 px-3 py-1 rounded-full text-xs font-black uppercase">${order.status}</span>
                </div>

                <div class="bg-blue-50 p-4 rounded-lg mb-4 border-l-2 border-blue-600">
                    <p class="font-bold text-gray-800">${order.customerName}</p>
                    <p class="text-sm text-gray-600">📱 ${order.customerPhone}</p>
                    <p class="text-sm text-gray-600">📍 ${order.customerAddress}</p>
                </div>

                <div class="bg-gray-50 p-4 rounded-lg mb-4">
                    <h4 class="font-bold text-gray-800 text-sm mb-2">📦 Items:</h4>
                    <p class="text-sm text-gray-700">${itemsList}</p>
                    <p class="text-lg font-black text-orange-600 mt-2">Total: ₹${order.totalAmount || 0}</p>
                </div>

                <div class="flex gap-2">
                    ${order.status === 'pending' ? `
                        <button onclick="updateStatus('${orderId}', 'preparing')" class="flex-1 bg-orange-600 text-white py-3 rounded-lg font-black uppercase active:scale-95">Start Cooking</button>
                        <button onclick="updateStatus('${orderId}', 'cancelled')" class="w-24 bg-gray-300 text-gray-700 py-3 rounded-lg font-black text-xs uppercase">Cancel</button>
                    ` : order.status === 'preparing' ? `
                        <button onclick="updateStatus('${orderId}', 'ready')" class="flex-1 bg-green-600 text-white py-3 rounded-lg font-black uppercase active:scale-95">Mark Ready</button>
                        <button onclick="updateStatus('${orderId}', 'pending')" class="w-24 bg-gray-300 text-gray-700 py-3 rounded-lg font-black text-xs uppercase">Back</button>
                    ` : `
                        <span class="flex-1 bg-green-600 text-white py-3 rounded-lg font-black uppercase text-center">✅ READY</span>
                    `}
                </div>
            </div>`;
        }).join('');
    }

    loadOrders();
</script>
</body>
</html>
