<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FoodHub - Kitchen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 0;
        }

        .container {
            width: 100%;
            max-width: 100%;
            padding: 0;
        }

        header {
            background: white;
            padding: 15px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            width: 100%;
        }

        header h1 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            overflow-x: auto;
        }

        .nav-links a {
            padding: 8px 12px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 12px;
            white-space: nowrap;
            transition: background 0.3s;
        }

        .nav-links a.active {
            background: #764ba2;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 15px;
        }

        .stat-card {
            background: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin: 8px 0;
        }

        .stat-label {
            color: #666;
            font-size: 11px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            overflow-x: auto;
        }

        .tab-btn {
            padding: 8px 12px;
            background: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            white-space: nowrap;
            color: #667eea;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #667eea;
            color: white;
        }

        .content {
            padding: 10px;
            min-height: calc(100vh - 300px);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .orders-list {
            display: grid;
            gap: 12px;
        }

        .order-card {
            background: white;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .order-card.preparing {
            border-left-color: #ffc107;
        }

        .order-card.ready {
            border-left-color: #28a745;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .order-id {
            font-weight: bold;
            color: #333;
            font-size: 14px;
        }

        .order-status {
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: bold;
        }

        .status-pending {
            background: #ff6b6b;
            color: white;
        }

        .status-preparing {
            background: #ffc107;
            color: white;
        }

        .status-ready {
            background: #28a745;
            color: white;
        }

        .order-items {
            margin-bottom: 10px;
        }

        .order-item {
            padding: 6px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-customer {
            background: #f8f9ff;
            padding: 8px;
            border-radius: 5px;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .customer-name {
            font-weight: bold;
            color: #333;
        }

        .customer-phone {
            color: #667eea;
        }

        .order-actions {
            display: grid;
            gap: 8px;
            grid-template-columns: 1fr 1fr;
        }

        .action-btn {
            padding: 8px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .btn-prepare {
            background: #ffc107;
            color: white;
        }

        .btn-prepare:active {
            background: #ffb300;
        }

        .btn-ready {
            background: #28a745;
            color: white;
        }

        .btn-ready:active {
            background: #218838;
        }

        .btn-cancel {
            background: #6c757d;
            color: white;
        }

        .btn-cancel:active {
            background: #5a6268;
        }

        .empty-message {
            text-align: center;
            padding: 40px 20px;
            color: white;
            font-size: 14px;
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 20px;
            }

            .nav-links a {
                font-size: 11px;
                padding: 6px 10px;
            }

            .stat-card {
                padding: 10px;
            }

            .stat-number {
                font-size: 20px;
            }

            .stat-label {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>👨‍🍳 Kitchen</h1>
            <div class="nav-links">
                <a href="index.html">🛒 Order</a>
                <a href="kitchen.html" class="active">👨‍🍳 Kitchen</a>
                <a href="delivery.html">🚚 Delivery</a>
                <a href="admin.html">⚙️ Admin</a>
                <a href="reports.html">📊 Reports</a>
            </div>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Pending</div>
                <div class="stat-number" id="pendingCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Preparing</div>
                <div class="stat-number" id="preparingCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Ready</div>
                <div class="stat-number" id="readyCount">0</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('pending')">Pending</button>
            <button class="tab-btn" onclick="switchTab('preparing')">Preparing</button>
            <button class="tab-btn" onclick="switchTab('ready')">Ready</button>
        </div>

        <div class="content">
            <div id="pending" class="tab-content active"></div>
            <div id="preparing" class="tab-content"></div>
            <div id="ready" class="tab-content"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDMz8C0GSPbsYKinLVpUT1PLejBscKw_pc",
            authDomain: "train-parcel.firebaseapp.com",
            databaseURL: "https://train-parcel-default-rtdb.firebaseio.com",
            projectId: "train-parcel",
            storageBucket: "train-parcel.firebasestorage.app",
            messagingSenderId: "357680905494",
            appId: "1:357680905494:web:072f547f8fc7c05a1ce437",
            measurementId: "G-SQX8M0MKHT"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let allOrders = [];

        function loadOrders() {
            database.ref('orders').on('value', (snapshot) => {
                allOrders = [];
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).forEach(key => {
                        allOrders.push({id: key, ...data[key]});
                    });
                }
                allOrders.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                updateDisplay();
            });
        }

        function updateDisplay() {
            const pending = allOrders.filter(o => o.status === 'pending');
            const preparing = allOrders.filter(o => o.status === 'preparing');
            const ready = allOrders.filter(o => o.status === 'ready');

            document.getElementById('pendingCount').textContent = pending.length;
            document.getElementById('preparingCount').textContent = preparing.length;
            document.getElementById('readyCount').textContent = ready.length;

            displayOrders('pending', pending);
            displayOrders('preparing', preparing);
            displayOrders('ready', ready);
        }

        function displayOrders(status, orders) {
            const container = document.getElementById(status);
            if (orders.length === 0) {
                container.innerHTML = '<div class="empty-message">No orders</div>';
                return;
            }

            container.innerHTML = `<div class="orders-list">${orders.map(order => `
                <div class="order-card ${order.status}">
                    <div class="order-header">
                        <div class="order-id">#${order.id.substring(0, 8)}</div>
                        <div class="order-status status-${order.status}">${order.status.toUpperCase()}</div>
                    </div>
                    <div class="order-items">
                        ${order.items.map(item => `
                            <div class="order-item">• ${item.name} x${item.qty}</div>
                        `).join('')}
                    </div>
                    <div class="order-customer">
                        <div class="customer-name">${order.customerName}</div>
                        <div class="customer-phone">📱 ${order.customerPhone}</div>
                    </div>
                    <div class="order-actions">
                        ${order.status === 'pending' ? `
                            <button class="action-btn btn-prepare" onclick="updateStatus('${order.id}', 'preparing')">Prepare</button>
                            <button class="action-btn btn-cancel" onclick="cancelOrder('${order.id}')">Cancel</button>
                        ` : order.status === 'preparing' ? `
                            <button class="action-btn btn-ready" onclick="updateStatus('${order.id}', 'ready')">Ready</button>
                            <button class="action-btn btn-cancel" onclick="updateStatus('${order.id}', 'pending')">Back</button>
                        ` : `
                            <button class="action-btn" style="grid-column: 1/-1; background: #28a745; color: white; cursor: default;">✓ Ready</button>
                        `}
                    </div>
                </div>
            `).join('')}</div>`;
        }

        function updateStatus(orderId, newStatus) {
            database.ref('orders').child(orderId).update({status: newStatus});
        }

        function cancelOrder(orderId) {
            if (confirm('Cancel order?')) {
                database.ref('orders').child(orderId).remove();
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
        }

        window.addEventListener('load', loadOrders);
    </script>
</body>
</html>
